<script>
const DIGEST_DATA = {"user_name":"Tester 2","digest_date":"8 April 2026","cases":[{"title":"Re: DA SHUN SHIPPING (PTE.) LTD.","citation":"[2026] SGHC 75","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_75","matched_topics":["admiralty and shipping"],"law_shifted":true,"summary":{"bottom_line":"A co-debtor who pays more than its rateable share of a joint debt has no right to be subrogated to the creditor's extinguished security interest absent proof of a recognised unjust factor. Separately, a s 100(2) IRDA order authorising sale of mortgaged property can confer security over sale proceeds on admiralty in rem claimants who agree to forbear from arrest, even though they never arrested the vessel.","facts_posture":"Da Shun and An Wei (sister companies in the Hin Leong group) were joint and several borrowers under a cross-collateralised loan from BofA secured by mortgages over their respective vessels. When An Wei's vessel was sold, proceeds were applied to discharge part of Da Shun's share of the debt. Da Shun's vessel was later sold pursuant to a s 100(2) IRDA order obtained by consent with BofA and two banks (HSBC and SG) who had issued admiralty in rem writs against the vessel for cargo misdelivery claims. The s 100 Order provided that balance proceeds after repaying BofA would be paid into court \"as security\" for HSBC and SG's claims pending adjudication. An Wei sought to be subrogated to BofA's discharged mortgage and claim priority over the balance proceeds; HSBC and SG asserted priority under the s 100 Order.","decided":"Mohan J dismissed An Wei's subrogation claim but held that HSBC and SG have security over the balance proceeds by virtue of the s 100 Order. An Wei's claim in contribution against Da Shun was allowed but ranks only as an unsecured claim. The Court directed that HSBC and SG's underlying misdelivery claims proceed to trial, as allegations that the bills of lading were fabricated could not be determined summarily on affidavits.","reasoning":"The Court reaffirmed that equitable subrogation requires proof of a recognised unjust factor within the law of unjust enrichment, following *Anna Wee* and the UK Supreme Court's decision in *Lowick Rose*. An Wei failed to identify any such unjust factor: it entered the Facility Agreement voluntarily on joint and several terms, knowingly accepted cross-collateralisation, and suffered no failure of basis or defeated expectation when BofA enforced its security. Abstract unfairness or the mere fact of overpayment does not suffice. Section 2 of the Mercantile Law Amendment Act 1856 codifies but does not expand the common law on subrogation and likewise requires proof of unjust enrichment. Subrogation was also refused on public policy grounds given An Wei's two-year delay in asserting its claim and the prejudice to HSBC and SG.\n\nThe Court distinguished *Natixis (CA)*, which held that an admiralty writ does not create security absent arrest. Here, the Writ Claimants discontinued their writs and forbore from arrest in reliance on Da Shun's agreement (embodied in the s 100 Order) to provide security in the form of the balance proceeds paid into court. Construing the s 100 Order as a consent order using contractual principles, the Court held it conferred security on HSBC and SG equivalent to that obtained by voluntary provision of security in lieu of arrest, a commonplace admiralty practice. The s 100 Order replicated as closely as possible the outcome of an admiralty arrest and judicial sale. The Court also followed *Da Hui (HC)* (affirmed by the Court of Appeal), holding that subrogation is unavailable once a security has been spent through realisation, whether by judicial sale or by private sale pursuant to a court-sanctioned s 100 order.","watch":"The Court applied *Fulcrum Distressed Partners* to direct that complex factual disputes raised in proofs of debt—here, whether bills of lading were fabricated—should be resolved at trial with pleadings, discovery, and cross-examination, rather than summarily on affidavits. This signals a willingness to order trials in insolvency contexts where serious allegations of fraud or forgery are raised, particularly where similar issues are being litigated elsewhere."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the recent High Court decision in *Da Hui Shipping (Pte) Ltd v An Rong Shipping Pte Ltd* [2025] 4 SLR 816 as the governing authority on when subrogation is unavailable, finding that the mortgagee's security interest was spent when the security itself was realised to discharge the primary debt—a principle that bound the outcome here. The Court distinguished *Natixis, Singapore Branch v Seshadri Rajagopalan* [2025] 1 SLR 1020, which had held that an admiralty claimant becomes a holder of security only upon arrest of the vessel, not upon mere issuance of a writ; this distinction was critical because the Court found that the admiralty claimant in the present case had obtained security through arrest before the mortgagee's security was realised, preserving the claimant's entitlement to subrogation. The Court relied on the UK Supreme Court's decision in *Banque Financière de la Cité v Parc (Battersea) Ltd* [1999] 1 AC 221 and *Lowick Rose LLP (in liquidation) v Swynson Ltd* [2018] AC 313 to emphasise that unjust enrichment operates as a principled body of law bound by recognised unjust factors, not as a judicial discretion to achieve fairness on a case-by-case basis.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment does not alter existing principles but applies them to clarify the interplay between admiralty arrest and subrogation. By distinguishing *Natixis* and applying *Da Hui Shipping*, the Court established that the timing of arrest relative to the realisation of mortgaged security determines whether subrogation remains available—a point not previously addressed in the reported decisions. The Court's treatment confirms that Singapore courts will rigorously apply the \"spent security\" principle from *Da Hui Shipping* while recognising that admiralty claimants acquire genuine security interests upon arrest, not merely through writ issuance.","cited_cases":[{"case_name":"Liu Huaixi v Haniffa Pte Ltd","citation":"[2017] SGHC 270","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"The In-Principle Approval (IPA) letter serves to inform foreign workers of their salary in clear terms"},{"case_name":"SATS Construction Pte Ltd v Islam Md Ohidul","citation":"[2016] 3 SLR 1164","court":"High Court","jurisdiction":"Singapore","treatment":"followed","proposition":"A successful party is entitled to costs even where counsel act pro bono"},{"case_name":"Law Society of Singapore v Kurubalan s/o Manickam Rengaraju","citation":"[2013] 4 SLR 91","court":"Court of Three Judges","jurisdiction":"Singapore","treatment":"cited","proposition":"It is permissible and honourable for counsel to act for impecunious clients where their only hope of payment is through an award of costs following success"}]},{"title":"BABBOBOX PTE. LTD. v EPIQ SINGAPORE PTE. LTD.","citation":"[2026] SGHC 66","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_66","matched_topics":["civil procedure"],"law_shifted":true,"summary":{"bottom_line":"The Court will not summarily determine a question of contractual construction where answering it does not resolve the parties' dispute and where resolution requires findings of fact not yet established. Even a cleanly-framed definitional issue may be unsuitable for O 9 r 19 determination if the real contest concerns which subject matter falls within that definition.","facts_posture":"Babbobox developed transcription software for Epiq Singapore under a Master Software Development Agreement. Babbobox claimed it had imparted various source codes to Epiq Singapore as confidential information, subject to limited use rights. Epiq Singapore claimed ownership of the source codes under s 9.1 of the MSDA. The defendants applied under O 9 r 19 for summary determination of whether \"Source Code\" (as defined in the MSDA) forms part of \"Work Product\" (as also defined), arguing that an affirmative answer would be fatal to Babbobox's claims and discharge the interim injunction Babbobox had obtained.","decided":"The Court declined to determine the defendants' proposed question of law or construction. Answering whether the defined term \"Source Code\" falls within the defined term \"Work Product\" would not resolve Babbobox's claims or the injunction, because the real dispute concerned which specific source codes were at issue and whether they were covered by the MSDA's assignment provisions. The defendants' own pleadings confined their ownership claim to the source codes of the EpiqFAST Platforms themselves, not the other source codes Babbobox had pleaded. The Court also declined to determine Babbobox's alternative formulation.","reasoning":"The Court applied the settled test from *Hyflux Ltd v SM Investments Pte Ltd* [2020] 4 SLR 1265: summary determination requires the issue to be suitable for determination without trial and its resolution must fully determine the whole cause or matter or at least one claim or issue. The defendants' issue failed both limbs. First, the parties disputed whether the source codes mentioned in Babbobox's pleadings (including the Babbobox Search Engine and other technologies) were imparted to Epiq Singapore, incorporated into the EpiqFAST Platforms, or covered by the MSDA at all. The defendants themselves pleaded it was \"neither intended nor understood\" that EpiqFAST would incorporate Babbobox's proprietary technologies. Second, determining the definitional question would not resolve ownership because s 9.1's assignment was subject to s 9.3 (Background Technology) and s 10.2(b)(i) expressly prohibited Epiq from reverse-engineering the Babbobox Search Engine — inconsistent with sole ownership. The Court observed that even if Babbobox had not identified background technology under s 9.3, the MSDA's structure indicated Epiq did not need to own all source codes to use and exploit the Work Product. Factual findings were required on incorporation and necessity before ownership could be determined.","watch":"The reasoning on how Background Technology provisions (s 9.3) and express use restrictions (s 10.2(b)(i)) interact with general assignment clauses (s 9.1) may inform the trial court's ultimate construction of the MSDA, though the present decision is confined to case management."},"judicial_treatment":"## AUTHORITIES THAT MATTER\n\nThe court applied the established framework from *Hyflux Ltd v SM Investments Ptd Ltd* [2020] 4 SLR 1265 for the requirements of pre-trial determination under O 14 r 12, and *Manas Kumar Ghosh v MSI Ship Management Ptd Ltd* [2021] 4 SLR 935 for the court's discretion in deciding whether summary determination is appropriate, with saving of time and costs as the overriding consideration. On the question of factual disputes precluding summary determination, the court routinely applied *Aries Telecoms (M) Bhd v ViewQwest Pte Ltd* [2018] 1 SLR 108, *The \"Chem Orchid\"* [2016] 2 SLR 50, and *United Overseas Bank Ltd v Lippo Marina Collection Pte Ltd* [2016] 2 SLR 597, together with *Federal Insurance Co v Nakano Singapore (Pte) Ltd* [1991] 2 SLR(R) 982 for the requirement that questions of law be based on agreed or undisputed facts.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles governing pre-trial determination of questions of law or construction without development or clarification. The authorities cited represent long-established and uncontroversial propositions about the appropriateness of summary determination, and the court's treatment of them was entirely orthodox.","cited_cases":[]},{"title":"JFW v JFX","citation":"[2026] SGSCT 6","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGSCT_6","matched_topics":["courts and jurisdiction"],"law_shifted":false,"summary":{"bottom_line":"A subsidiary proprietor cannot frame a dispute with an MCST over wheel-clamping as a \"contract for the provision of services\" to ground Small Claims Tribunal jurisdiction. The relationship is entirely statutory under the BMSMA, and disputes must be brought before the Strata Titles Board or the courts under s 101 or s 32(10)–(11) of the BMSMA.","facts_posture":"The claimant, a subsidiary proprietor, paid a $300 wheel-clamp release fee after his car was clamped for non-display of a parking decal. He filed a claim in the Small Claims Tribunals seeking a refund, framing the dispute as breach of a \"contract for the provision of services\" said to arise from his status as proprietor, payment of management fees, and approval of his parking application. The MCST raised a jurisdictional objection, and the Tribunal heard parties on the preliminary question of whether such a contract existed.","decided":"The Tribunal held that no contract for the provision of services existed between the claimant and the MCST, and discontinued the proceedings for want of subject-matter jurisdiction under s 5(5) of the Small Claims Tribunals Act. The relationship between subsidiary proprietors and MCSTs is constituted and governed exclusively by statute—principally the BMSMA and by-laws made thereunder—not by any express, implied, bilateral, multilateral, or collateral contract. Section 32(6) of the BMSMA binds those parties \"as if\" they had executed mutual covenants, supplying the legal relationship without need for contractual overlay.","reasoning":"The Tribunal rejected three possible contractual theories. No evidence supported an express or implied bilateral contract; the absence was a natural consequence of the statutory design, not an evidentiary gap. A multilateral \"contract for services\" theory was conceptually confused: the BMSMA creates the MCST, governs its powers, authorises parking by-laws, and makes contributions recoverable as statutory debts, not contractual consideration. Layering a free-standing contract over this comprehensive statutory matrix would introduce unnecessary uncertainty about the interaction between statute and contract. The Tribunal also dismissed the claimant's \"no man's land\" argument: the Strata Titles Board has jurisdiction under s 101(1)(c) to settle disputes over exercise or performance of BMSMA powers and duties, and can award damages under s 101(3); separately, s 32(10)–(11) permits court enforcement of by-laws and damages for breach. No remedial lacuna exists to support recognising a contractual relationship where none is needed or intended by the legislative framework.","watch":"The Tribunal expressly reserved the merits, noting the claimant remains free to advance his claim in an appropriate forum. Practitioners dealing with MCST disputes should expect similar jurisdictional challenges if claims are mischaracterised as contractual rather than statutory."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe judgment cites no authorities. The Court's analysis proceeded entirely on first principles and the proper construction of the contractual documents before it, without reference to any prior case law.\n\n---\n\n**Total word count: 38 words**","cited_cases":[]},{"title":"XSQ v LLD","citation":"[2026] SGSCT 1","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGSCT_1","matched_topics":["contract"],"law_shifted":true,"summary":{"bottom_line":"The Small Claims Tribunals lack jurisdiction over claims premised on cryptocurrency transactions because cryptocurrencies are not \"goods\" within the meaning of the Sale of Goods Act 1979 — they are intangible property classified as choses in action, which s 61(1) SOGA expressly excludes from the definition of goods.","facts_posture":"The claimant purchased TerraUSD stablecoin (allegedly influenced by the respondent's platform materials) and deposited it with the respondent's cryptocurrency staking platform in exchange for interest. When TerraUSD collapsed during the 2022 crypto winter, the claimant sued in the SCT for $14,328 seeking damages for","decided":"The claim was discontinued under s 17(3) SCTA for want of jurisdiction. Para 1(a) of the SCTA Schedule requires a \"contract for the sale of goods or the provision of services.\" The Court held: (1) the claimant's own concession that she did not purchase TerraUSD from the respondent was fatal; (2) even if the respondent had sold cryptocurrency to her, no sale of \"goods\" occurred because cryptocurrencies fall outside s 61(1) SOGA; and (3) the staking arrangement was not a contract for services but created a debtor-creditor relationship analogous to a bank deposit.","reasoning":"Following the presumption that Parliament knew existing statutes when enacting the SCTA, and treating in pari materia legislation as interpretive aids, the Court adopted SOGA's definition of \"goods\": tangible personal chattels excluding choses in action and money. Cryptocurrencies fail both limbs — they are incorporeal and thus not tangible personal chattels, and they are choses in action. Rejecting the narrow literal view that choses in action encompass only enforceable legal rights, the Court adopted the broader residual category approach endorsed in *Ruscoe v Cryptopia Ltd (in liq)* [2020] NZHC 728 and supported by Fry LJ's dicta in *Colonial Bank v Whinney* (1885) 30 Ch D 261. The common law historically treated choses in action flexibly to accommodate emergent intangible property forms; viewing it narrowly would leave cryptocurrencies in a legal vacuum. On services, the ordinary meaning and Parliamentary intention (gleaned from Prof Jayakumar's second reading speech) required one party doing work for another — the staking arrangement instead created a debt.","watch":"The High Court in *CLM v CLN* [2022] 5 SLR 273 recognised cryptocurrency as property but the Court of Appeal in *Quoine v B2C2* [2020] 2 SLR 20 expressly left open what type of property it constitutes. This decision's classification as choses in action, though only from the SCT, provides persuasive reasoning should superior courts address the question directly."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the four-part test from *National Provincial Bank v Ainsworth* [1965] 1 AC 1175 to determine whether cryptocurrencies constitute property under common law, requiring that property be definable, identifiable by third parties, capable of assumption by third parties, and possess some permanence or stability. It followed *Ruscoe v Cryptopia Ltd (in liq)* [2020] NZHC 728 in both recognising cryptocurrencies as property and classifying them as things in action under a broad interpretation of that category, which represents a departure from the traditional binary classification. The Court also considered *Colonial Bank v Whinney* (1885) 30 Ch D 261 in support of this broader reading of things in action, treating the historical dichotomy between things in possession and things in action as not exhaustive of all intangible property forms. It noted that *Quoine Pte Ltd v B2C2 Ltd* [2020] 2 SLR 20 had expressly left open the question of what type of property cryptocurrencies are, which this judgment now resolves for Singapore law by adopting the New Zealand approach.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment settles, for Singapore, the classification of cryptocurrencies within the common law property framework by adopting the New Zealand High Court's methodology of expanding the things in action category rather than creating new property categories. While *CLM v CLN* [2022] 5 SLR 273 had already recognised cryptocurrencies as property, the present decision goes further by definitively categorising them, filling the gap left open in *Quoine*.","cited_cases":[]},{"title":"Create the Future LP & Anor  v Pirate Studios Pte. Ltd. & 2 Ors","citation":"[2026] SGHC 74","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_74","matched_topics":["companies","contract"],"law_shifted":true,"summary":{"bottom_line":"Quorum requirements in a company's constitution that allocate board representation between shareholder groups continue to apply even when a director's voting rights are suspended under an investor rights agreement, unless the constitution expressly provides otherwise. No term will be implied to disapply such requirements merely because suspension might otherwise create deadlock.","facts_posture":"The applicants were minority shareholders in a Singapore company whose constitution required board meeting quorums to include at least one \"Founders Director\" and one \"EPIC Director\" (appointed by the investor). The investor issued a cure notice under the investor rights agreement suspending the Founders Directors' voting rights for alleged breaches. The EPIC Directors then convened a board meeting which only they attended, passing resolutions including one to process a conversion notice that would make the investor the majority shareholder. The applicants sought declarations that the resolutions were invalid and an injunction restraining their implementation.","decided":"The resolutions were invalid. The 24 November 2025 board meeting was inquorate because it lacked the requisite attendance of at least one Founders Director, notwithstanding the suspension of those directors' voting rights. The Court refused to imply a term into the constitution that directors whose voting rights were suspended would be excluded from quorum calculations. The Court granted the declaration sought but declined the injunction, holding that the declaration itself sufficed and the parties remained free to pursue their contractual rights through arbitration.","reasoning":"Applying *Chang Benety v Tang Kin Fei* [2012] 1 SLR 274, the Court held that breach of a quorum requirement designed to protect stakeholder representation prima facie causes substantial injustice, even though such breach is technically a procedural irregularity under s 392 of the Companies Act. Here, the quorum and affirmative voting requirements served the precise purpose of preventing one board faction from outvoting another, and the resolutions in question were adverse to the founders and potentially other shareholders.\n\nNo term could be implied under the three-stage test in *Sembcorp Marine Ltd v PPL Holdings Pte Ltd* [2013] 4 SLR 193. Crucially, there was no gap: Regulation 93(1) of the constitution expressly contemplated when directors would be \"excluded for purposes of constituting a quorum\" (conflicts of interest or statutory requirements), but said nothing about suspension of voting rights. Regulation 94(2) separately contemplated suspension under the investor rights agreement, limiting its effect to disapplying affirmative voting requirements in specified circumstances — not quorum. The constitution also provided alternative mechanisms for resolving deadlock, including senior decision-maker escalation and resolutions in writing requiring only a majority of directors. The proposed term therefore failed both the business efficacy and officious bystander tests.\n\nThe Court added in obiter that if Founders Directors refused to attend a meeting convened to implement a valid contractual right of a shareholder (such as conversion), this might constitute acting against the company's best interests and potentially give rise to a conflict permitting their exclusion under Regulation 93(1)(a) — but only if specifically identified and notified in accordance with that provision.","watch":"The obiter remarks at [57] suggest that deliberate non-attendance to frustrate implementation of valid shareholder contractual rights may justify exclusion for conflict of interest. This opens a potential avenue for parties facing non-cooperation by directors whose interests diverge from contractual obligations, though the procedural requirements remain strict."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Chang Benety v Tang Kin Fei* [2012] 1 SLR 274 as the governing authority for quorum defects, affirming that where quorum requirements are designed to protect representation of different stakeholder groups, breach prima facie causes substantial injustice even without proof of actual prejudice. The Court distinguished routine quorum provisions from those serving this protective function, drawing on *Chang Benety*'s rationale to establish when the presumption of substantial injustice applies. *Sembcorp Marine Ltd v PPL Holdings Pte Ltd* [2013] 4 SLR 193 provided the three-stage framework for implying terms, which the Court applied to determine whether quorum requirements could be implied into a company's constitution. The Court also relied on *Nanyang Commercial Management Pte Ltd v Matex International Ltd* [2026] 3 SLR 136 for the proposition that injunctive relief remains discretionary even where an express constitutional term is violated, a point that appears significant given the Court's emphasis on this discretion despite finding a substantive breach.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment clarifies rather than extends the law. It applies the established *Chang Benety* framework to a fact pattern involving quorum defects and confirms that the presumption of substantial injustice is context-specific, turning on whether the quorum provision was designed to ensure stakeholder representation. The Court's treatment does not break new ground but reinforces the need to identify the purpose of procedural requirements before determining the consequence of their breach.","cited_cases":[]},{"title":"Zyfas Medical Co (Sued as a firm) v Millennium Pharmaceuticals, Inc. & Anor","citation":"[2026] SGHCR 9","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHCR_9","matched_topics":["civil procedure"],"law_shifted":true,"summary":{"bottom_line":"An assessment of costs for concluded liability proceedings may proceed without awaiting damages assessment where the pending inquiry concerns unrelated loss (here, damages for a discharged interim injunction) rather than quantum flowing from the substantive claims determined at trial. The Court of Appeal's guidance in *Lin Jian Wei* and *Freddie Koh* — that costs taxation should ordinarily await damages assessment to permit proportionality analysis — does not apply when the damages inquiry is collateral to the dispute adjudicated at trial.","facts_posture":"The respondents brought patent infringement claims against the applicant firm in HC/S 817/2019. Gill J dismissed the claims in December 2023, finding one patent invalid and the other not infringed, and awarded costs to the applicant. During the proceedings, an interim injunction had restrained the applicant's product registration from April 2020 until its discharge in October 2021. The respondents applied to defer taxation of the trial costs pending completion of a damages inquiry scheduled for April 2026 — an inquiry into loss allegedly caused by the interim injunction, not damages flowing from the dismissed infringement claims.","decided":"AR Vikram Rajaram dismissed the stay application. Where costs being taxed relate to concluded proceedings establishing legal rights whose value is not reflected in or contingent on a pending damages assessment, the Court may proceed with taxation without awaiting that assessment. The proportionality analysis required by Appendix 1 to O 59 ROC 2014 could be conducted by reference to what was at stake in the liability trial itself — the validity and infringement of patents — not the quantum of unrelated damages from interlocutory relief.","reasoning":"The Court distinguished *Lin Jian Wei* and *Freddie Koh*, both of which held that taxation should ordinarily await damages assessment to allow the taxing officer to assess proportionality against \"the stake in the controversy\". Those cases concerned bifurcated trials where liability was established but damages remained to be quantified — meaning the value of what was at stake at the liability phase could not be known until assessment. Here, the damages inquiry concerned losses from a discharged injunction, entirely separate from the substantive patent claims fully resolved at trial. The amount potentially awarded in that inquiry would not reflect what was at stake when defending the infringement allegations. The Court articulated that where the pending assessment does not arise from the substantive claims tried, its outcome is irrelevant to proportionality analysis for trial costs."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court distinguished two Court of Appeal decisions that have shaped costs assessment practice in unliquidated damages claims. *Lin Jian Wei v Lim Eng Hock Peter* [2011] 3 SLR 1052 established that trial costs in such claims should ordinarily not be assessed before damages are determined, to ensure proportionality between costs and the eventual judgment sum. The Court distinguished it on the basis that the present case involved patent infringement claims that had been wholly dismissed at trial, such that there was no damages inquiry and no risk of disproportionality. *Koh Sing Chong Freddie v Chan Cheng Wah Bernard* [2013] 4 SLR 629, which reinforced the \"incontrovertible link\" between costs and judgment amount, was distinguished on identical grounds — where liability has been entirely negatived, there is no quantum assessment to await and no judgment sum against which proportionality can be measured.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment clarifies rather than extends the law. The *Lin Jian Wei* principle remains intact for cases where liability is established but damages remain to be assessed; the Court simply confirms that the rationale for deferring costs assessment falls away entirely when the plaintiff's claim is dismissed in its entirety at trial. The decision resolves a gap in the existing framework without disturbing its conceptual foundation.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
