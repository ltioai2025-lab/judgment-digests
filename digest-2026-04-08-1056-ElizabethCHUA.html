<script>
const DIGEST_DATA = {"user_name":"Elizabeth C","digest_date":"8 April 2026","cases":[{"title":"Re: DA SHUN SHIPPING (PTE.) LTD.","citation":"[2026] SGHC 75","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_75","matched_topics":["restitution"],"law_shifted":false,"summary":{"bottom_line":"A co-debtor who pays more than its rateable share of a joint debt cannot obtain priority over unsecured creditors by claiming subrogation to the mortgagee's discharged security unless it establishes a recognised unjust factor—mere disproportion in contributions is insufficient. Additionally, admiralty claimants who forbear from arresting a vessel pursuant to a court-sanctioned consent order may obtain security over sale proceeds by agreement, even without perfecting security by arrest.","facts_posture":"Da Shun and An Wei were joint and several borrowers under a cross-collateralised loan secured by mortgages over their respective vessels. Sale proceeds from An Wei's vessel partially discharged Da Shun's share of the debt. HSBC and SG held admiralty in rem writs for misdelivery claims against Da Shun's vessel, the \"Sea Latitude\". Pursuant to a consent order under s 100(2) IRDA, the vessel was sold free of encumbrances, with balance proceeds paid into court as security for the Writ Claimants' claims pending adjudication. An Wei sought subrogation to the discharged mortgage, claiming priority over HSBC and SG. Mr Yit, as liquidator, sought directions on distribution.","decided":"An Wei's claim for subrogation failed. No recognised unjust factor existed to ground equitable relief—An Wei voluntarily assumed joint and several liability and its payment to discharge part of Da Shun's debt was consistent with the commercial risk it accepted. Contribution as an unsecured creditor was available but did not entitle An Wei to step into the mortgagee's shoes. The Writ Claimants obtained security over the balance proceeds by virtue of the s 100 Order, which constituted an enforceable agreement between Da Shun and the banks to provide security in lieu of arrest. The validity of HSBC and SG's underlying claims required trial, not summary determination on affidavits.","reasoning":"Subrogation is a remedy to reverse unjust enrichment, not to relieve hard bargains. The Court emphasised that unjust enrichment requires proof of a specific unjust factor recognised by law—failure of basis, mistake, compulsion, or similar vitiation—not abstract unfairness. An Wei paid pursuant to a pre-existing contractual obligation and received the benefit it bargained for. No expectation failed, nor was the transaction normatively defective. The decision followed *Anna Wee* and *Lowick Rose*: a claimant must point to an established ground for restitution, not invite discretionary intervention. Section 2 of the Mercantile Law Amendment Act codifies common law subrogation but does not enlarge it or dispense with the need for an unjust factor. On priority, the Court distinguished *Natixis (CA)*. While a writ in rem alone confers no security, the s 100 Order represented a consensual arrangement whereby Da Shun agreed to provide security to HSBC and SG by paying balance proceeds into court in return for their forbearance from arrest. Interpreting the order as a contract, the Court gave effect to the parties' objectively ascertained intention to replicate, as far as possible, the outcome of an admiralty arrest and judicial sale. The Court also refused subrogation on public policy grounds: granting An Wei priority two years after the sale would disrupt equitable distribution in insolvency and prejudice creditors who relied on the s 100 Order's framework. *Da Hui (HC)* was applied—no subrogation is available where the security has been spent, whether by judicial sale or court-sanctioned disposal.","watch":"The judgment expressly orders a trial of HSBC and SG's claims, which involve serious allegations that their bills of lading were fabricated. Parallel allegations are being tried in related interpleader proceedings involving other bills issued in similar circumstances. The Court invoked ss 6 and 10 IRDA to direct a trial where proof of debt disputes involve allegations of fraud or forgery requiring cross-examination. Lower courts may follow this approach in deciding when summary adjudication of proofs of debt is inappropriate."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the recent High Court decision in *Da Hui Shipping (Pte) Ltd v An Rong Shipping Pte Ltd* [2025] 4 SLR 816 to reject the claim for subrogation, holding that a mortgagee's security interest is spent when the security itself is realised to discharge the primary debt—a principle the Court now treats as settled law. The Court distinguished the foundational UK authorities on subrogation (*Banque Financière de la Cité v Parc (Battersea) Ltd* and *Menelaou v Bank of Cyprus UK Ltd*) on the basis that they concerned situations where third-party payments discharged debts, whereas here the plaintiff's own security was realised to extinguish the liability. Most significantly, the Court applied *Natixis, Singapore Branch v Seshadri Rajagopalan* [2025] 1 SLR 1020 to hold that admiralty claimants only become holders of security upon actual arrest of a vessel, not upon mere issuance of an in rem writ—a distinction that proved fatal to the plaintiff's alternative argument that it held continuing security capable of supporting a subrogation claim.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment consolidates rather than develops the law. It confirms that *Da Hui Shipping* represents the operative principle for determining when a mortgagee's security is spent, and integrates the holding in *Natixis* regarding when admiralty security crystallises into this framework. The Court reinforced that unjust enrichment claims require proof of a recognised unjust factor and cannot operate as a broad equitable discretion, reiterating guidance from *Lowick Rose* and *HMRC v The Investment Trust Companies* that had already been endorsed in local jurisprudence.","cited_cases":[{"case_name":"Liu Huaixi v Haniffa Pte Ltd","citation":"[2017] SGHC 270","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"The In-Principle Approval Letter serves to inform foreign workers of their salary in clear terms"},{"case_name":"SATS Construction Pte Ltd v Islam Md Ohidul","citation":"[2016] 3 SLR 1164","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"A successful party is entitled to costs even where counsel act pro bono"},{"case_name":"Law Society of Singapore v Kurubalan s/o Manickam Rengaraju","citation":"[2013] 4 SLR 91","court":"Court of Three Judges","jurisdiction":"Singapore","treatment":"cited","proposition":"It is permissible and honourable for counsel to act for impecunious clients where their only real hope of being paid would be through an award of costs following success in the claim"}]},{"title":"JFW v JFX","citation":"[2026] SGSCT 6","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGSCT_6","matched_topics":["courts and jurisdiction"],"law_shifted":false,"summary":{"bottom_line":"The Small Claims Tribunals has no jurisdiction over disputes between subsidiary proprietors and Management Corporations, even when framed as claims for breach of a \"contract for the provision of services.\" That relationship is constituted and governed entirely by the Building Maintenance and Strata Management Act 2004 and by-laws made thereunder, not by contract.","facts_posture":"The claimant, a subsidiary proprietor, sought to recover a $300 wheel-clamp release fee from the respondent MCST after his car was clamped for failing to display a valid parking decal. He framed his claim as arising from a \"contract for the provision of services\" concerning parking, relying on his status as owner and payment of management fees. The Tribunal Magistrate heard parties on the preliminary question of subject-matter jurisdiction.","decided":"The Tribunal discontinued the claim under s 5(5) of the Small Claims Tribunals Act 1984, holding that no contract for the provision of services existed between the claimant and the MCST. The relationship between subsidiary proprietors and MCSTs is created and governed by statute—specifically the BMSMA and by-laws constituted thereunder—and does not require or permit the superimposition of a free-standing contractual relationship. The claim therefore fell outside the SCT's jurisdiction.","reasoning":"The Tribunal identified three possible routes to finding a contract: express or implied bilateral contract, multilateral contract arising from the general proprietor-MCST relationship, or collateral contract from the parking application. All three failed because the BMSMA comprehensively governs the relationship. Section 32(6) binds the MCST and subsidiary proprietors \"as if\" they had executed mutual covenants to perform the by-laws; contributions are statutorily required and recoverable as debts, not consideration for a consensual bargain. Layering contract over this statutory matrix was both conceptually confused and unnecessary. The Tribunal rejected the claimant's \"no man's land\" argument, noting two alternative avenues: the Strata Titles Board (which can settle disputes and award damages under s 101 of the BMSMA) and the courts (which can enforce or restrain breaches of by-laws under s 32(10)–(11)). No pragmatic gap exists to justify contractual characterisation.","watch":"The decision expressly reserves all views on the merits, leaving the claimant free to pursue his claim in an appropriate forum—likely the Strata Titles Board or the courts under the statutory enforcement provisions identified at [12]–[13]."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe judgment cites no authorities. The Court's analysis proceeded entirely on first principles and the application of the Sale of Goods Act (Cap 393, 1999 Rev Ed) without reference to prior case law.\n\n---\n\n**Total word count: 38 words**","cited_cases":[]},{"title":"Create the Future LP & Anor  v Pirate Studios Pte. Ltd. & 2 Ors","citation":"[2026] SGHC 74","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_74","matched_topics":["injunctions","companies"],"law_shifted":true,"summary":{"bottom_line":"Quorum requirements in a company constitution that mandate representation from different shareholder classes (e.g. founder-appointed and investor-appointed directors) cannot be disapplied by implication merely because one class's voting rights have been suspended under a separate investor rights agreement. The suspension of voting rights does not, without express provision, eliminate the requirement for that director's *presence* at the meeting.","facts_posture":"The applicants were minority shareholders in the Company. Following alleged breaches by the founders, the lender (EPIC) issued a cure notice under the investor rights agreement (IRA) purporting to suspend the voting rights of the two founder-appointed directors. EPIC-appointed directors then convened a board meeting which the founder directors did not attend. Four EPIC directors (out of eight directors total) passed resolutions including one approving conversion of loans to equity that would make EPIC the majority shareholder. The applicants sought declarations that the resolutions were invalid for want of quorum.","decided":"The resolutions were invalid. The constitution required a quorum of a majority of directors *and* the presence of at least one founder director and one EPIC director (Regulation 89). Only the four EPIC directors attended, so the meeting was inquorate. Following *Chang Benety v Tang Kin Fei* [2012] 1 SLR 274, breach of a quorum requirement designed to protect representation of different stakeholders prima facie causes substantial injustice under s 392 of the Companies Act. No term could be implied into the constitution that suspended directors would be excluded from quorum calculations: there was no gap requiring implication, because Regulation 93(1) expressly addressed when directors may be excluded for quorum purposes (conflicts of interest), and Regulation 94(2) addressed when suspended directors' votes would not be required. The Court declined to grant the injunction sought, leaving parties to their contractual remedies.","reasoning":"The Court applied the three-stage *Sembcorp Marine Ltd v PPL Holdings Pte Ltd* [2013] 4 SLR 193 test for implying terms. No term could be implied because parties had expressly turned their minds to when directors would be excluded from quorum (Regulation 93(1)) and when affirmative votes could be dispensed with (Regulation 94(2)). The constitution distinguished between voting rights and attendance for quorum; suspension of the former did not eliminate the latter. The proposed implied term also failed the business efficacy test: alternative mechanisms existed (written resolutions under Regulation 91(1); escalation to shareholders under Regulation 94(2)). The Court followed *Chang Benety* in holding that quorum breaches, though procedural irregularities, cause substantial injustice where the requirement protects negotiated stakeholder representation. Importantly, the Court rejected EPIC's argument that deadlock would result: the constitution itself contemplated deadlock resolution mechanisms.","watch":"The Court left open (at [57]) whether directors who deliberately absent themselves to deny quorum when the business is implementing a shareholder's contractual conversion right might be acting against the company's best interests, potentially justifying their exclusion under Regulation 93(1)(a) if a good faith judgment of conflict is properly made and notified. This signals a possible escape route for lenders facing tactical non-attendance in similar conversions, though it would require specific procedural compliance not present here."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's analysis centred on two authorities. *Chang Benety v Tang Kin Fei* [2012] 1 SLR 274 was applied extensively across five paragraphs to establish that a breach of quorum requirements designed to protect the representation of different stakeholder groups prima facie causes substantial injustice—a principle the Court treated as settled law governing procedural challenges to company meetings. *Sembcorp Marine Ltd v PPL Holdings Pte Ltd* [2013] 4 SLR 193 provided the governing three-stage framework for the implication of terms into contracts, applied across five paragraphs to structure the Court's analysis of whether unwritten terms could be read into the company's constitution. The citation of *Nanyang Commercial Management Pte Ltd v Matex International Ltd* [2026] 3 SLR 136 is noteworthy for its proposition that injunctive relief remains discretionary even where there has been a clear violation of an express constitutional term—a salutary reminder that breach does not automatically yield remedy.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to the facts before it without materially developing the law. The Court treated the *Chang Benety* framework for quorum breaches and the *Sembcorp Marine* test for implied terms as established doctrine requiring straightforward application rather than refinement. There is no extension, qualification, or departure from prior authority.","cited_cases":[]},{"title":"Cheng Tim Jin v Chan Kam Piew","citation":"[2026] SGDC 124","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_124","matched_topics":["trusts"],"law_shifted":false,"summary":{"bottom_line":"A trustee does not breach trust or fiduciary duty by terminating a share sale agreement after the purchaser has failed to pay for over 14 months, even without obtaining the beneficiary's consent, where the trust deed contains no express requirement for such consent and the decision was commercially prudent. Claims for loss of chance require proof that the lost opportunity was real and substantial, not speculative — mere post-termination requests from a non-performing purchaser to extend time do not establish this.","facts_posture":"The defendant held shares in a company on trust for the claimant under a 2012 trust deed. In 2017 they agreed to sell shares to a Bangladeshi businessman (half trust shares, half the defendant's own shares) for $660,000 payable in three tranches. The purchaser paid the first $220,000 but defaulted on the second tranche due February 2018. After 14 months of silence and failed attempts to contact him, the defendant terminated the sale in April 2019. The purchaser then requested extensions but remained unresponsive. The claimant sued for breach of trust and fiduciary duty, claiming loss of $220,000.","decided":"The District Court dismissed the claim entirely. The defendant did not breach the trust deed or fiduciary duties in terminating the sale agreement. Clause 1(B) of the trust deed requiring the trustee to \"deal with\" trust shares as directed did not give the beneficiary power to direct","reasoning":"The Court applied the framework from *Winsta Holdings* on trustees' duties and section 3A of the Trustees Act 1967 on reasonable care, emphasising that trustees must act as a prudent businessman would in their own affairs, assessed contextually. The trust deed imposed no express obligation to obtain consent before exercising rights under the sale agreement; the trustee's duties were honesty, good faith, and reasonable care. On the facts, with the purchaser in repudiatory breach for over a year and unresponsive to repeated contact attempts, termination was objectively prudent — the defendant had equal financial interest in completion and no reason to terminate prematurely. The Court then applied *Asia Hotel Investments* on loss of chance claims: the plaintiff must prove as a matter of causation that the lost chance was real or substantial, not speculative. Post-termination requests to extend time, unsupported by any evidence of intention or ability to pay, did not meet this threshold. The purchaser's conduct demonstrated he \"wanted no further part of the SPA.\"","watch":"The judgment applies settled principles on trustees' duties and loss of chance without breaking new ground, but it illustrates how courts will scrutinise claims alleging fiduciary breach in commercial contexts where the trustee is also a co-venturer with equal financial interest. The Court's emphasis on objective commercial reasonableness in assessing the section 3A duty of care may be relevant in future trustee disputes involving business decisions."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the two-stage framework from *Asia Hotel Investments Ltd v Starwood Asia Pacific Management Pte Ltd and another* [2005] 1 SLR(R) 661 and *Allied Maples Group Ltd v Simmons & Simmons* [1995] 1 WLR 1602 to assess the trustee's liability for loss of chance, requiring the plaintiff to prove on a balance of probabilities that the opportunity was lost, before evaluating the chance of the opportunity yielding the claimed benefit. The application is significant because it confirms that the loss of chance methodology applies in the trust context where the alleged breach involves failure to pursue investment opportunities. The Court's treatment of *Sim Poh Ping v Winsta Holding Pte Ltd* [2020] 1 SLR 1199, *Ng Eng Ghee v Mamata Kapildev Dave* [2009] 3 SLR(R) 109, and *Credit Suisse Trust Limited v Ivanishvili* [2024] 2 SLR 164 was routine, citing them only for the settled propositions that trustees owe custodial and management stewardship duties, must observe context-appropriate standards of care, and owe fiduciary duties to act honestly and in good faith.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to its facts rather than developing new law. The extension of loss of chance analysis to trustee investment cases is implicit in earlier authority but receives clear practical application here, particularly in relation to proving both the loss of the opportunity itself and the quantum of the lost chance as separate analytical steps.","cited_cases":[]},{"title":"GENA HULASH RAM v LIM JOO HUAT ENTERPRISE PTE. LTD","citation":"[2026] SGHC 73","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_73","matched_topics":["employment law"],"law_shifted":false,"summary":{"bottom_line":"Employers of foreign work permit holders cannot treat fixed monthly allowances as payment for overtime — overtime must be calculated and paid at the declared hourly rate, without offset against any fixed allowance. The EFMA Regulations expressly prohibit fixed monthly allowances from including \"any form of overtime payment.\"","facts_posture":"The employee, a foreign worker holding a work permit, was employed as a packer. His In-Principle Approval Letter (\"IPA\") declared a basic monthly salary of $1,000, fixed monthly allowances totalling $500 (including a $300 \"Others\" allowance), and an overtime rate of $7.87 per hour. The employer treated the $300 allowance as fixed compensation for overtime, regardless of hours worked. The employee claimed unpaid overtime. The Employment Claims Tribunal magistrate accepted the employee's hours but ordered that overtime pay be offset against the $300 allowance — so only amounts exceeding $300 per month were payable. The employee appealed.","decided":"The Court allowed the appeal in full. Overtime pay cannot be offset against, or subsumed within, a fixed monthly allowance under the Employment of Foreign Manpower (Work Passes) Regulations 2012. The employee was entitled to overtime calculated at the declared rate for all hours worked, without deduction of the $300 allowance already paid. The employer's arrangement contravened Paragraph 6B of Part IV of the Fourth Schedule, which defines \"fixed monthly allowances\" as excluding \"any form of overtime payment.\"","reasoning":"Paragraph 6B expressly provides that fixed monthly allowances \"shall not include any form of overtime payment.\" By paying only the $300 allowance instead of calculating overtime at the declared rate, the employer had in effect reduced the rate of overtime pay below that declared in the work pass application, contrary to Paragraph 6A(1). The IPA evidences the key employment terms and serves to inform foreign workers clearly what they will be paid (*Liu Huaixi v Haniffa Pte Ltd* [2017] SGHC 270 applied). Section 38(4) of the Employment Act entitles a worker to payment for actual overtime hours worked — no cap or fixed sum is permissible. The magistrate's offset approach did not bring the parties' agreement into compliance with the statutory scheme.","watch":"The Court awarded costs of $9,000 all-in to the employee's pro bono counsel, applying *SATS Construction Pte Ltd v Islam Md Ohidul* [2016] 3 SLR 1164. Party-and-party costs may be awarded where counsel act pro bono for impecunious clients, without offending champertous or unjust enrichment principles."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Liu Huaixi v Haniffa Pte Ltd* [2017] SGHC 270 for the uncontroversial proposition that the In-Principle Approval Letter serves to inform foreign workers of their salary in clear terms — a straightforward citation requiring no further analysis. More significantly, the Court applied *SATS Construction Pte Ltd v Islam Md Ohidul* [2016] 3 SLR 1164 to affirm that a successful party remains entitled to costs even where counsel acts pro bono, endorsing its continuing applicability in the present costs dispute. The Court also cited *Law Society of Singapore v Kurubalan s/o Manickam Rengaraju* [2013] 4 SLR 91 for the permissibility and honorability of counsel acting for impecunious clients on the basis that their only real prospect of payment would be through a costs award following success.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to the facts without developing the law. The treatment of *SATS Construction* and *Kurubalan* reflects orthodox application of established costs principles concerning pro bono representation, with no qualification or extension of those authorities.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
