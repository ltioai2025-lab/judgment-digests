<!DOCTYPE html>
<html lang="en">
<head>

<title>Judgment Digest — 29 March 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {

  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);

  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }

  border: 1px solid var(--rule);

  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;

  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {

  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {

  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;

  color: var(--mid);

  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);

.case-detail {

@media (max-width: 768px) {

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);

  padding: 4px 0;

}

.auth-entry:last-child { border-bottom: none; }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }

mark.search-highlight { background: var(--accent-light); color: var(--accent); padding: 1px 2px; border-radius: 2px; border-bottom: 2px solid var(--accent-border); }
</style>

<script>
const DIGEST_DATA = {"user_name":"Tester 2","digest_date":"29 March 2026","cases":[{"title":"Argoglobal Underwriting Asia Pacific Pte. Ltd. & 4 Ors  v Overseas-Chinese Banking Corporation Limited","citation":"[2026] SGCA 14","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_14","matched_topics":["insurance"],"law_shifted":true,"summary":{"bottom_line":"Where a vessel capsizes but remains afloat and accessible for weeks, the shipowner cannot invoke the presumption of loss by perils of the sea if it fails to investigate the cause of the casualty. An insured claiming constructive total loss must prove — through admissible evidence from witnesses subject to cross-examination — that recovery and repair costs exceed the insured value; contemporaneous quotations and correspondence adduced only in closing submissions, without proper notice under s 32(4) of the Evidence Act, will not suffice.","facts_posture":"OCBC, mortgagee of the jackup rig \"Teras Lyza\", claimed US$56m under a marine insurance policy after the vessel capsized during a maiden wet-tow voyage from Vietnam to Taiwan in June 2018. The vessel remained capsized but afloat for 76 days; an underwater inspection was conducted, but no investigation into the cause of the capsize was undertaken. The vessel was eventually scuttled. OCBC claimed the vessel was a constructive total loss (\"CTL\") caused by perils of the sea. The Judge found for OCBC on both issues. The five appellant insurers appealed.","decided":"The Court of Appeal reversed the Judge and allowed the appeal. OCBC failed to prove that the capsize was caused by perils of the sea. It also failed to prove that the vessel was a CTL. The Court held that where a vessel is lost in circumstances capable of explanation but the insured does not investigate the cause, the rebuttable presumption of loss by perils of the sea does not apply. The insured must then directly prove the cause of the seawater ingress on a balance of probabilities. OCBC failed to do so: its expert could not identify the cause. Further, OCBC failed to prove CTL because the documents it relied upon — cost estimates and correspondence — were inadmissible hearsay, filed without the required notice under s 32(4) of the Evidence Act, and in any event did not establish repair costs exceeding the insured value.","reasoning":"The Court applied the two established methods of proving loss by perils of the sea: direct proof of a fortuitous cause, or reliance on the rebuttable presumption where the vessel is seaworthy and lost in \"wholly unexplained\" circumstances. The presumption only applies where the insured is genuinely unable to investigate the cause due to a deficit of direct evidence — typically where a vessel is lost at sea without trace. Following *The Popi M* [1985] 1 WLR 948 and *The Marel* [1994] 1 Lloyd's Rep 624, the Court held that the presumption is unavailable where direct evidence of the circumstances exists, even if the precise cause remains uncertain. Here, the vessel was accessible for 76 days; the crew survived; dive reports documented the vessel's condition; yet no investigation into the cause of seawater ingress was commissioned. OCBC's expert testified she could not identify the cause. In such circumstances, eliminating other explanations does not prove fortuity; OCBC bore the burden of propounding and proving a cause. The Court distinguished *Skandia* (1979) 26 ALR 1 and doubted its continued application post-*The Popi M*.\n\nOn CTL, the Court held that most of the relied-upon documents — cost estimates, correspondence, brokers' replies — were not \"business records\" under s 32(1)(b)(iv) of the Evidence Act because they were not made in the ordinary course of trade but were procured specifically for the insurance claim. The Court also held that OCBC's failure to file a hearsay notice under s 32(4)(b) should not have been cured, as it caused real prejudice: the insurers were deprived of the opportunity to cross-examine and adduce rebuttal evidence. Even if admitted, the documents did not prove costs exceeding US$56m; the quotes related to differing scenarios (new build, wholesale replacement) and were not based on the vessel's actual post-capsize condition.","watch":"The Court's re-statement of the \"wholly unexplained\" condition for the presumption of loss by perils of the sea imports a requirement of genuine investigative difficulty, not mere failure to identify a cause. Lower courts may apply this reasoning to deny the presumption where evidence was available but not pursued. The judgment also reinforces strict adherence to hearsay notice requirements under s 32(4) of the Evidence Act where a party seeks to prove a core element of its claim through documents adduced only in submissions."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's analysis turned primarily on *Rhesa Shipping Co SA v Herbert David Edmunds* [1985] 1 WLR 948 (\"*The Popi M*\"), following the Appellate Division's interpretation in *Chubb Insurance Singapore Ltd v Sizer Metals Pte Ltd* [2023] 1 SLR 1553 that *The Popi M* does not prohibit all inferential reasoning in cases of unexplained loss, but only prevents courts from accepting an improbable explanation simply because alternative theories have been eliminated. The Court engaged substantively with the Australian High Court's decision in *Skandia Insurance Co Ltd v Skoljarev* (1979) 26 ALR 1, which permitted inferential reasoning to establish loss by perils of the sea where the precise cause of seawater ingress remained unknown — this was treated as consonant with *The Popi M* and applied as the governing approach. Two 19th-century marine insurance cases, *Anderson v Morice* (1874) LR 10 CP 58 and *Ajum Goolam Hossen v Union Marine Insurance Co Ltd* [1901] AC 362, were cited as background authority on unexplained losses but not analysed in detail.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment applies existing principle without development. It confirms that *Chubb Insurance* correctly interpreted *The Popi M* and demonstrates the practical application of *Skandia* reasoning in the Singapore context, but does not extend or narrow the law governing proof of marine perils through inference from unexplained circumstances.","cited_cases":[]},{"title":"YAI v YAJ","citation":"[2026] SGFC 38","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGFC_38","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"A parent ordered to pay child maintenance to the care parent cannot unilaterally substitute direct payments to the child and claim compliance. The Court will not treat work attachment payments as disqualifying an adult child from maintenance under s 69(5)(c) of the Women's Charter where the child remains in full-time education and the attachment income does not demonstrably exceed maintenance needs plus attachment-related expenses.","facts_posture":"The Father was required by consent order to pay the Mother $400 monthly for their daughter and $300 monthly for their older son. He defaulted from October 2023 to March 2026. The Mother brought enforcement proceedings. The Father claimed he need not pay because (1) the daughter, while pursuing her diploma, earned income during a three-month work attachment, and (2) he had paid the older son's expenses directly by giving him an ATM card, despite the order requiring payment to the Mother.","decided":"The Father remained liable for maintenance arrears totalling $14,480. For the daughter: maintenance continued throughout her diploma course, including the work attachment period, because she remained a full-time student and the Father failed to prove that her $600 monthly attachment stipend exceeded her needs. For the older son: the Court credited the Father with 50% of the ordered maintenance during the default period, recognising his direct payments but holding that he had not proven he met all the child's needs or that the Mother made no contributions.","reasoning":"On s 69(5)(c), the Court held that while the provision permits maintenance orders for adult children in education \"whether or not while in gainful employment,\" the key question remains whether maintenance is \"necessary.\" Work attachment is an extension of education, not gainful employment. The Father bore the burden of proving the daughter's attachment income rendered maintenance unnecessary; he failed, producing no documentary evidence and relying only on inadmissible hearsay. The Court found $600 monthly plausible (versus the Father's unsubstantiated $2,200 claim) and noted attachment-related expenses (transport, meals, attire) would consume this sum. On the older son, the Court applied a broad-brush approach where precise accounting proved impossible, but emphasised that direct payments do not satisfy an order requiring payment to the care parent. The Father's unilateral variation created avoidable uncertainty—orders may only be varied by the court.","watch":"The Court awarded $3,000 costs expressly \"to reinforce the simple principle that court orders must be complied with as written unless and until they are varied by the court\"—signalling that future unilateral departures from payment terms will attract costs consequences even where some substantive maintenance obligation is discharged."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *XTG v XTH* [2025] SGFC 112 as the governing framework for maintenance enforcement proceedings, confirming that the central questions are whether the defaulting party has provided good reasons for non-payment and whether they should be excused from arrears. This is a routine application of settled Family Court practice rather than any novel engagement with authority.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment applies established principles to the facts without developing the law. The Court did not depart from, extend, or qualify any existing rule, nor did it resolve any tension in the authorities.","cited_cases":[]},{"title":"LEONG YIM LING v MOEY PARK MOON","citation":"[2026] SGHC 57","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_57","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"Retirement and cessation of employment income, without more, do not constitute material change in circumstances justifying rescission of spousal maintenance where the former husband retains substantial assets and retirement savings capable of funding the obligations. Courts will convert periodic maintenance to lump sum where parties agree, acrimony is entrenched, and default is likely.","facts_posture":"The defendant former husband applied to rescind his spousal maintenance obligations (comprising $4,000 monthly base maintenance, $300 monthly travel allowance, and $850 monthly for medical/dental/optical expenses under ancillary matters orders made in 2013 and varied in 2018) on grounds of retirement at age 67 and alleged inability to continue working. This was his third variation application; two prior applications (2015, 2018) were dismissed by Woo Bih Li J, who found the husband had voluntarily changed employment to create a pretext for reduced maintenance and doubted his claimed income decline.","decided":"Pang Khang Chau J dismissed the rescission application but converted the periodic maintenance obligations to lump sum maintenance of $364,800. The Court held that retirement did not constitute material change in circumstances where the husband owned five Malaysian properties, held insurance policies worth over $121,000, investment accounts totalling at least $92,000, CPF withdrawals of $327,000, and bank savings exceeding $378,000. The periodic obligations were replaced by lump sum to achieve clean break given protracted acrimony, repeated enforcement proceedings, and likelihood of future default.","reasoning":"The Court applied the established principle from *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 that a husband's maintenance obligation prima facie continues beyond retirement and he cannot expect complete relief by reason of retirement alone. The inquiry focuses on whether retirement, considered with overall financial circumstances, renders the husband incapable of fulfilling obligations. Retirement is foreseeable at the time maintenance orders are made and thus cannot ordinarily constitute material change unless accompanied by unexpectedly early retirement (as in ill-health cases like *VJD v VJE* [2020] SGFC 88) or demonstrable inability to pay from available assets. Following *Wong Lai Kum v Lim Khee Tee* [2012] SGHC 151 and *DIL v DIM* [2024] SGHC 139, the Court undertook detailed analysis of the husband's ability to pay from retirement savings, assets, and investment income. On lump sum conversion, the Court applied the *Wan Lai Cheng v Quek Seow Kee* [2012] 4 SLR 405 multiplier/multiplicand approach (average of wife's life expectancy at 85 and retirement age at 65, less current age) but exercised discretion to reduce the multiplier from ten to eight years and the monthly multiplicand from $4,500 to $3,800 after drawing adverse inferences from the wife's breach of disclosure orders regarding undisclosed bank accounts and credit cards.","watch":"The Court's approach to adverse inferences from disclosure breaches may embolden stricter enforcement in variation applications where parties claim impecuniosity whilst resisting transparency. The judgment signals courts will readily convert to lump sum where both parties consent and acrimony is evident, even absent the wife's agreement on quantum."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's analysis centres on reconciling two lines of authority concerning retirement as a basis for varying spousal maintenance. It reaffirmed the principle in *Foo Ah Yan v Chiam Heng Chow* and *Yow Mee Lan v Chen Kai Buan* that a husband is prima facie obliged to maintain his former wife beyond retirement, and cannot expect to be relieved entirely from this obligation by reason of retirement alone. The Court distinguished two recent Family Court decisions—*VOX v VOY* and *VJD v VJE*—which had granted substantial reductions or rescission of maintenance upon retirement, finding them inapplicable because the ex-husband in those cases lacked the assets to continue paying; here, by contrast, the husband held substantial assets yet failed to demonstrate inability to pay. Most significantly, the Court applied *DIL v DIM*, a recent High Court decision mandating detailed analysis of a husband's ability to pay maintenance from his assets and obligations when retirement is claimed as grounds for variation, treating it as the governing framework for such applications.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment does not break new ground but clarifies how existing retirement-variation principles apply where the husband possesses substantial assets. It demonstrates that *DIL v DIM* now supplies the analytical framework: retirement alone does not suffice; the Court must scrutinise whether the applicant's assets—not merely income—can sustain existing obligations. The two Family Court decisions are confined to cases of genuine asset depletion, preventing them from being used as precedents for asset-rich retirees seeking relief.","cited_cases":[]}]};
const data = DIGEST_DATA;

document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
