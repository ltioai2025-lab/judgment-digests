<script>
const DIGEST_DATA = {"user_name":"Elizabeth C","digest_date":"8 April 2026","cases":[{"title":"Re: DA SHUN SHIPPING (PTE.) LTD.","citation":"[2026] SGHC 75","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_75","matched_topics":["restitution"],"law_shifted":true,"summary":{"bottom_line":"A co-debtor who pays more than its rateable share of a joint debt has no right to be subrogated to the creditor's extinguished security interest absent proof of a recognised unjust factor. Separately, a s 100(2) IRDA order authorising sale of mortgaged property can confer security over sale proceeds on admiralty in rem claimants who agree to forbear from arrest, even though they never arrested the vessel.","facts_posture":"Da Shun and An Wei (sister companies in the Hin Leong group) were joint and several borrowers under a cross-collateralised loan from BofA secured by mortgages over their respective vessels. When An Wei's vessel was sold, proceeds were applied to discharge part of Da Shun's share of the debt. Da Shun's vessel was later sold pursuant to a s 100(2) IRDA order obtained by consent with BofA and two banks (HSBC and SG) who had issued admiralty in rem writs against the vessel for cargo misdelivery claims. The s 100 Order provided that balance proceeds after repaying BofA would be paid into court \"as security\" for HSBC and SG's claims pending adjudication. An Wei sought to be subrogated to BofA's discharged mortgage and claim priority over the balance proceeds; HSBC and SG asserted priority under the s 100 Order.","decided":"Mohan J dismissed An Wei's subrogation claim but held that HSBC and SG have security over the balance proceeds by virtue of the s 100 Order. An Wei's claim in contribution against Da Shun was allowed but ranks only as an unsecured claim. The Court directed that HSBC and SG's underlying misdelivery claims proceed to trial, as allegations that the bills of lading were fabricated could not be determined summarily on affidavits.","reasoning":"The Court reaffirmed that equitable subrogation requires proof of a recognised unjust factor within the law of unjust enrichment, following *Anna Wee* and the UK Supreme Court's decision in *Lowick Rose*. An Wei failed to identify any such unjust factor: it entered the Facility Agreement voluntarily on joint and several terms, knowingly accepted cross-collateralisation, and suffered no failure of basis or defeated expectation when BofA enforced its security. Abstract unfairness or the mere fact of overpayment does not suffice. Section 2 of the Mercantile Law Amendment Act 1856 codifies but does not expand the common law on subrogation and likewise requires proof of unjust enrichment. Subrogation was also refused on public policy grounds given An Wei's two-year delay in asserting its claim and the prejudice to HSBC and SG.\n\nThe Court distinguished *Natixis (CA)*, which held that an admiralty writ does not create security absent arrest. Here, the Writ Claimants discontinued their writs and forbore from arrest in reliance on Da Shun's agreement (embodied in the s 100 Order) to provide security in the form of the balance proceeds paid into court. Construing the s 100 Order as a consent order using contractual principles, the Court held it conferred security on HSBC and SG equivalent to that obtained by voluntary provision of security in lieu of arrest, a commonplace admiralty practice. The s 100 Order replicated as closely as possible the outcome of an admiralty arrest and judicial sale. The Court also followed *Da Hui (HC)* (affirmed by the Court of Appeal), holding that subrogation is unavailable once a security has been spent through realisation, whether by judicial sale or by private sale pursuant to a court-sanctioned s 100 order.","watch":"The Court applied *Fulcrum Distressed Partners* to direct that complex factual disputes raised in proofs of debt—here, whether bills of lading were fabricated—should be resolved at trial with pleadings, discovery, and cross-examination, rather than summarily on affidavits. This signals a willingness to order trials in insolvency contexts where serious allegations of fraud or forgery are raised, particularly where similar issues are being litigated elsewhere."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the recent High Court decision in *Da Hui Shipping (Pte) Ltd v An Rong Shipping Pte Ltd* [2025] 4 SLR 816 as the governing authority on when subrogation is unavailable, finding that the mortgagee's security interest was spent when the security itself was realised to discharge the primary debt—a principle that bound the outcome here. The Court distinguished *Natixis, Singapore Branch v Seshadri Rajagopalan* [2025] 1 SLR 1020, which had held that an admiralty claimant becomes a holder of security only upon arrest of the vessel, not upon mere issuance of a writ; this distinction was critical because the Court found that the admiralty claimant in the present case had obtained security through arrest before the mortgagee's security was realised, preserving the claimant's entitlement to subrogation. The Court relied on the UK Supreme Court's decision in *Banque Financière de la Cité v Parc (Battersea) Ltd* [1999] 1 AC 221 and *Lowick Rose LLP (in liquidation) v Swynson Ltd* [2018] AC 313 to emphasise that unjust enrichment operates as a principled body of law bound by recognised unjust factors, not as a judicial discretion to achieve fairness on a case-by-case basis.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment does not alter existing principles but applies them to clarify the interplay between admiralty arrest and subrogation. By distinguishing *Natixis* and applying *Da Hui Shipping*, the Court established that the timing of arrest relative to the realisation of mortgaged security determines whether subrogation remains available—a point not previously addressed in the reported decisions. The Court's treatment confirms that Singapore courts will rigorously apply the \"spent security\" principle from *Da Hui Shipping* while recognising that admiralty claimants acquire genuine security interests upon arrest, not merely through writ issuance.","cited_cases":[{"case_name":"Liu Huaixi v Haniffa Pte Ltd","citation":"[2017] SGHC 270","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"The In-Principle Approval (IPA) letter serves to inform foreign workers of their salary in clear terms"},{"case_name":"SATS Construction Pte Ltd v Islam Md Ohidul","citation":"[2016] 3 SLR 1164","court":"High Court","jurisdiction":"Singapore","treatment":"followed","proposition":"A successful party is entitled to costs even where counsel act pro bono"},{"case_name":"Law Society of Singapore v Kurubalan s/o Manickam Rengaraju","citation":"[2013] 4 SLR 91","court":"Court of Three Judges","jurisdiction":"Singapore","treatment":"cited","proposition":"It is permissible and honourable for counsel to act for impecunious clients where their only hope of payment is through an award of costs following success"}]},{"title":"JFW v JFX","citation":"[2026] SGSCT 6","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGSCT_6","matched_topics":["courts and jurisdiction"],"law_shifted":false,"summary":{"bottom_line":"A subsidiary proprietor cannot frame a dispute with an MCST over wheel-clamping as a \"contract for the provision of services\" to ground Small Claims Tribunal jurisdiction. The relationship is entirely statutory under the BMSMA, and disputes must be brought before the Strata Titles Board or the courts under s 101 or s 32(10)–(11) of the BMSMA.","facts_posture":"The claimant, a subsidiary proprietor, paid a $300 wheel-clamp release fee after his car was clamped for non-display of a parking decal. He filed a claim in the Small Claims Tribunals seeking a refund, framing the dispute as breach of a \"contract for the provision of services\" said to arise from his status as proprietor, payment of management fees, and approval of his parking application. The MCST raised a jurisdictional objection, and the Tribunal heard parties on the preliminary question of whether such a contract existed.","decided":"The Tribunal held that no contract for the provision of services existed between the claimant and the MCST, and discontinued the proceedings for want of subject-matter jurisdiction under s 5(5) of the Small Claims Tribunals Act. The relationship between subsidiary proprietors and MCSTs is constituted and governed exclusively by statute—principally the BMSMA and by-laws made thereunder—not by any express, implied, bilateral, multilateral, or collateral contract. Section 32(6) of the BMSMA binds those parties \"as if\" they had executed mutual covenants, supplying the legal relationship without need for contractual overlay.","reasoning":"The Tribunal rejected three possible contractual theories. No evidence supported an express or implied bilateral contract; the absence was a natural consequence of the statutory design, not an evidentiary gap. A multilateral \"contract for services\" theory was conceptually confused: the BMSMA creates the MCST, governs its powers, authorises parking by-laws, and makes contributions recoverable as statutory debts, not contractual consideration. Layering a free-standing contract over this comprehensive statutory matrix would introduce unnecessary uncertainty about the interaction between statute and contract. The Tribunal also dismissed the claimant's \"no man's land\" argument: the Strata Titles Board has jurisdiction under s 101(1)(c) to settle disputes over exercise or performance of BMSMA powers and duties, and can award damages under s 101(3); separately, s 32(10)–(11) permits court enforcement of by-laws and damages for breach. No remedial lacuna exists to support recognising a contractual relationship where none is needed or intended by the legislative framework.","watch":"The Tribunal expressly reserved the merits, noting the claimant remains free to advance his claim in an appropriate forum. Practitioners dealing with MCST disputes should expect similar jurisdictional challenges if claims are mischaracterised as contractual rather than statutory."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe judgment cites no authorities. The Court's analysis proceeded entirely on first principles and the proper construction of the contractual documents before it, without reference to any prior case law.\n\n---\n\n**Total word count: 38 words**","cited_cases":[]},{"title":"Create the Future LP & Anor  v Pirate Studios Pte. Ltd. & 2 Ors","citation":"[2026] SGHC 74","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_74","matched_topics":["injunctions","companies"],"law_shifted":true,"summary":{"bottom_line":"Quorum requirements in a company's constitution that allocate board representation between shareholder groups continue to apply even when a director's voting rights are suspended under an investor rights agreement, unless the constitution expressly provides otherwise. No term will be implied to disapply such requirements merely because suspension might otherwise create deadlock.","facts_posture":"The applicants were minority shareholders in a Singapore company whose constitution required board meeting quorums to include at least one \"Founders Director\" and one \"EPIC Director\" (appointed by the investor). The investor issued a cure notice under the investor rights agreement suspending the Founders Directors' voting rights for alleged breaches. The EPIC Directors then convened a board meeting which only they attended, passing resolutions including one to process a conversion notice that would make the investor the majority shareholder. The applicants sought declarations that the resolutions were invalid and an injunction restraining their implementation.","decided":"The resolutions were invalid. The 24 November 2025 board meeting was inquorate because it lacked the requisite attendance of at least one Founders Director, notwithstanding the suspension of those directors' voting rights. The Court refused to imply a term into the constitution that directors whose voting rights were suspended would be excluded from quorum calculations. The Court granted the declaration sought but declined the injunction, holding that the declaration itself sufficed and the parties remained free to pursue their contractual rights through arbitration.","reasoning":"Applying *Chang Benety v Tang Kin Fei* [2012] 1 SLR 274, the Court held that breach of a quorum requirement designed to protect stakeholder representation prima facie causes substantial injustice, even though such breach is technically a procedural irregularity under s 392 of the Companies Act. Here, the quorum and affirmative voting requirements served the precise purpose of preventing one board faction from outvoting another, and the resolutions in question were adverse to the founders and potentially other shareholders.\n\nNo term could be implied under the three-stage test in *Sembcorp Marine Ltd v PPL Holdings Pte Ltd* [2013] 4 SLR 193. Crucially, there was no gap: Regulation 93(1) of the constitution expressly contemplated when directors would be \"excluded for purposes of constituting a quorum\" (conflicts of interest or statutory requirements), but said nothing about suspension of voting rights. Regulation 94(2) separately contemplated suspension under the investor rights agreement, limiting its effect to disapplying affirmative voting requirements in specified circumstances — not quorum. The constitution also provided alternative mechanisms for resolving deadlock, including senior decision-maker escalation and resolutions in writing requiring only a majority of directors. The proposed term therefore failed both the business efficacy and officious bystander tests.\n\nThe Court added in obiter that if Founders Directors refused to attend a meeting convened to implement a valid contractual right of a shareholder (such as conversion), this might constitute acting against the company's best interests and potentially give rise to a conflict permitting their exclusion under Regulation 93(1)(a) — but only if specifically identified and notified in accordance with that provision.","watch":"The obiter remarks at [57] suggest that deliberate non-attendance to frustrate implementation of valid shareholder contractual rights may justify exclusion for conflict of interest. This opens a potential avenue for parties facing non-cooperation by directors whose interests diverge from contractual obligations, though the procedural requirements remain strict."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Chang Benety v Tang Kin Fei* [2012] 1 SLR 274 as the governing authority for quorum defects, affirming that where quorum requirements are designed to protect representation of different stakeholder groups, breach prima facie causes substantial injustice even without proof of actual prejudice. The Court distinguished routine quorum provisions from those serving this protective function, drawing on *Chang Benety*'s rationale to establish when the presumption of substantial injustice applies. *Sembcorp Marine Ltd v PPL Holdings Pte Ltd* [2013] 4 SLR 193 provided the three-stage framework for implying terms, which the Court applied to determine whether quorum requirements could be implied into a company's constitution. The Court also relied on *Nanyang Commercial Management Pte Ltd v Matex International Ltd* [2026] 3 SLR 136 for the proposition that injunctive relief remains discretionary even where an express constitutional term is violated, a point that appears significant given the Court's emphasis on this discretion despite finding a substantive breach.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment clarifies rather than extends the law. It applies the established *Chang Benety* framework to a fact pattern involving quorum defects and confirms that the presumption of substantial injustice is context-specific, turning on whether the quorum provision was designed to ensure stakeholder representation. The Court's treatment does not break new ground but reinforces the need to identify the purpose of procedural requirements before determining the consequence of their breach.","cited_cases":[]},{"title":"Cheng Tim Jin v Chan Kam Piew","citation":"[2026] SGDC 124","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_124","matched_topics":["trusts"],"law_shifted":true,"summary":{"bottom_line":"A trustee's decision to terminate a share purchase agreement after the buyer's 14-month failure to pay the second instalment was not a breach of trust or fiduciary duty, even without the beneficiary's consent, where the trust deed imposed no express obligation to consult and the decision was taken honestly, in good faith, and with reasonable care. Claims for loss of chance to complete the sale failed because the claimant could not prove the chance was real or substantial rather than speculative.","facts_posture":"The defendant held shares in a company on trust for the claimant under a trust deed. Both parties agreed to sell their respective shares (half from the defendant's own holding, half from the trust shares) to a third party buyer under a sale and purchase agreement providing for payment in three tranches. The buyer paid the first tranche but defaulted on the second payment, due in February 2018, by over 14 months. The defendant terminated the agreement in April 2019 after repeated unanswered attempts to contact the buyer. The claimant sued for breach of trust and fiduciary duty, claiming loss of chance to receive S$220,000 from the sale.","decided":"The District Court dismissed the claim entirely. The defendant did not breach the trust deed or his fiduciary duties by terminating the share sale agreement or refusing the buyer's subsequent request to extend the agreement's validity. A trustee's duty to administer trust property in accordance with the trust's terms is subject to the standard of care expected of an ordinary prudent businessman acting in his own affairs, assessed by reference to the circumstances at the time. Even if breach had been established, the claimant failed to prove he suffered any loss because any chance of the buyer completing the purchase was speculative, not real or substantial.","reasoning":"The Court applied the framework in *Sim Poh Ping v Winsta Holding Pte Ltd* [2020] 1 SLR 1199 on trustees' custodial and management stewardship duties, emphasising that both must be discharged in accordance with the trust's terms. Section 3A of the Trustees Act 1967 requires a trustee to exercise such care and skill as is reasonable in the circumstances, having regard to any special knowledge or experience. The trust deed here imposed no express obligation to seek the beneficiary's consent before exercising rights under the sale agreement, though the exercise of such rights remained subject to fiduciary duties of honesty, good faith, and reasonable care. Terminating the agreement after 14 months of buyer default and repeated failed attempts at contact was what a prudent businessman would do in his own affairs. On loss of chance, the Court followed *Asia Hotel Investments Ltd v Starwood Asia Pacific Management Pte Ltd* [2005] 1 SLR(R) 661, holding that where loss depends on a third party's hypothetical action, the claimant must prove a real or substantial — not speculative — chance. The buyer's conduct (14 months' silence, subsequent unresponsiveness, no indication of financial ability) rendered any chance of completion objectively speculative. The claimant also failed to prove loss from the defendant's failure to inform him of post-termination communications, as no evidence was adduced beyond the same speculative chance argument.","watch":"The decision reinforces that prudent commercial decision-making by a trustee who is himself a co-seller will not be second-guessed where the trust deed is silent on consultation requirements, provided fiduciary duties are observed. Practitioners should note the Court's emphasis on objective assessment of a third party's conduct when evaluating whether a lost chance is real or speculative — extended silence and non-performance weigh heavily against proving substantiality."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework from *Asia Hotel Investments Ltd v Starwood Asia Pacific Management Pte Ltd* [2005] 1 SLR(R) 661 and *Allied Maples Group Ltd v Simmons & Simmons* [1995] 1 WLR 1602 for adjudicating loss of chance claims, using these authorities to structure the analysis of both causation and quantum in the trustee breach context. The Court followed *Tembusu Growth Fund Ltd v ACTAtek, Inc* [2018] 4 SLR 1213 to delineate the boundary between the causation and quantum inquiries when ascertaining recoverable loss, a distinction that proved critical to the outcome. The references to *Sim Poh Ping v Winsta Holding Pte Ltd* [2020] 1 SLR 1199, *Ng Eng Ghee v Mamata Kapildev Dave* [2009] 3 SLR(R) 109, and *Credit Suisse Trust Limited v Ivanishvili* [2024] 2 SLR 164 were routine citations establishing uncontroversial propositions about trustees' duties and did not receive substantive analysis.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to its facts without developing new law. The Court's application of the loss of chance methodology to a trustee breach claim is consistent with prior authority, and there is no discernible departure from, qualification of, or extension to existing doctrine. The analysis proceeds straightforwardly within the established *Asia Hotel* and *Allied Maples* framework without addressing any unsettled questions about their scope or application.","cited_cases":[]},{"title":"GENA HULASH RAM v LIM JOO HUAT ENTERPRISE PTE. LTD","citation":"[2026] SGHC 73","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_73","matched_topics":["employment law"],"law_shifted":true,"summary":{"bottom_line":"Fixed monthly allowances declared in a work permit holder's In-Principle Approval Letter cannot include or offset overtime payments. Employers must pay the declared overtime rate for actual hours worked; any contrary arrangement — even if reflected in payslips or agreed for administrative convenience — violates the Employment of Foreign Manpower (Work Passes) Regulations 2012.","facts_posture":"The employee, an Indian national holding a work permit, was employed as a packer from December 2022 to August 2023. His IPA stated a basic salary of $1,000, fixed monthly allowances totalling $500 (including a $300 \"Others\" allowance), and an overtime rate of $7.87 per hour. The employer treated the $300 \"Others\" allowance as fixed compensation for overtime regardless of hours worked. The Employment Claims Tribunal awarded overtime pay but offset it against the $300 allowance, so the employee received only amounts exceeding $300 per month. The employee appealed.","decided":"The Court allowed the appeal in full. Overtime payments cannot be subsumed within or offset against fixed monthly allowances under the Regulations. Paragraph 6B of Part IV of the Fourth Schedule expressly excludes \"any form of overtime payment\" from the definition of \"fixed monthly allowances.\" By paying only the $300 allowance instead of calculating overtime at the declared rate, the employer effectively reduced the overtime rate below what was declared to the Controller, contrary to Paragraph 6A(1). The employee was entitled to overtime calculated at $7.87 per hour for all overtime worked, without any offset.","reasoning":"The Court applied the regulatory scheme governing work permit conditions. Drawing on *Liu Huaixi v Haniffa Pte Ltd* [2017] SGHC 270, Philip Jeyaretnam J emphasised that the IPA serves to inform foreign workers of their salary in clear, enforceable terms. The Regulations' definition of \"fixed monthly allowances\" expressly excludes overtime payments, mirroring the exclusion in the \"basic monthly salary\" definition. Allowing an offset would render the declared overtime rate meaningless and permit employers to circumvent section 38(4) of the Employment Act, which entitles workers to payment for actual overtime hours. The Magistrate's reliance on the payslip description and section 8 of the Employment Act (which voids only terms less favourable than statutory minimums) was insufficient to reconcile the arrangement with the Regulations' express prohibition.","watch":"The judgment confirms costs may be awarded where counsel act pro bono for impecunious clients, following *SATS Construction Pte Ltd v Islam Md Ohidul* [2016] 3 SLR 1164. Costs fixed at $9,000 all-in reflected substantial work done and posed no prejudice where the losing party would have paid costs regardless."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Liu Huaixi v Haniffa Pte Ltd* [2017] SGHC 270 for the proposition that the In-Principle Approval letter serves to inform foreign workers of their salary in clear terms, though the application appears routine rather than substantive. The more analytically significant citation is *SATS Construction Pte Ltd v Islam Md Ohidul* [2016] 3 SLR 1164, which the Court followed to confirm that a successful party remains entitled to costs even where counsel acts pro bono — a principle reinforced by reference to *Law Society of Singapore v Kurubalan s/o Manickam Rengaraju* [2013] 4 SLR 91 on the propriety of counsel acting for impecunious clients with payment contingent on costs awards.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without materially developing the law. The cited authorities are deployed for established propositions: the interpretation of IPA letters and the entitlement to costs where counsel acts pro bono. No extension, qualification, or departure from existing authority is evident.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
