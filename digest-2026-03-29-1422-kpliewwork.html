<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgment Digest — 29 March 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.case-card:hover { border-color: var(--faint); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.case-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(107,28,35,0.06); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}

.expand-btn {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);
  transition: all 0.15s;
  margin-top: 2px;
  cursor: pointer;
}
.expand-btn:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }
.case-card.expanded .expand-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.expand-btn span { display: inline-block; transition: transform 0.15s; }
.case-card.expanded .expand-btn span { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--rule);
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--accent-border);
}

.case-detail {
  border-top: 1px solid var(--rule);
  padding: 28px 24px 28px 70px;
  background: var(--surface-warm);
  display: none;
}
.case-card.expanded .case-detail { display: block; }

@media (max-width: 768px) {
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-detail { padding-left: 16px; }
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: inline-block;
}

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 0;
  margin-top: 10px;
}

.auth-entry { padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.auth-entry:last-child { border-bottom: none; }
.auth-entry:nth-child(even) { background: var(--surface); }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 10px; border-radius: 2px; white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }
</style>
</head>

<script>
const DIGEST_DATA = {"user_name":"Tester 1","digest_date":"29 March 2026","cases":[{"title":"CHUA JUN YANG v KANG MAY TENG, MARIA OLIVIA","citation":"[2026] SGHC 63","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_63","matched_topics":["tort"],"law_shifted":false,"summary":{"bottom_line":"Uncorroborated testimony of sexual assault in civil proceedings is insufficient where the complainant's contemporaneous conduct and communications are fundamentally inconsistent with the allegation and remain unexplained despite the court accepting that there is no typical victim response.","facts_posture":"The respondent claimed the appellant sexually assaulted her (digital penetration) at her apartment in July 2016 after a night out. They had previously been in a casual sexual relationship. She made a police report in March 2021; the police took no action. She then sued in tort. The District Judge found for the respondent and awarded $25,000 general damages, $20,000 punitive damages, and special damages. The appellant appealed.","decided":"The High Court allowed the appeal and dismissed the claim. The respondent failed to prove the sexual assault on a balance of probabilities. The Court held that the respondent's allegation was not corroborated by the appellant's text messages sent hours after the alleged assault. Further, the respondent's own WhatsApp messages on the day of the alleged assault and her subsequent conduct toward the appellant over six months — including seeking his company, attempting to restart their relationship, and expressing fear of meaning nothing to him — were unexplained and fundamentally inconsistent with the alleged assault.","reasoning":"The Court first clarified that the \"unusually convincing\" standard from criminal sexual assault cases (*AOF v Public Prosecutor*, *GCK*) applies in civil cases as a heuristic tool requiring rigorous assessment of uncorroborated evidence, though the civil standard of proof remains balance of probabilities. The District Judge had found corroboration in the appellant's message \"I apologize that I got out of control AGAIN,\" interpreting this as reference to the assault itself. The High Court rejected this, holding the message referred unambiguously to loss of emotional control during an argument, not physical control, as evidenced by an earlier incident on 1 July 2016 where the appellant similarly \"lashed out\" verbally. The respondent's own message hours later — \"we could have enjoyed each other last night and had fun and I wanted to\" — was irreconcilable with the alleged assault. Her explanation that she was de-escalating tension was rejected as inconsistent with the apologetic tone already evident in the exchange. The Court emphasised that while there is no typical victim response, the respondent's active conduct over months — frequent contact, romantic overtures, sadness at his distance, attempt to restart the relationship after learning he was dating someone else — went far beyond passivity or delayed reporting and required cogent explanation. Her claim of not understanding the gravity, self-blame, and workplace proximity was rejected as hollow given the frequency, tone, and content of her messages and her admitted \"sporadic romantic advances.\" The Court distinguished between passive delay (which may not undermine credibility) and active conduct inconsistent with the allegation (which does unless explained). The respondent's evidence contained a material internal inconsistency: her affidavit stated the appellant removed his clothes and climbed into bed \"in a matter of seconds\" before she could react, whereas her contemporaneous letters stated she warned him not to let dirty clothes touch the bed as he approached, suggesting she anticipated or saw him getting onto the bed.","watch":"The reasoning on when active post-incident conduct by a complainant undermines credibility, notwithstanding absence of a typical victim response, will likely be tested in future sexual assault claims. The Court's application of the \"unusually convincing\" standard to civil cases may require further clarification by the Court of Appeal."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's treatment of authority centres on the proper application of the \"unusually convincing\" standard for uncorroborated evidence. *Public Prosecutor v GCK* [2020] 1 SLR 486 was applied as the governing authority, the Court emphasising that the standard is a heuristic tool for rigorous assessment rather than a distinct burden of proof—a characterisation it reinforced by citing the recent High Court decision in *GII v Public Prosecutor* [2025] SGHC 38, which describes the standard as a qualitative description of testimony calibre. The Court engaged substantively with *AOF v Public Prosecutor* [2012] 3 SLR 34 to confirm that the \"unusually convincing\" standard applies to all offences where uncorroborated evidence forms the sole basis for conviction, not merely sexual offences. *Alwie Handoyo v Tjong Very Sumito* [2013] 4 SLR 308 was applied to reject any suggestion that the \"unusually convincing\" formulation creates a third burden of proof between the civil and criminal standards.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment applies settled principles without developing the law. The Court's reliance on *GCK* and *GII* confirms the now-established understanding that \"unusually convincing\" is a descriptive quality of evidence rather than a heightened standard of proof, and its citation of *AOF* reflects the uncontroversial extension of that standard beyond sexual offences to all cases resting on uncorroborated sole testimony. The analysis is orthodox and introduces no new qualifications or extensions.","cited_cases":[{"case_name":"ATS v ATT","citation":"[2016] SGHC 196","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"The approach to be taken in variation applications under s 72 and/or s 118 of the Women's Charter"},{"case_name":"BZD v BZE","citation":"[2020] SGCA 1","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"The inquiry in variation applications is whether the change is sufficiently material such that it is no longer fair to expect the status quo to remain"},{"case_name":"Tan Sue-Ann Melissa v Lim Siang Bok Dennis","citation":"[2004] 3 SLR(R) 376","court":"High Court","jurisdiction":"Singapore","treatment":"cited","proposition":"Factors to be considered in determining if a change in circumstances warrants variation of maintenance order"},{"case_name":"Foo Ah Yan v Chiam Heng Chow","citation":"[2012] 2 SLR 506","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"A husband is prima facie obliged to maintain his former wife beyond his retirement and up to the former wife's remarriage or the death of either party"},{"case_name":"Yow Mee Lan v Chen Kai Buan","citation":"[2000] 2 SLR(R) 659","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"A husband's obligation to maintain the wife would prima facie continue beyond his retirement and up to her remarriage or the death of either party"},{"case_name":"VOX v VOY","citation":"[2021] SGFC 11","court":"Family Court","jurisdiction":"Singapore","treatment":"distinguished","proposition":"Ex-husband's retirement and consequential loss in income and income earning capacity amounted to a material change in circumstances justifying variation of maintenance order"},{"case_name":"VJD v VJE","citation":"[2020] SGFC 88","court":"Family Court","jurisdiction":"Singapore","treatment":"distinguished","proposition":"Rescission of husband's spousal maintenance obligations based on depleting financial assets, lack of income, advanced years and ill-health precluding employment"},{"case_name":"Wong Lai Kum v Lim Khee Tee","citation":"[2012] SGHC 151","court":"High Court","jurisdiction":"Singapore","treatment":"considered","proposition":"Material adverse change in husband's financial circumstances due to loss of employment may justify variation of maintenance obligations"},{"case_name":"DIL v DIM","citation":"[2024] SGHC 139","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"Detailed analysis of husband's ability to pay maintenance having regard to his assets and obligations to his new family is required when considering variation due to retirement"},{"case_name":"Wan Lai Cheng v Quek Seow Kee and another appeal and another matter","citation":"[2012] 4 SLR 405","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"Formula for calculating appropriate multiplier for lump sum maintenance award"},{"case_name":"Ong Chen Leng v Tan Sau Poo","citation":"[1993] 2 SLR(R) 545","court":"High Court","jurisdiction":"Singapore","treatment":"cited","proposition":"Formula for calculating appropriate multiplier for lump sum maintenance award"},{"case_name":"WZF v WZG","citation":"[2025] SGHCF 1","court":"Family Division of the High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"When an adverse inference may be drawn against a person for concealment of evidence"},{"case_name":"BPC v BPB and another appeal","citation":"[2019] 1 SLR 608","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"cited","proposition":"When an adverse inference may be drawn against a person for concealment of evidence"},{"case_name":"Tan Teck Koon v Tong Guat Hwa","citation":"[2016] SGHCF 2","court":"Family Division of the High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"Person must have withheld production of evidence without good reasons for an adverse inference to be drawn"},{"case_name":"Leong Yim Ling v Moey Park Moon","citation":"[2019] SGHC 26","court":"High Court","jurisdiction":"Singapore","treatment":"considered","proposition":"Previous decision dismissing husband's applications to vary maintenance obligations"}]},{"title":"HO REI, JETHRO & Anor  v CHU JIAT BOON TIMOTHY","citation":"[2026] SGDC 100","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_100","matched_topics":["civil procedure"],"law_shifted":false,"summary":{"bottom_line":"When seeking approval under O 9 r 9(7) ROC to file an interlocutory application outside the single application pending trial (SAPT) regime, a party must identify the grounds upon which the intended application will be based — not merely the type of application. The requirement to state \"the essence of the intended application\" in O 9 r 9(8) means the substantive basis for the relief sought, though without detailed argument on merits.","facts_posture":"The claimants obtained default judgment after the defendant failed to enter an appearance. The defendant then sought approval under O 9 r 9(7) ROC to file an application to set aside the default judgment. The initial permission request identified the nature of the application (\"setting aside judgment\") and stated it was necessary \"to enable the Defendant to contest the action and allow the matter to be adjudged on the merits,\" but did not state whether the challenge was for irregularity or on the basis of a prima facie defence. The claimants objected that the request failed to satisfy the \"essence\" requirement in O 9 r 9(8).","decided":"The Court held that O 9 r 9(8) requires a requesting party to identify the grounds for the intended application, not just the application type. \"Essence\" means the intrinsic basis upon which relief is claimed. Merely identifying that one intends to file, say, a setting-aside application is insufficient.","reasoning":"The Court applied purposive interpretation under O 3 r 1(2) ROC. The word \"essence\" in O 9 r 9(8) means more than application type; its ordinary meaning requires identifying the intrinsic basis for relief. Without knowing the grounds, the court cannot assess necessity, the opposing party cannot respond meaningfully, and potentially frivolous applications cannot be filtered out. Setting out grounds is distinct from arguing merits — the former is required at approval stage, the latter is not (following *Hertel Singapore Pte Ltd v Cheng Swee Guan* [2025] 4 SLR 1571 at [18], [32]). Requiring grounds does not amount to pre-litigation; it simply ensures both court and opponent understand the case to be met. The SAPT regime's purpose — streamlining pre-trial process and preventing piecemeal litigation — supports this interpretation. Adopting a \"two-track\" approach (grounds required for some applications but not others) would be unattractive and inconsistent with the Rules.","watch":"The Court observed, in obiter, that save in cases of abuse or where an application is plainly hopeless, \"it is generally a formidable task for a claimant to resist the grant of approval to a defendant to file an application to set aside a default judgment.\" Lower courts may apply this observation generously when defendants seek to set aside defaults, regardless of the strength of the prima facie defence disclosed at approval stage."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Hertel Singapore Pte Ltd (now known as Altrad Services Singapore Pte Ltd) and another v Cheng Swee Guan and others* [2025] 4 SLR 1571 as the governing authority for the burden of proof under O 9 r 9(7) of the Rules of Court 2021, confirming that the requesting party must demonstrate that an intended application is necessary at the present stage of proceedings. The two other cited authorities — *Dorsey James Michael v World Sport Group Pte Ltd* and *Constitutional Reference No 1 of 1995* — were invoked only for the uncontroversial proposition that statutory provisions must be read harmoniously with their context and legislative purpose.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies existing principles without development. The Court straightforwardly followed *Hertel Singapore* on the necessity requirement under O 9 r 9(7), and the statutory interpretation authorities were cited for routine propositions only.","cited_cases":[]}]};

    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');
  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) { card.classList.remove('hidden'); } else { card.classList.toggle('hidden', !card.dataset.searchable.includes(q)); }
  });
});
</script>
