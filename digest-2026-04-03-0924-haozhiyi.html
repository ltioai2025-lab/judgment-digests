<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgment Digest — 3 April 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.case-card:hover { border-color: var(--faint); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.case-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(107,28,35,0.06); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}

.expand-btn {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);
  transition: all 0.15s;
  margin-top: 2px;
  cursor: pointer;
}
.expand-btn:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }
.case-card.expanded .expand-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.expand-btn span { display: inline-block; transition: transform 0.15s; }
.case-card.expanded .expand-btn span { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--rule);
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--accent-border);
}

.case-detail {
  border-top: 1px solid var(--rule);
  padding: 28px 24px 28px 70px;
  background: var(--surface-warm);
  display: none;
}
.case-card.expanded .case-detail { display: block; }

@media (max-width: 768px) {
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-detail { padding-left: 16px; }
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: inline-block;
}

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 0;
  margin-top: 10px;
}

.auth-entry { padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.auth-entry:last-child { border-bottom: none; }
.auth-entry:nth-child(even) { background: var(--surface); }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 10px; border-radius: 2px; white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }

mark.search-highlight { background: var(--accent-light); color: var(--accent); padding: 1px 2px; border-radius: 2px; border-bottom: 2px solid var(--accent-border); }
</style>
</head>
<body>
<div class="page-wrapper">
<header>
<div class="header-label">Judgment digest</div>
<div class="header-title" id="digest-title"></div>
<div class="header-meta" id="digest-meta"></div>
<div class="stats-row" id="stats-row"></div>
</header>
<input class="search-bar" type="text" placeholder="Search cases, topics, or cited authorities..." id="search-input" />
<div class="filters" id="filters"></div>
<div id="case-list"></div>
<footer>Generated based on your registered topic preferences.<br><em>This does not constitute legal advice.</em></footer>
</div>
<script>
const DIGEST_DATA = {"user_name":"Hao Zhiyi","digest_date":"3 April 2026","cases":[{"title":"YAP SIU CHENG V YAP SUI CHENG WENDY & ANOR","citation":"[2026] SGHC 71","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_71","matched_topics":["trusts"],"law_shifted":true,"summary":{"bottom_line":"An executor's duty to account extends only to assets actually received as part of the deceased's estate and how they have been dealt with. It does not entitle a beneficiary to interrogate the executor about items the beneficiary suspects might have existed or ought to have been found. The duty to account is distinct from (and does not encompass) the executor's duty to make sufficient inquiry when calling in estate assets.","facts_posture":"The claimant beneficiary sued her two sisters, who were executors of their late mother's will, seeking to compel them to answer detailed questions about items she believed should have been included in the Schedule of Assets filed in the probate proceedings. She also claimed that a Honda Stream registered in the second defendant's name was held on trust for their parents. The executors had already filed the Schedule of Assets, distributed some items, and provided bank statements and a professional valuation report for the household contents.","decided":"The Court dismissed both claims. The executors were not required to answer questions that did not concern estate assets actually received by them, including questions about items allegedly missing from a safe deposit box, the contents of their late father's briefcase three years before the mother's death, jewellery items not found after extensive searches, and a Panamanian entity with no proof of parental ownership. The Honda Stream was not held on trust; the claimant failed to prove the parents paid for it or that any trust (express, common intention constructive, or resulting) existed. The Court also declined to order a full account of the estate administration, finding the executors had already rendered sufficient account during the proceedings.","reasoning":"The Court applied established principles from *Lakshmi Prataprai Bhojwani v Moti Harkishindas Bhojwani* and *Foo Jee Boo v Foo Jhee Tuang* to distinguish an executor's duty to account from the duty to make sufficient inquiry when calling in assets (the latter deriving from *Chye Seng Kait v Chye Seng Fong*). The duty to account concerns assets actually received and the executor's dealings with them; it does not require answering speculative questions about what might have been part of the estate. The Court rejected the claimant's attempt to advance an unpleaded case based on alleged failure to make sufficient inquiry, applying the general rule in *V Nithia v Buthmanaban* and *How Weng Fan v Sengkang Town Council* that parties are bound by their pleadings. Even if considered, the unpleaded case failed: the Court found no evidential basis to conclude that purported missing items (jewellery not seen for years, bank accounts last evidenced over a decade before death) remained part of the estate. The Court also applied *Chng Weng Wah v Goh Bak Heng* to find that an actual account had been rendered during proceedings, making any further order oppressive.","watch":"The judgment does not address what constitutes \"sufficient inquiry\" when executors face ambiguous evidence about potential assets, though it emphasises reasonableness depends on the circumstances. Practitioners should note the Court's treatment of professional valuation reports (here, accepted as sufficient particularisation despite grouped items like \"assorted glasswares\") and its willingness to find an account rendered through correspondence and affidavit evidence during litigation."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied a trio of High Court authorities to establish and apply the well-settled principles governing an executor's duty to account. *Foo Jee Boo v Foo Jhee Tuang* [2016] SGHC 260 and *Foo Jee Seng v Foo Jhee Tuang* [2012] 4 SLR 339 were applied for the uncontroversial proposition that beneficiaries need not allege breach to demand accounts—the duty arising from the fiduciary relationship itself. More substantively, *Lakshmi Prataprai Bhojwani v Moti Harkishindas Bhojwani* [2019] 3 SLR 356 was applied as the governing authority on the scope of the duty to account, with the Court drawing on *Lalwani Shalini Gobind v Lalwani Ashok Bherumal* [2017] SGHC 90 to clarify that the duty pertains only to estate assets actually received by the executor. *Ng Chee Tian v Ng Chee Pong* [2025] SGHC 246, a very recent decision, was applied for the orthodox formulation of what a proper executor's account should contain.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment is a routine application of settled principles to the facts. The law concerning an executor's duty to account has been stable since at least 2012, and the Court did nothing to extend, narrow, or otherwise modify the established framework. The treatment of *Lalwani* clarifies—without breaking new ground—that the duty to account is confined to assets actually within the executor's control, but this is confirmation rather than innovation.","cited_cases":[{"case_name":"PT Sandipala Arthaputra v STMicroelectronics Asia Pacific Pte Ltd and others","citation":"[2018] 4 SLR 828","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"Two-step approach to determine whether contempt has been committed"},{"case_name":"Mok Kah Hong v Zheng Zhuan Yao","citation":"[2016] 3 SLR 1","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"The requisite mens rea for contempt of court"},{"case_name":"Tay Kar Oon v Tahir","citation":"[2017] 2 SLR 342","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"considered","proposition":"Factors to consider in sentencing for civil contempt"}]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
