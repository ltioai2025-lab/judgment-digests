<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgment Digest — 29 March 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-light: #f9f2f3;
  --accent-mid: #8a2630;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --faint: #c8c8c8;
  --rule: #e0e0e0;
  --surface: #f8f8f8;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--white);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

@media (max-width: 640px) {
  .container { padding: 24px 16px 60px; }
  .header-title { font-size: 22px; }
  .case-name { font-size: 17px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .stats-row { gap: 20px; }
}

/* Header */
header {
  padding-bottom: 24px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--rule);
}

.header-rule {
  width: 40px;
  height: 3px;
  background: var(--accent);
  margin-bottom: 20px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--light);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 6px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 2px;
}

.stat-label {
  font-size: 11px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Search and filters */
.search-bar {
  width: 100%;
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 28px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 4px 12px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--faint); background: var(--surface); }
.filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

/* Case cards */
.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.12s;
}
.case-card:hover { border-color: var(--faint); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 16px 20px;
  cursor: pointer;
  gap: 12px;
  user-select: none;
}

.case-chevron {
  font-size: 10px;
  color: var(--faint);
  min-width: 12px;
  padding-top: 6px;
  transition: transform 0.15s;
}
.case-card.expanded .case-chevron { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line {
  font-size: 12px;
  color: var(--light);
}

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 20px 12px 44px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 20px 16px 44px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Expanded detail */
.case-detail {
  border-top: 1px solid var(--rule);
  padding: 24px 20px;
  display: none;
}
.case-card.expanded .case-detail { display: block; }

.section { margin-bottom: 20px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.section-text {
  font-size: 14px;
  color: var(--dark);
  line-height: 1.75;
}

/* Authorities */
.auth-box {
  background: var(--surface);
  border-radius: 4px;
  padding: 14px 16px;
  margin-top: 10px;
}

.auth-entry {
  padding: 8px 0;
  border-bottom: 1px solid var(--rule);
}
.auth-entry:last-child { border-bottom: none; }

.auth-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.auth-name {
  font-family: var(--serif);
  font-size: 14px;
  font-style: italic;
  color: var(--dark);
}

.auth-treatment {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 2px;
  white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); }
.treat-considered { color: var(--mid); background: var(--surface); }
.treat-cited { color: var(--light); background: var(--surface); }
.treat-approved { color: #1a5c38; background: #eaf5ed; }

.auth-prop {
  font-size: 12px;
  color: var(--light);
  line-height: 1.55;
  margin-top: 3px;
}

.case-link {
  display: block;
  padding: 12px 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: 0.3px;
  border-top: 1px solid var(--rule);
  transition: background 0.1s;
}
.case-link:hover { background: var(--surface); }

footer {
  text-align: center;
  padding: 28px 0;
  font-size: 12px;
  color: var(--light);
  border-top: 1px solid var(--rule);
  margin-top: 28px;
  line-height: 1.7;
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
<header>
<div class="header-rule"></div>
<div class="header-label">Judgment digest</div>
<div class="header-title" id="digest-title"></div>
<div class="header-meta" id="digest-meta"></div>
<div class="stats-row" id="stats-row"></div>
</header>
<input class="search-bar" type="text" placeholder="Search cases, topics, or cited authorities..." id="search-input" />
<div class="filters" id="filters"></div>
<div id="case-list"></div>
<footer>Generated based on your registered topic preferences.<br><em>This does not constitute legal advice.</em></footer>
</div>
<script>
const DIGEST_DATA = {"user_name":"Tester 2","digest_date":"29 March 2026","cases":[{"title":"LEONG YIM LING v MOEY PARK MOON","citation":"[2026] SGHC 57","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_57","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"Retirement alone does not justify rescinding spousal maintenance obligations; what matters is whether the former husband retains the financial ability to continue paying. The Court may nonetheless convert periodic maintenance to a lump sum where the parties' history of acrimony and repeated defaults make a clean break desirable.","facts_posture":"The parties divorced in 2013. The ancillary matters order imposed spousal maintenance of $4,000 per month plus additional sums for travel and medical expenses (later varied to a fixed $850 per month). The husband, now 67 and retired, applied to rescind his maintenance obligations entirely, arguing retirement and advanced age constituted a material change in circumstances. He had previously failed in two similar applications in 2015 and 2018. The wife, aged 65 and a full-time carer for their adult son with Asperger's Syndrome, opposed rescission but agreed that periodic maintenance should be converted to a lump sum if the application failed.","decided":"Pang J dismissed the application for rescission but converted the husband's periodic maintenance obligations to a lump sum of $364,800 (eight years at $3,800 per month, discounted from $4,500 to reflect an adverse inference). The Court held there was no material change in circumstances: retirement was foreseeable when the original order was made, and the husband had sufficient assets, savings, and CPF withdrawals to continue paying maintenance. The Court rescinded the husband's obligation to pay 95% of the wife's hospital bills, treating this as part of the lump sum.","reasoning":"The Court applied the settled principle from *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 and *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506 that a husband is prima facie obliged to maintain his former wife beyond retirement until remarriage or death of either party. Retirement cannot be treated as a material change in circumstances because it is entirely foreseeable at the time the original maintenance order is made. The inquiry must focus instead on whether retirement, together with the husband's overall financial circumstances, renders him incapable of meeting his obligations. Pang J distinguished cases like *VOX v VOY* [2021] SGFC 11 and *VJD v VJE* [2020] SGFC 88, in which rescission was granted, noting that in those cases there was no evidence of continuing income or the husband had retired unexpectedly early due to ill health. Here, the husband owned five Malaysian properties, held insurance policies and investments worth over $200,000, had withdrawn $327,000 from CPF, and retained savings exceeding $378,000. The husband's submission that spousal maintenance should not create a \"lifetime dependency\" was rejected as an argument more properly made at the ancillary hearing; a variation court should not revisit the appropriateness of the original order absent material change. Pang J drew an adverse inference against the wife for failing to comply with three disclosure orders concerning undisclosed bank accounts and the identity of a lender, reducing the multiplicand accordingly. The Court approved a lump sum award to achieve a clean break given the parties' protracted litigation and the husband's history of defaulting on periodic payments.","watch":"The Court left undisturbed the principle that arguments against \"lifetime dependency\" should be raised at the ancillary hearing, not on variation. This reinforces that the variation jurisdiction is not a backdoor to relitigating settled issues, though the point may be tested if a future applicant can show genuine supervening hardship unrelated to retirement itself."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *BZD v BZE* [2020] SGCA 1 for the governing test on material change in circumstances, but the judgment's most significant engagement was with the retirement cases. The Court distinguished two recent Family Court decisions—*VOX v VOY* [2021] SGFC 11 and *VJD v VJE* [2020] SGFC 88—both of which had found retirement constituted material change justifying variation or rescission of maintenance. In contrast, the Court applied *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506 and *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 for the proposition that a husband's prima facie obligation to maintain his ex-wife continues beyond retirement, requiring detailed analysis of his actual ability to pay rather than treating retirement as dispositive. The Court also applied *DIL v DIM* [2024] SGHC 139, a recent decision emphasising the need for granular examination of a retired husband's financial capacity when considering variation applications.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not break new ground but clarifies the application of established retirement principles in the maintenance variation context. By distinguishing the Family Court decisions and reaffirming the High Court authorities, the Court signals that retirement alone does not constitute material change—courts must conduct a detailed inquiry into whether the husband retains actual ability to pay from assets, passive income, or other sources. The treatment suggests a more rigorous evidential burden on husbands seeking variation on retirement grounds than the Family Court decisions might have implied.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '"><div class="case-header" onclick="toggleCard(this)"><span class="case-chevron">&#9654;</span><div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div></div><div class="case-bottom-line">' + (sp.bottom_line || '') + '</div><div class="case-tags">' + topicTags + shiftTag + '</div><div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');
  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) { card.classList.remove('hidden'); } else { card.classList.toggle('hidden', !card.dataset.searchable.includes(q)); }
  });
});
</script>
</body>
</html>
