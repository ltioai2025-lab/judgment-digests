<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Judgment Digest — 29 March 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.case-card:hover { border-color: var(--faint); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.case-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(107,28,35,0.06); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}

.expand-btn {

  height: 32px;
  min-width: 32px;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);
  transition: all 0.15s;
  margin-top: 2px;
  cursor: pointer;

.expand-btn:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }
.case-card.expanded .expand-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.expand-btn span { display: inline-block; transition: transform 0.15s; }
.case-card.expanded .expand-btn span { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--rule);
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--accent-border);
}

.case-detail {
  border-top: 1px solid var(--rule);
  padding: 28px 24px 28px 70px;
  background: var(--surface-warm);
  display: none;
}
.case-card.expanded .case-detail { display: block; }

@media (max-width: 768px) {
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-detail { padding-left: 16px; }
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: inline-block;
}

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 0;
  margin-top: 10px;
}

.auth-entry { padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.auth-entry:last-child { border-bottom: none; }
.auth-entry:nth-child(even) { background: var(--surface); }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 10px; border-radius: 2px; white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }
</style>
</head>

<script>
const DIGEST_DATA = {"user_name":"Tester 2","digest_date":"29 March 2026","cases":[{"title":"Argoglobal Underwriting Asia Pacific Pte. Ltd. & 4 Ors  v Overseas-Chinese Banking Corporation Limited","citation":"[2026] SGCA 14","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_14","matched_topics":["insurance"],"law_shifted":true,"summary":{"bottom_line":"Insureds claiming under marine insurance policies on the basis that a vessel was lost by \"perils of the seas\" must prove fortuity either by propounding a cause for seawater ingress, or by satisfying the twin conditions for invoking the rebuttable presumption: seaworthiness and loss in wholly unexplained circumstances. The presumption does not apply where the casualty can be investigated but the shipowner elects not to do so, even if no positive cause is ultimately advanced.","facts_posture":"A jackup rig capsized during its maiden voyage under tow from Vietnam to Taiwan. The vessel, insured under a marine insurance policy incorporating ITC terms, remained afloat in capsized state for 76 days before being scuttled. The mortgagee, OCBC, claimed the vessel was a constructive total loss caused by perils of the seas. The insurers denied liability, alleging unseaworthiness and lack of proof of constructive total loss. The High Court found for OCBC. The insurers appealed.","decided":"The Court of Appeal allowed the appeal. OCBC failed to prove that the capsize was caused by perils of the seas. Although the vessel was seaworthy at departure, the loss did not occur in wholly unexplained circumstances—the vessel capsized but remained accessible for inspection for weeks, yet no investigation into the cause of seawater ingress was undertaken. OCBC's expert could not identify the cause of ingress. Without propounding a cause, OCBC could neither prove fortuity directly nor invoke the presumption. Separately, OCBC failed to prove constructive total loss. Documents relied upon to prove repair costs exceeding insured value were inadmissible hearsay (not business records made in the ordinary course) and, in any event, did not establish the cost threshold.","reasoning":"The Court clarified the framework for proving loss by perils of the seas. Direct proof requires propounding a cause for seawater ingress proven on the balance of probabilities; the presumption applies only where the vessel is seaworthy and lost in wholly unexplained circumstances, meaning the insured cannot investigate or determine the cause due to a deficit of direct evidence. The Court rejected OCBC's formulation that any seawater ingress into a seaworthy vessel raises a presumption. Following *The Popi M* and *The Marel*, the Court held that where direct evidence is available or the vessel remains accessible for investigation, the presumption cannot be invoked. Elimination of improbable causes does not suffice if the propounded cause is itself improbable or absent. Here, the vessel's accessibility, crew survival, and available survey evidence meant the loss was not wholly unexplained. On constructive total loss, the Court held that cost estimates and correspondence obtained to support the claim were not business records under s 32(1)(b)(iv) EA—they were prepared for litigation, not in the ordinary course of trade. The judge erred in admitting them and in curing OCBC's failure to give notice under s 32(4)(b) EA, which caused real prejudice.","watch":"The Court expressly doubted whether SCOPIC salvage costs should count towards \"cost of recovery and/or repair\" for constructive total loss purposes, citing *Connect Shipping* but not finally deciding the point. The judgment also clarifies that hearsay documents adduced only at closing submissions, without witness evidence, will rarely be admitted—a stricter approach than some prior practice may have permitted."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court engaged most substantively with the line of English authorities concerning proof of loss by perils of the seas where the precise cause remains unexplained. It applied *Glowrange Ltd v CGU Insurance plc* [2001] All ER (D) 339 (Jun) as the governing framework, accepting that inferential reasoning remains available even when the loss is not wholly unexplained, provided the insured proves seaworthiness and eliminates non-fortuitous causes on the balance of probabilities. The Court distinguished *Brownsville Holdings Ltd v Adamjee Insurance Co Ltd* [2000] 2 All ER (Comm) 803, which had suggested the traditional presumption operates only when loss is wholly unexplained, concluding that *Glowrange* correctly represents the law and that the presumption remains a subset of the broader inferential approach. It carefully analysed *Skandia Insurance Co Ltd v Skoljarev* (1979) 26 ALR 1, noting the High Court of Australia's willingness to infer an unidentified fortuitous event caused seawater ingress where seaworthiness was established, but acknowledged the doubts cast on this approach by the UK Supreme Court in *Global Process Systems Inc v Syarikat Takaful Malaysia Bhd* [2012] 1 All ER (Comm) 111. The Court applied the Singapore Court of Appeal's interpretation in *Chubb Insurance Singapore Ltd v Sizer Metals Pte Ltd* [2023] 1 SLR 1553 of the *Rhesa* principle, emphasising that courts must not accept improbable possibilities merely because they are less improbable than alternatives.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies Singapore's adoption of the *Glowrange* framework for proving marine losses and confirms that the older \"presumption\" of loss by perils of the seas where a vessel disappears without trace is simply a particular application of inferential reasoning rather than a distinct legal rule. This represents a refinement rather than a departure: the Court has expressly aligned Singapore law with modern English authority while acknowledging unresolved tensions in Commonwealth jurisprudence about how far inferential reasoning may extend when no specific fortuitous event can be identified.","cited_cases":[]},{"title":"YAI v YAJ","citation":"[2026] SGFC 38","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGFC_38","matched_topics":["family law"],"law_shifted":false,"summary":{"bottom_line":"A parent cannot unilaterally bypass a maintenance order's payment terms by making direct payments to the child instead of the care parent. Section 69(5)(c) of the Women's Charter permits maintenance for adult children in education even where they earn income during compulsory work attachments, provided maintenance remains \"necessary\" — a fact-sensitive inquiry that accounts for both the income received and attachment-related expenses incurred.","facts_posture":"The Father defaulted on maintenance payments totalling $700 monthly ($400 for the daughter, $300 for the older son) from October 2023 to March 2026 under a consent order requiring payment to the Mother as care parent. The daughter turned 21 in January 2024 while still pursuing her diploma, which included a three-month work attachment paying approximately $600 monthly. The Father claimed he was excused from paying because the daughter earned income and because he paid the son's expenses directly using an ATM card the sons could access. The Mother applied to enforce the arrears.","decided":"The Court ordered the Father to pay $14,480 in arrears: $9,980 for the daughter (after crediting $320 in verified payments) and $4,500 for the son (50% of the ordered amount). Maintenance remained payable for the daughter throughout her studies despite work attachment income, as the Father failed to prove the $600 monthly payment exceeded both her attachment-related expenses and maintenance needs. The Father could not satisfy his maintenance obligation by making direct payments to the older son using an ATM card when the order required payment to the Mother.","reasoning":"Section 69(5)(c) permits courts to order maintenance for adult children \"receiving instruction at an educational establishment... whether or not while in gainful employment.\" The Court held this phrase does not eliminate the central statutory requirement that maintenance be \"necessary\" — it merely prevents automatic disqualification where a student works part-time. Where an adult child earns income, necessity remains a factual question. Here, the Father bore the burden under ss 103–104 of the Evidence Act to prove the daughter's work attachment income rendered maintenance unnecessary. He failed: his claim of $2,200 monthly earnings rested on inadmissible hearsay, and he adduced no evidence that $600 monthly covered both her attachment expenses (meals, transport, work attire) and living costs. On mode of payment, the Court emphasised that maintenance orders prescribe how payment must be made, not merely that some support be provided. Allowing unilateral substitution creates the very uncertainty the order was designed to prevent. The Court credited some direct payments pragmatically but refused to endorse the approach or treat it as varying the order.","watch":"The Court explicitly stated that crediting the Father's direct payments was \"pragmatic recognition\" of what occurred, \"not an endorsement\" — signalling this will not be treated as precedent for departing from ordered payment modes. The costs award ($3,000) was framed as reinforcing compliance principles rather than punishment."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *XTG v XTH* [2025] SGFC 112 as the governing framework for maintenance enforcement proceedings, adopting its two-stage inquiry: whether the defaulting parent has provided good reasons for default and whether they should be excused from paying arrears. This represents a straightforward application of recent Family Court authority to materially identical facts.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop the law. It applies established principles from *XTG v XTH* to a maintenance enforcement dispute without qualification or extension.","cited_cases":[]},{"title":"LEONG YIM LING v MOEY PARK MOON","citation":"[2026] SGHC 57","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_57","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"Retirement and cessation of employment income, standing alone, do not constitute a material change in circumstances justifying rescission of spousal maintenance obligations where the former husband retains sufficient assets and alternative financial resources to continue meeting those obligations from retirement savings.","facts_posture":"The parties divorced in 2013. An ancillary matters order imposed maintenance obligations on the husband totalling $5,150 per month (comprising periodic maintenance, medical/dental/optical expenses, and travel). The husband, now 67 and retired since August 2024, applied to rescind all maintenance obligations on grounds of retirement and advanced age. This was his third variation attempt; two prior applications (in 2015 and 2018) were dismissed by Woo Bih Li J, the latter on the basis that the husband could not relitigate whether his earlier job change justified reduced maintenance.","decided":"The Court dismissed the rescission application but converted the periodic maintenance obligations to a lump sum of $364,800. The husband's retirement did not constitute a material change in circumstances warranting rescission. The Court found the husband possessed five Malaysian properties, insurance policies worth $121,491, investment accounts totalling at least $92,310, CPF withdrawals of $327,381, and bank savings of at least $378,749.","reasoning":"Applying *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 and *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506, the Court confirmed that a husband is prima facie obliged to maintain his former wife beyond retirement. Retirement is foreseeable at the time a maintenance order is made and therefore does not, without more, constitute a material change arising after the ancillary matters hearing. Following *VOX v VOY* [2021] SGFC 11, *VJD v VJE* [2020] SGFC 88, and *DIL v DIM* [2024] SGHC 139, the inquiry focuses on whether retirement, considered with the husband's overall financial circumstances, renders him incapable of fulfilling maintenance obligations. The husband's substantial assets demonstrated continued ability to pay from retirement savings. The Court drew an adverse inference against the wife for failing to comply with three disclosure orders concerning undisclosed bank accounts and credit cards, reducing the multiplicand from $4,500 to $3,800 monthly and rescinding hospital/surgical bill obligations. The Court applied the *Wan Lai Cheng* multiplier/multiplicand approach, adopting an eight-year multiplier (discounted from the formulaic ten years given the wife's age of 65).","watch":"The Court left open what multiplier discount from the *Wan Lai Cheng* formula is appropriate where adverse inferences are drawn against the maintenance recipient's disclosed needs. The reasoning on adverse inferences affecting both multiplicand and specific maintenance heads may inform future disclosure disputes in variation applications."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework from *BZD v BZE* [2020] SGCA 1 and *ATS v ATT* [2016] SGHC 196 for the threshold question in variation applications: whether the change is sufficiently material that it is no longer fair to expect the status quo to remain. More significantly, the Court distinguished two recent Family Court decisions — *VOX v VOY* [2021] SGFC 11 and *VJD v VJE* [2020] SGFC 88 — both of which had granted variation or rescission upon retirement, emphasising that those cases involved husbands who had fully retired with depleting assets and no alternative income sources, whereas the present husband remained in employment. The Court applied *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506 and the Court of Appeal's holding in *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 for the principle that a husband's maintenance obligation prima facie continues beyond retirement, reinforcing that retirement alone does not automatically warrant variation. The Court also drew on *DIL v DIM* [2024] SGHC 139 for the proposition that a detailed analysis of the husband's assets and obligations is required when assessing ability to pay post-retirement.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not break new ground but provides useful clarification on how courts should approach retirement-related variation applications. It confirms that the cases permitting variation on retirement grounds turn heavily on their particular facts — specifically, whether the husband has genuinely ceased all income-earning activity and faces asset depletion — and should not be read as establishing a general rule that reaching retirement age or reducing work hours suffices as a material change. The Court reinforced that the continuing obligation principle in *Yow Mee Lan* remains robust absent clear evidence of inability to pay.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');
  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) { card.classList.remove('hidden'); } else { card.classList.toggle('hidden', !card.dataset.searchable.includes(q)); }
  });
});
</script>
