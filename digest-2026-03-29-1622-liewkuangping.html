<script>
const DIGEST_DATA = {"user_name":"Tester 3","digest_date":"29 March 2026","cases":[{"title":"HYATT TERMINAL AND INDUSTRIAL CORPORATION  v FILIPINAS THIRD MILLENIUM REALTY CORPORATION","citation":"[2026] SGHC(I) 3","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHCI_3","matched_topics":["arbitration"],"law_shifted":true,"summary":{"bottom_line":"A contractual prohibition on assignment to \"third parties\" without consent does not carve out an exception for affiliates simply because the lessee is defined to include \"affiliated companies, successors and assigns.\" Where general law already prohibits assignment without consent (as under Art 1649 of the Philippine Civil Code), an additional contractual prohibition on assignment to third parties does not create a positive right to assign to affiliates.","facts_posture":"HTIC (lessor) and TPC (lessee) entered into a lease in 2000 over industrial land in the Philippines. The lease defined TPC to include \"affiliated companies, successors and assigns\" and prohibited assignment of rights and obligations to \"any third party\" without HTIC's consent (Art 20.2), though it permitted TPC to \"assign its rights\" to \"its assignees\" without consent for sublease purposes (Art 7(ii)). In 2021, TPC purported to assign the lease to FTMRC, a company within the same corporate group, without HTIC's consent. An ICC tribunal found by majority that FTMRC was an affiliate and the assignment valid. HTIC applied to set aside the award under Art 34(2)(a)(i) of the Model Law, arguing FTMRC was not a proper party to the arbitration agreement.","decided":"The Court set aside the award. HTIC's consent was required for the assignment to FTMRC even if FTMRC was an affiliate. Art 1649 of the Philippine Civil Code prohibits assignment by a lessee without the lessor's consent unless there is a stipulation to the contrary. Art 20.2 of the lease did not amount to such a contrary stipulation permitting assignment to affiliates. The phrase \"third party\" in Art 20.2 meant \"third party to the Lease Agreement\" — any non-signatory — not \"non-affiliate.\"","reasoning":"The Court reasoned that Art 20.2 could not derogate from the general prohibition in Art 1649 simply by adding an express prohibition against assignment to third parties without consent. As a matter of logic, a general prohibition is not limited by the addition of a specific prohibition covering a subset of cases. The literal meaning of \"third party\" is any party other than the two signatories; reading it as \"non-affiliate\" would introduce indeterminacy as to which entities fall outside that category. The inclusion of \"affiliated companies, successors and assigns\" in the definition of TPC merely echoed the legal truism that contracts bind assigns and did not create advance consent for assignment to affiliates. Art 7(ii), which permitted assignment of rights to \"assignees\" without consent, applied only to existing assignees in the context of subleases and liens, not future assignments of the lease itself. The dissenting arbitrator had correctly noted that TPC's own conduct in 2016 — seeking HTIC's consent for an assignment to an affiliate — supported the interpretation that consent was required. The Court also held that even if rights could be assigned, obligations could not be transferred without consent under Philippine law (novation requires the obligee's consent per Art 1293), but severance would save a valid assignment of rights if one existed.","watch":"The Court declined to admit an affidavit obtained after the arbitration filing deadline, despite finding a de novo review permits fresh evidence in principle, because it was of limited relevance absent full inquiry into the circumstances of its making. This suggests the Court may apply a relevance and cogency filter even on jurisdictional challenges, rather than mechanically applying the modified *Ladd v Marshall* test endorsed in *Sanum*."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the framework from *AQZ v ARA* [2015] 2 SLR 972 and *COT v COU* [2023] SGHC 69 governing the admission of fresh evidence in applications to set aside arbitral awards on jurisdictional grounds, treating these as establishing the operative test in this context. The Court considered but did not follow the modified *Ladd v Marshall* approach articulated in *Government of the Lao People's Democratic Republic v Sanum Investments Ltd* [2015] 2 SLR 322 and affirmed by the Court of Appeal in *Sanum Investments Ltd v Government of the Lao People's Democratic Republic* [2016] 5 SLR 53, signalling a divergence between the test for admitting fresh evidence in jurisdictional challenges to awards versus other setting-aside grounds. The citation of the Philippine Supreme Court's decision in *Benguet Corp v Cabildo* appears routine, invoked for the uncontroversial proposition that parties' conduct may illuminate ambiguous contractual terms.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment clarifies that the framework for admitting new evidence differs depending on the ground relied upon in a setting-aside application. By applying *AQZ v ARA* and *COT v COU* rather than the modified *Ladd v Marshall* test from the *Sanum* litigation, the Court appears to endorse a bifurcated approach: jurisdictional challenges attract a distinct (and possibly more permissive) evidential threshold than other setting-aside grounds. This represents an incremental development, distinguishing between procedural contexts within s 24 of the International Arbitration Act rather than announcing a wholly new rule.","cited_cases":[{"case_name":"ATS v ATT","citation":"[2016] SGHC 196","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"A variation application under s 72 and/or s 118 of the Women's Charter is not a de novo application and it is presumed that the final maintenance order was appropriate at the time it was made."},{"case_name":"BZD v BZE","citation":"[2020] SGCA 1","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"The inquiry in a variation application is whether the change is sufficiently material such that it is no longer fair to expect the status quo to remain."},{"case_name":"Foo Ah Yan v Chiam Heng Chow","citation":"[2012] 2 SLR 506","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"A husband is prima facie obliged to maintain his former wife beyond his retirement and up to the former wife's remarriage or the death of either party."},{"case_name":"Yow Mee Lan v Chen Kai Buan","citation":"[2000] 2 SLR(R) 659","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"A husband paying monthly maintenance could not expect to be relieved entirely from this obligation by reason of retirement."},{"case_name":"Wan Lai Cheng v Quek Seow Kee and another appeal and another matter","citation":"[2012] 4 SLR 405","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"The appropriate multiplier for a lump sum maintenance award is typically calculated by taking the average of the average life expectancy of a woman and the usual retirement age of a Singapore male worker less the wife's present age."}]},{"title":"SANTOS-TUMALIP MARIA MONALYN BAGAPORO v PUBLIC PROSECUTOR","citation":"[2026] SGHC 64","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_64","matched_topics":["criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"An accused in remand who reaches out for Pro Bono SG assistance within a day of sentencing, completes CM papers within days of the legal clinic, but misses the 14-day appeal deadline because she mistakenly believed she needed confirmed representation in place before appealing, may obtain an extension of time where the effective delay is minimal and the appeal is not hopeless — provided the","facts_posture":"The applicant was sentenced to 21 months and 8 weeks' imprisonment on 13 November 2025 for property offences. Her counsel discharged herself after sentencing. The next day, the applicant's sister contacted Pro Bono SG on her behalf. The 14-day appeal deadline expired on 27 November 2025 without an appeal being filed. Pro Bono SG held a legal clinic with the applicant on 1 December 2025. She prepared her CM papers by 5 December but could not file until 12 December because SPS needed time to procure a Commissioner for Oaths. She applied for an extension of time to file her notice of appeal.","decided":"The Court granted the extension. Under s 380(1) CPC, the Court may permit a late appeal if it is in the interests of justice. Following *Lim Hong Kheng*, the Court applied the three-factor test: length of delay, explanation for delay, and prospects of appeal. The higher \"substantial injustice\" threshold from *Pang Chie Wei* (requiring new material undermining the conviction or sentence) did not apply because the facts did not demonstrate acceptance of the sentence. The effective six-working-day delay was not significant; the explanation — though weak in isolation — was accepted given the applicant's prompt attempts to secure representation; and the appeal prospects were not so poor as to warrant summary dismissal.","reasoning":"The Court endorsed *Adeeb Ahmed Khan*'s framework: the *Pang Chie Wei* threshold requiring \"new material\" only applies where delay stems from acceptance of the decision such that the appeal is an afterthought. Several factors negatived acceptance here: the sentence significantly exceeded defence submissions; the applicant contacted Pro Bono SG immediately; and the delay was minimal. On the *Lim Hong Kheng* factors, the Court calibrated scrutiny to the delay's brevity. The applicant's claim that she thought the deadline awaited confirmed representation was, standing alone, \"an all too convenient excuse\" that would fail in most cases. But her conduct — reaching out the day after sentencing and filing promptly after the clinic — was consistent with that misapprehension rather than dilatory behaviour. The Court emphasised that short delays do not warrant only perfunctory scrutiny, warning applicants not to treat deadlines casually. On prospects, the Court noted the sentencing judge's brief grounds constrained dismissing the appeal at this stage.","watch":"The Court's allowance was expressly tied to wanting fuller grounds from the sentencing judge, suggesting limited written reasons may influence extension applications where an appeal's prospects cannot be robustly assessed from existing materials."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the framework from *Adeeb Ahmed Khan s/o Iqbal Ahmed Khan v Public Prosecutor* [2022] 2 SLR 1197 and *Lim Hong Kheng v Public Prosecutor* [2006] 3 SLR(R) 358 as governing the analysis of whether to extend time to file an appeal. The critical engagement was with *Public Prosecutor v Pang Chie Wei* [2022] 1 SLR 452, which the Court distinguished on the basis that the applicant there had accepted the merits of the trial court's decision, thereby justifying a heightened \"substantial injustice\" threshold; the distinction matters because it clarifies that the *Pang Chie Wei* threshold applies only where the failure to appeal stemmed from acceptance of the decision's merits, not in other cases of delay.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies the scope of *Pang Chie Wei* rather than extending or unsettling existing principles. By distinguishing *Pang Chie Wei*, the Court confirms that the elevated \"substantial injustice\" standard is not universal but context-specific, applying only where delay results from the applicant's initial acceptance of the adverse decision. The application of the standard *Adeeb Ahmed Khan* and *Lim Hong Kheng* framework to the facts was orthodox, with no new ground broken in the general approach to extension-of-time applications.","cited_cases":[]},{"title":"Vanbo Investments Pte Ltd v ph. AG & Anor","citation":"[2026] SGHC 65","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_65","matched_topics":["civil procedure","conflict of laws"],"law_shifted":true,"summary":{"bottom_line":"A worldwide Mareva injunction will be set aside where the claimant fails to establish either a real risk of dissipation or a good arguable case, even if only one limb fails. Where multiple competing jurisdiction clauses exist across related agreements, courts determine which clause governs by identifying the agreement with the closest connection to the \"pith and substance\" of the dispute. Material non-disclosure at an ex parte hearing — including misrepresenting the claimant's prior knowledge of","facts_posture":"Vanbo Investments Pte Ltd, a Singapore holding company, invested CHF1.5m in ph AG, a Swiss company, for shares and exclusive Asia-Pacific licensing rights for a beverage product. Disputes arose over alleged share dilution, misrepresentations about shareholding maintenance, and mandatory use of specific product components. Vanbo commenced proceedings in Singapore and obtained a worldwide Mareva injunction ex parte. The defendants applied to set aside the injunction and stay the proceedings on grounds of forum non conveniens and the existence of an arbitration clause. Multiple agreements governed different aspects of the relationship: an Investment Agreement (Singapore law, non-exclusive Singapore jurisdiction), a Shareholders' Agreement (Swiss law, exclusive Swiss jurisdiction), a License Agreement (ICC arbitration in Switzerland), and others.","decided":"The Court set aside the worldwide Mareva injunction and stayed the proceedings. Vanbo failed to establish a real risk of dissipation: the defendants' assets were not primarily liquid funds, no credible evidence s","reasoning":"The Court applied *Bouvier* and *JTrust Asia*: a claimant seeking worldwide Mareva relief must prove both a good arguable case and a real risk of dissipation through \"solid evidence,\" with more exacting scrutiny for worldwide relief. On dissipation risk, the Court followed *Continental Shipping Line*, holding that asset liquidity alone cannot establish risk, and that dealings in the ordinary course of business do not demonstrate unjustified asset disposal. Where a claimant possesses full knowledge of a defendant's financial position and voluntarily accepts associated risks, such circumstances cannot subsequently establish dissipation risk (*Continental Shipping* applied). On competing jurisdiction clauses, the Court adopted the \"pith and substance\" test from *Bunge SA* and *Oei Hong Leong*, examining which agreement bears the closest connection to the dispute's commercial centre. The Shareholders' Agreement's supremacy clause, its comprehensive treatment of shareholder rights, and Vanbo's own pleadings all pointed to Swiss jurisdiction for investment disputes. Applying *Vinmar Overseas*, the Court held that where an exclusive jurisdiction clause governs, the \"strong cause\" test under *The Eleftheria* replaces *Spiliada* forum non conveniens analysis. The Court distinguished *Donohue v Armco* (which prioritised avoiding fragmentation) and followed *Asiana Airlines* (which held that contractual forum selection cannot be overridden merely to avoid fragmentation when parties deliberately chose different dispute resolution mechanisms for different claims).","watch":"The judgment contains significant obiter on forum fragmentation: the Court endorsed the *Asiana Airlines* approach that parties receive the benefit of their contractual bargain even where this fragments proceedings, rejecting *Donohue*'s prioritisation of consolidation. Lower courts may rely on this in anti-suit injunction applications. The Court's analysis of competing jurisdiction clauses — particularly its willingness to give effect to different clauses governing different aspects of a commercial relationship — may influence how courts approach suite-of-agreements cases."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework in *Bouvier, Yves Charles Edgar v Accent Delight International Ltd* [2015] 5 SLR 558 and *JTrust Asia Pte Ltd v Group Lease Holdings Pte Ltd* [2018] 2 SLR 159 for Mareva injunctions without elaboration, treating the real risk of dissipation test as settled. More substantively, the Court engaged with *Bunge SA v Shrikant Bhasi* [2020] 2 SLR 1223 and *Oei Hong Leong v Goldman Sachs International* [2014] 3 SLR 1217 to determine which of several competing dispute resolution clauses governed the claims, applying the objective intention test to identify the applicable clause by reference to the nature and subject matter of each claim. The Court also applied *Vinmar Overseas (Singapore) Pte Ltd v PTT International Trading Pte Ltd* [2018] 2 SLR 1271 for the \"strong cause\" test governing stays in favour of exclusive jurisdiction clauses, and *Asiana Airlines, Inc v Gate Gourmet Korea Co, Ltd* [2024] 2 SLR 279 for the approach to forum fragmentation concerns in the arbitration context, clarifying how those concerns apply when different claims are properly subject to different dispute resolution mechanisms.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to a complex multi-party, multi-contract dispute without developing new law. The Court's application of the objective intention test from *Bunge* and *Oei Hong Leong* to parse competing jurisdiction and arbitration clauses across multiple related agreements illustrates the mechanics of that test but does not extend or qualify it. The Court's treatment of forum fragmentation concerns under *Asiana Airlines* confirms that such concerns do not override parties' contractual allocation of disputes to different fora where the relevant clauses are clear and govern distinct subject matter.","cited_cases":[]},{"title":"CHUA JUN YANG v KANG MAY TENG, MARIA OLIVIA","citation":"[2026] SGHC 63","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_63","matched_topics":["tort"],"law_shifted":true,"summary":{"bottom_line":"The General Division reversed the trial judge's finding of sexual battery where the victim's account was uncorroborated, her conduct after the alleged assault was inconsistent with it, and contemporaneous messages contradicted her explanation for that conduct. Corroboration requires independent evidence that materially supports the allegation itself — self-serving accounts given years later do not qualify. The decision illustrates the rigour required when evaluating uncorroborated allegations in civil cases, even where the standard of proof remains balance of probabilities.","facts_posture":"The respondent alleged the appellant digitally penetrated her vagina without consent on 10 July 2016 after she invited him to her apartment for sex then changed her mind. The parties had been in a casual sexual relationship; whether it had ended by that date was disputed. More than four and a half years later, the respondent made a police report; the police declined to prosecute. She sued for battery. The District Judge awarded $25,000 general damages, $20,000 punitive damages, and special damages. The appellant appealed.","decided":"The Court allowed the appeal and dismissed the claim. The respondent had not proved the alleged sexual assault on a balance of probabilities. The text messages exchanged on 10 July 2016 did not corroborate the allegation of assault; the appellant's apology for getting \"out of control AGAIN\" referred to loss of emotional control (an argument), not physical control. The respondent's own message later that day — \"we could have enjoyed each other last night and had fun and I wanted to\" — was inconsistent with the alleged assault. Her subsequent conduct over six months (actively seeking the appellant's company, making romantic advances, inviting him to stay overnight, and later attempting to restart the relationship) was unexplained and fundamentally inconsistent with her allegation.","reasoning":"Chua Lee Ming J treated this as a case requiring rigorous assessment of uncorroborated evidence. He accepted that the \"unusually convincing\" heuristic applies in civil cases involving uncorroborated allegations (following *WOC v WOD* [2023] SGFC 22), though the burden remains balance of probabilities. But he found the victim's evidence *was* said to be corroborated below, so the standard did not strictly arise. The Court rejected the trial judge's finding that the messages corroborated the assault. The appellant's apology for getting \"out of control AGAIN\" had to be interpreted by reference to prior incidents. The only prior incident was on 1 July 2016, when the appellant lost emotional control and \"lashed out\" in an argument — not physical control. The trial judge's inference that the apology referred to the assault was therefore untenable. The Court also rejected self-serving letters and statements to a psychiatrist as corroboration, emphasising that corroborative evidence must be independent. On the victim's conduct, the Court acknowledged there is no typical reaction to sexual assault (*Thangarajan Elanchezhian v PP* [2024] 6 SLR 507), but held that conduct inconsistent with the allegation must be credibly explained. The respondent's explanation — that she tried to \"de-escalate\" and \"return to normalcy\" — was not borne out by the messages, which showed her actively seeking the appellant out over months and expressing fear of \"meaning nothing\" to him. Her stated \"warped belief\" that restarting the relationship would make the assault not matter was contradicted by contemporaneous evidence showing jealousy over the appellant's new relationship.","watch":"The Court left open whether the \"unusually convincing\" standard always applies in civil cases involving serious allegations of sexual misconduct, though it endorsed the approach in principle. Practitioners should note the Court's emphasis on evaluating the *credibility* of explanations for post-incident conduct against objective contemporaneous evidence, not just their theoretical plausibility."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established appellate framework in *Tat Seng Machine Movers Pte Ltd v Orix Leasing Singapore Ltd* [2009] 4 SLR(R) 1101 for reviewing factual findings, requiring findings to be against the weight of evidence or plainly wrong before intervention. More significantly, it engaged with *AOF v Public Prosecutor* [2012] 3 SLR 34 and *Public Prosecutor v GCK* [2020] 1 SLR 486 on the \"unusually convincing\" standard for uncorroborated testimony, applying the *GCK* clarification that this is a heuristic tool for rigorous assessment rather than a distinct legal test—a refinement that matters because it emphasizes the evaluative nature of the inquiry rather than suggesting a heightened burden. The Court also applied *Alwie Handoyo v Tjong Very Sumito* [2013] 4 SLR 308 for the proposition that no intermediate burden exists between civil and criminal standards, situating the \"unusually convincing\" language within orthodox evidential analysis. *Thangarajan Elanchezhian v Public Prosecutor* [2024] 6 SLR 507 was applied for the uncontroversial principle that victims' reactions to sexual offences vary.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop the law but applies settled principles governing appellate review of factual findings and assessment of uncorroborated testimony in sexual offence cases. The application of *GCK*'s characterization of \"unusually convincing\" as a heuristic rather than a legal test is orthodox, reflecting the position since 2020 without further elaboration or extension.","cited_cases":[]},{"title":"Mustaqim Bin Abdul Kadir v PUBLIC PROSECUTOR","citation":"[2026] SGCA 15","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_15","matched_topics":["criminal law","criminal procedure and sentencing","abuse of process"],"law_shifted":true,"summary":{"bottom_line":"An application to adduce fresh evidence on appeal will be dismissed as an abuse of process where counsel had expressly considered calling psychiatric experts at trial to support a state-of-mind defence but deliberately chose not to do so, and now seeks to run that contradictory defence on appeal under the guise of fresh evidence.","facts_posture":"The appellant was convicted on a capital charge of trafficking not less than 56.8g of diamorphine. His trial defence was that 42.62g represented two bundles mistakenly delivered which he intended to return (\"Unwanted Drugs defence\"). He also challenged the admissibility of seven CNB statements on grounds of inducement. He appealed his conviction and sentence, and filed a criminal motion to adduce psychiatric evidence suggesting he was disoriented due to drug withdrawal when his statements were recorded, rendering them inadmissible (\"State of Mind Defence\").","decided":"The Court of Appeal dismissed both the criminal motion and the appeal. The fresh evidence failed the *Ladd v Marshall* test because: (i) it was available at trial — counsel had consulted a psychologist and psychiatrist about withdrawal symptoms but elected not to call them; (ii) the application constituted an abuse of process, being an attempt to secure a retrial on a contradictory defence; and (iii) the evidence was not material, as contemporaneous medical examinations s","reasoning":"The Court applied *Ladd v Marshall*'s three conditions (non-availability, materiality, reliability) as attenuated for criminal appeals per *Azuin bin Mohd Tap v PP* [2025] 1 SLR 259, but emphasised that even the relaxed test cannot permit tactical forum-shopping. Following *Masri Bin Hussain v PP* [2025] SGCA 9 and *Khetani v Kanbi* [2006] EWCA Civ 1621, the Court held it an abuse of process for a party to deliberately withhold evidence at trial, then seek to adduce it on appeal — particularly where doing so would require running an inconsistent defence. The record showed counsel had taken instructions on withdrawal symptoms but stopped when the Prosecution indicated it would not rely on the long statements in its case-in-chief, only to cross-examine with them later. Counsel never called the psychologist or psychiatrist. The Court found it contrived that the appellant claimed confusion prevented him mentioning the specific quantity (46.62g) that would take him below the capital threshold, when he had presence of mind to allegedly understand inducements and concoct detailed lies in response. On the substantive appeal, the Court applied *Jumadi bin Abdullah v PP* [2022] 1 SLR 814 to hold that the MDP Notice cannot objectively constitute an inducement by virtue of Explanation 2(aa) to s 258(3) CPC, regardless of how the accused subjectively understood it.","watch":"The Court's reasoning that inconsistent defences can render a fresh evidence application abusive may gain traction in appeals where accused persons attempt to run alternative cases sequentially rather than cumulatively at trial, particularly where counsel has expressly considered but forgone a line of defence."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the flexible approach to admitting fresh evidence in criminal appeals articulated in *Azuin bin Mohd Tap v Public Prosecutor* [2025] 1 SLR 259, which relaxes the strict *Ladd v Marshall* [1954] 1 WLR 1489 conditions in favour of a focus on relevance and reliability. More significantly, it extended the abuse of process principle from *Anan Group (Singapore) Pte Ltd v VTB Bank (Public Joint Stock Co)* [2019] 2 SLR 341—previously applied in civil contexts—to criminal appeals, holding that a deliberate tactical decision to proceed without evidence at trial cannot be reversed on appeal after an adverse outcome. This extension was reinforced by the recent decision in *Masri Bin Hussain v Public Prosecutor* [2025] SGCA 9, which the Court applied to hold that seeking to adduce fresh evidence to run a contradictory defence on appeal constitutes an abuse of process. The Court also followed *Public Prosecutor v Gunasilan Rajenthiran* [2022] 3 SLR 861 regarding the appropriate weight to be given to statements made to psychiatrists.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies that the abuse of process doctrine limiting fresh evidence applications—well-established in civil appeals—applies with equal force in criminal appeals where the accused deliberately withholds evidence at trial for tactical reasons. While the Court acknowledges that criminal appeals receive more latitude under *Azuin*, it confirms that this flexibility does not permit strategic gamesmanship. The reliance on the very recent *Masri* decision suggests the Court of Appeal is actively consolidating this principle across criminal fresh evidence applications.","cited_cases":[]},{"title":"ANDY TAN POH WENG v JEE LEE","citation":"[2026] SGDC 102","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_102","matched_topics":["civil procedure","damages"],"law_shifted":true,"summary":{"bottom_line":"A plaintiff who claims accident-related aggravation of pre-existing degenerative conditions bears the burden of proving causation on admissible evidence; expert opinion founded on incorrect factual premises can be rejected, and belated amendment of tax returns to inflate pre-accident income will destroy credibility on loss of earnings claims.","facts_posture":"The plaintiff sued for injuries from a 2010 rear-end collision. He was discharged from hospital the same day with analgesia and neck pain. Fourteen years later, at assessment of damages, he claimed nearly $2 million, alleging the accident aggravated pre-existing spondylolisthesis and cervical spondylosis and caused psychiatric injury. The defendant admitted liability at 95% but disputed causation. The Deputy Registrar awarded $10,608.10. The plaintiff appealed on quantum; the defendant cross-appealed seeking return of the $89,391.90 balance of a $100,000 interim payment.","decided":"All appeals were dismissed. The accident caused only a whiplash injury, chest contusion, and annular tears — not aggravation of degenerative spinal conditions or psychiatric harm. The plaintiff failed to prove causation for the fusion surgery or psychiatric symptoms (which first arose after a subsequent 2011 accident). No loss of earnings was recoverable: the plaintiff's own case s","reasoning":"The Court applied the evidentiary framework from *Britestone Pte Ltd v Smith & Associates Far East, Ltd* [2007] 4 SLR(R) 855: once the defendant showed the plaintiff experienced no back pain for 14 days post-accident and alternative causes existed (heavy manual work, natural degeneration), the burden shifted back to the plaintiff to rebut. He failed. Expert evidence attributing aggravation to the accident rested on four premises, including immediate post-accident symptoms; the absence of contemporaneous complaint undermined the opinion's foundation. The Court endorsed the Deputy Registrar's rejection of expert opinion under *Eu Lim Hoklai v PP* [2011] 3 SLR 167: experts assist but do not decide; judges must evaluate all evidence and are entitled to reject opinion lacking foundation. The plaintiff's credibility was destroyed by ex post facto amendment of 2008–2009 tax returns (trebling reported income) with no employer CPF contributions, and selective private treatment for accident-related claims but public treatment for stage-four cancer. On costs, indemnity costs on the High Court scale were warranted post-Calderbank offer under proportionality principles in *Lin Jian Wei v Lim Eng Hock Peter* [2011] SGCA 29: the plaintiff pursued a $1.95 million claim, and costs must reflect the complexity introduced.","watch":"On registrar's appeals from assessment hearings, fresh evidence is subject to a modified *Ladd v Marshall* test (*Lassiter Ann Masters v To Keng Lam* [2004] 2 SLR(R) 392): the non-availability limb is relaxed, requiring only \"sufficiently strong reasons\" for non-production below, though relevance and credibility remain. Any application for repayment of excess interim payment under O 29 r 17 must be made before judgment is perfected."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's treatment of authority was largely routine, applying settled principles to the facts before it. On the procedural question of admitting fresh evidence on a registrar's appeal, the Court reconciled the *Ladd v Marshall* framework with the confirmatory jurisdiction recognised in *Lassiter Ann Masters v To Keng Lam*, holding that while the strict *Ladd v Marshall* test applies to final appeals, a judge hearing a registrar's appeal retains discretion to admit fresh evidence as part of the rehearing function. This was reinforced by reference to *COD v COE*, which elaborates on the approach where evidence was available at first instance but not adduced. The Court also applied *Anan Group (Singapore) Pte Ltd v VTB Bank* to confirm that *Ladd v Marshall* need not be rigidly applied in interlocutory contexts, though in this case the evidence was admitted on the basis of the confirmatory jurisdiction rather than any relaxation of the test.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment does not break new ground but provides useful clarification on the interaction between the *Ladd v Marshall* test and the confirmatory jurisdiction on registrar's appeals. The Court's analysis confirms that the rehearing function identified in *Augustine Zacharia Norman* and *Tan Boon Heng v Lau Pang Cheng David* permits the admission of fresh evidence without satisfying all three *Ladd v Marshall* conditions, distinguishing the position from that applicable to final appeals. Otherwise, the judgment is a straightforward application of established principles on damages assessment, costs, and interest.","cited_cases":[]},{"title":"Argoglobal Underwriting Asia Pacific Pte. Ltd. & 4 Ors  v Overseas-Chinese Banking Corporation Limited","citation":"[2026] SGCA 14","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_14","matched_topics":["evidence"],"law_shifted":true,"summary":{"bottom_line":"An insured shipowner cannot prove loss by \"perils of the sea\" unless it either propounds a fortuitous cause for the seawater ingress or proves the vessel was lost in wholly unexplained circumstances. The presumption of loss by perils of the sea only applies where the vessel sank without trace or investigation is impossible — not where it capsized, remained afloat for weeks, and the owner elected not to investigate. A constructive total loss claim requires proof of actual repair/recovery costs exceeding insured value; the insured cannot rely on hearsay quotations adduced only in closing submissions without calling the makers to testify.","facts_posture":"OCBC, as mortgagee and co-assured under a marine hull and machinery policy, claimed the jackup rig *Teras Lyza* was a constructive total loss after it capsized during a wet tow from Vietnam to Taiwan. The vessel did not sink — it remained afloat, inverted, for 76 days before being scuttled. OCBC claimed the capsize was caused by seawater ingress (a peril of the seas) and that repair/recovery costs exceeded the US$56m insured value. The High Court found for OCBC on both issues. The insurers appealed.","decided":"The Court of Appeal allowed the appeal, reversing on two independent grounds. First, OCBC failed to prove the loss was caused by a peril of the seas. OCBC's expert could not identify any cause of the seawater ingress, and the presumption of loss by perils of the sea did not apply because the vessel was not lost in \"wholly unexplained circumstances\" — it capsized and remained accessible for inspection, yet no investigation into the cause was undertaken. Second, OCBC failed to prove constructive total loss. The documents OCBC relied upon (cost estimates, dive reports, correspondence) were inadmissible hearsay or irrelevant; even if admitted, they did not establish that actual repair/recovery costs exceeded insured value.","reasoning":"The Court clarified the framework for proving loss by perils of the sea. An insured must either directly prove a fortuitous cause of seawater ingress on the balance of probabilities, or invoke the presumption by proving the vessel was seaworthy and lost in wholly unexplained circumstances. The presumption is not an evidential tool of convenience; it applies only where the vessel is lost without trace or investigation is genuinely impossible. Following *The Popi M* [1985] 1 WLR 948 and *The Marel* [1994] 1 Lloyd's Rep 624, the Court held that where sufficient direct evidence exists, the insured must propound a cause — it cannot simply claim the cause is \"unknown.\" Here, the crew survived, the vessel remained afloat for over two months, and dive inspections were conducted. The loss was capable of being explained; OCBC elected not to investigate. The Court rejected the reasoning in *Skandia Insurance v Skoljarev* (1979) 26 ALR 1 to the extent it suggested otherwise, noting the UK Supreme Court's caution in *Global Process Systems* [2012] 1 All ER (Comm) 111. On constructive total loss, the Court held OCBC bore the burden of proving actual costs exceeded insured value. The cost estimates and brokers' replies relied upon by OCBC were not \"business records\" under s 32(1)(b)(iv) of the Evidence Act — they were obtained for litigation purposes, not made in the ordinary course of business. The High Court erred in curing OCBC's failure to file a hearsay notice under s 32(4)(b); real prejudice was caused because the insurers could not cross-examine or rebut documents introduced only in closing submissions. Even if admitted, the documents did not establish actual costs. The Court noted obiter that SCOPIC salvage costs (whose purpose is to protect against pollution liability) may not fall within \"cost of recovery/repair\" under cl 19 of the Institute Time Clauses following *Connect Shipping v The Swedish Club* [2019] 4 All ER 885.","watch":"The Court left open whether SCOPIC costs form part of \"cost of recovery/repair\" for constructive total loss purposes, signalling potential argument on this point in future claims. The Court also distinguished but did not overrule *Skandia*, leaving some residual uncertainty as to when inferential reasoning by elimination may suffice absent a propounded cause, particularly where foreign courts apply *Skandia*."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's analysis turned primarily on *Canada Rice Mills, Ltd v Union Marine and General Insurance Company, Ltd* [1941] AC 55, which it applied to establish that an accidental incursion of seawater into a vessel at a part where seawater is not expected to enter creates a prima facie case of loss by perils of the sea. The Court also relied on *Venetico Marine SA v International General Insurance Co Ltd* [2013] EWHC 3644 (Comm) for the proposition that an insured need not prove precisely how, when and where an alleged grounding occurred to discharge the burden of proof, a point that appears to have been material to rejecting the insurers' evidential objections. *Rhesa Shipping Co SA v Herbert David Edmunds* [1985] 1 WLR 948 was applied for its reasoning on burden of proof where competing explanations must be eliminated, though this appears to have been a routine application of the principle to the facts rather than any novel extension.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles of marine insurance law concerning perils of the sea to the particular facts without materially developing or clarifying the law. The treatment of both *Canada Rice Mills* and *Venetico Marine* reflects orthodox application of established tests for prima facie proof and the appropriate standard of proof in unexplained marine losses.","cited_cases":[]},{"title":"Soh Chee Wen v PUBLIC PROSECUTOR","citation":"[2026] SGCA 13","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_13","matched_topics":["criminal procedure and sentencing"],"law_shifted":false,"summary":{"bottom_line":"Courts sentencing for large-scale market manipulation under the SFA must apply heightened sentences that reflect the scale of offending, the harm to Singapore's reputation as a financial hub, and the sophistication of the scheme. Aggravating factors may legitimately be applied across multiple distinct offences without breaching the rule against double counting, provided they speak to the specific mischief targeted by each category of charge. An aggregate sentence of 36 years' imprisonment for orchestrating a $7.8 billion market manipulation scheme is proportionate and does not breach the totality principle.","facts_posture":"Between August 2012 and October 2013, the appellants masterminded a scheme to artificially inflate the markets and prices of three SGX-listed counters (Blumont, Asiasons, LionGold) using 189 trading accounts held across 20 financial institutions. The scheme involved over seven billion trades and caused market capitalisation losses of approximately $7.8 billion and $273 million in financial institution losses. The first appellant also tampered with witnesses and managed companies whilst bankrupt. Following trial, the General Division convicted both appellants on 169 conspiracy charges under the SFA and Penal Code; the first appellant received an additional 11 charges for company management whilst bankrupt and witness tampering. The first appellant was sentenced to 36 years' imprisonment and the second appellant to 20 years. Both appealed against sentence after their conviction appeals were dismissed.","decided":"The Court of Appeal dismissed both appeals against sentence in their entirety. It held that the sentences imposed were proportionate to the appellants' overall criminality and not excessive when measured against the unprecedented scale, sophistication, and harm of the scheme. The Court confirmed that aggravating factors such as scale, sophistication, transnational elements, and harm to Singapore's reputation may properly be considered across multiple categories of charges without double counting, provided they aggravate each offence in a manner specific to its particular mischief. The one-transaction rule did not apply because the offences, though part of an overarching scheme, protected different legal interests and involved separate criminal acts over varying periods. The totality principle was not breached: while 36 years substantially exceeded the normal range for any single offence, it was not crushing given the totality of the criminal behaviour.","reasoning":"The Court endorsed and applied the offence-specific factors for market manipulation under s 197 SFA set out in *Lau Wan Heng v PP* [2022] 3 SLR 1067, including scale (measured by number of accounts, trades, brokerages, and period), sophistication (steps taken to conceal offending), harm (reputational damage and financial loss), and personal benefit. It also articulated, for the first time, a non-exhaustive list of aggravating factors for cheating offences involving market manipulation, including value of property, extent of unrecovered loss, difficulty of detection, efforts to prevent victim recovery, duration of offending, and harm to Singapore's reputation as a financial hub. The Court distinguished pre-SFA cases such as *Tan Koon Swan v PP* [1985-1986] SLR(R) 976 as having no precedential value, given the subsequent tightening of the statutory regime and Parliament's express intention to enhance penalties following the Pan-El crisis. On double counting, the Court clarified that where multiple distinct offences are committed, offence-specific aggravating factors may be applied to each offence provided they operate differently in relation to the particular mischief targeted by each offence, citing *ADF v PP* [2010] 1 SLR 874 and *PP v Raveen Balakrishnan* [2018] 5 SLR 799. The Court also imposed a personal costs order of $10,000 against counsel for the second appellant for advancing baseless allegations of judicial bias without instructions, though it declined to enhance the second appellant's sentence on that basis.","watch":"The Court's guidance on aggravating factors for cheating offences in the context of market manipulation (at [45]) is expressly stated to be non-exhaustive. Lower courts may develop this further in future cases involving financial instruments or complex commercial fraud. The Court also left undisturbed the Judge's decision not to place weight on market participants' specific losses for want of fairness, but signalled (at [20(c)]) that had this been properly canvassed at trial, it could have been a legitimate additional indicator of harm distinct from scale. Counsel advancing allegations of judicial bias without proper foundation now face concrete risk of personal costs orders, even where the client is not prejudiced."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the sentencing frameworks established in *Lau Wan Heng v Public Prosecutor* [2022] 3 SLR 1067 for false trading and market rigging offences under s 197 SFA, and *Public Prosecutor v Ng Sae Kiat* [2015] 5 SLR 167 for manipulative and deceptive device offences under s 201(b) SFA, treating these as the governing frameworks for offence-specific sentencing in securities market misconduct cases. The Court relied on *ADF v Public Prosecutor* [2010] 1 SLR 874 to distinguish between offence-specific aggravating factors (relevant to individual sentence calibration) and cumulative aggravating features (relevant when determining consecutive sentences for multiple offences). In addressing the aggregation of sentences for multiple related offences, the Court applied the one-transaction rule from *Mohamed Shouffee bin Adam v Public Prosecutor* [2014] 2 SLR 998 and the totality principle from *Public Prosecutor v Raveen Balakrishnan* [2018] 5 SLR 799, utilising these to avoid double-counting whilst ensuring the aggregate sentence reflected overall criminality.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment represents a straightforward application of established sentencing principles to securities market manipulation offences without material development of the law. The frameworks from *Lau Wan Heng* and *Ng Sae Kiat* continue to govern the sentencing approach for the respective offence types, with no refinement or qualification to their operation.","cited_cases":[]},{"title":"PUBLIC PROSECUTOR v JOHNSON TAN WEE KIAT (JOHNSON CHEN WEIJI)","citation":"[2026] SGHC 59","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_59","matched_topics":["criminal law","criminal procedure and sentencing"],"law_shifted":false,"summary":{"bottom_line":"Prolonged inattention when beating a red light justifies a heavier sentence within Band 1 of *Chen Song*, even if not sufficient to elevate the case to Band 2. The Court made clear that a driver who fails to notice a red light that has been showing for several seconds is more culpable than one who runs a light only just turned red, and that this difference must register in the indicative starting sentence. The Prosecution's appeal succeeded in part: imprisonment enhanced from one week to three weeks.","facts_posture":"The respondent turned right against a red light at a junction, colliding with a motorcyclist travelling straight with right of way. The victim suffered a mildly displaced rib fracture, treated conservatively with 21 days' outpatient medical leave. The respondent pleaded guilty to careless driving causing grievous hurt under s 65(1)(b) read with s 65(3)(a) and (6)(d) RTA. The District Judge imposed one week's imprisonment and five years' disqualification. The Prosecution appealed the imprisonment term as manifestly inadequate.","decided":"The appeal succeeded. The imprisonment term was increased to three weeks; the five-year disqualification stood. The Court held that the case fell within Band 1 of the *Chen Song* framework (lesser harm, lower culpability), but that the indicative starting sentence of approximately 10 days adopted below failed to reflect the prolonged period of inattention — the traffic light had already been red for five seconds before the respondent entered the junction.","reasoning":"The Court applied *Chen Song v PP* [2025] 3 SLR 509 strictly. It agreed with the District Judge that there was only one primary harm factor (vulnerable rib fracture) and one culpability factor (failing to conform to traffic signal), thus placing the case in Band 1. However, the Court identified the five-second delay as raising a second potential culpability factor: high degree of carelessness in the form of prolonged inattention. Had this been treated mechanistically, the case would shift to Band 2 (floor of six months' imprisonment). Following the admonition in *Chen Song* at [123] against mechanistic application, the Court exercised discretion to keep the case in Band 1, reasoning that beating a red light and doing so after prolonged delay are closely intertwined. Nevertheless, the Court emphasised that the duration of inattention must translate into an uplift within the band — a driver who fails to notice a red light showing for several seconds is plainly more culpable than one who runs a light just turned. The indicative starting sentence was set at one month (reduced to three weeks after the 30% guilty plea discount), compared with the District Judge's implicit starting point of 10 days.","watch":"The Court left untouched the question of whether potential harm to the victim himself (as distinct from other road users) can constitute a secondary harm factor under *Chen Song*. The Prosecution argued that vehicles behind the victim might have run him over; the Court declined to engage definitively, noting only that *Chen Song* at [129] referred to \"other road users,\" and that the facts here did not support meaningful potential harm in any event."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the sentencing framework established in *Chen Song v Public Prosecutor* [2025] 3 SLR 509 for careless driving offences under the Road Traffic Act, treating it as the governing authority across multiple paragraphs. The Court distinguished two recent District Court decisions—*Public Prosecutor v Lau Shiao-Li Alexis (Liu Xiaoli)* [2025] SGDC 25 and *Public Prosecutor v Yeo Seong Bee Eric* [2025] SGDC 201—both of which involved careless driving causing grievous hurt, though the grounds of distinction are not specified in the citation data. In assessing the weight to be given to the accused's antecedents, the Court applied *Chan Chow Chuen v Public Prosecutor* [2024] SGHC 294 on the treatment of prior compounded offences in sentencing.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled law to new facts without materially developing existing principles. The *Chen Song* framework for careless driving sentencing continues to govern, and the Court's willingness to distinguish the two District Court decisions suggests routine application of established sentencing principles to differing factual matrices rather than any refinement of the legal test itself.","cited_cases":[]},{"title":"HO REI, JETHRO & Anor  v CHU JIAT BOON TIMOTHY","citation":"[2026] SGDC 100","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_100","matched_topics":["civil procedure"],"law_shifted":true,"summary":{"bottom_line":"A party seeking approval under O 9 r 9(7) to file an interlocutory application outside the SAPT regime must state the grounds of the intended application, not merely identify the type of application. However, failure to include grounds in the initial request is not fatal — the court may invite the party to supplement, provided the grounds are communicated to the opposing party and the court before the approval decision.","facts_posture":"The claimants sued for breach of contract and obtained default judgment after the defendant failed to enter appearance. The defendant's solicitors then filed a request for permission to file a setting-aside application under O 9 r 9(7), stating only that it was \"an application to set aside judgment\" to enable the defendant \"to contest the action and allow the matter to be adjudged on the merits.\" The claimants objected, arguing that the request failed to disclose the grounds (e.g., irregular judgment or prima facie defence) and thus did not satisfy the \"essence\" requirement in O 9 r 9(8).","decided":"Deputy Registrar Don Ho held that O 9 r 9(8)'s requirement to \"set out the essence of the intended application\" requires identification of the grounds of the intended application, not just the type of relief sought. Identifying the grounds and explaining why the application is necessary at that stage are distinct but related requirements. Approval was granted because the defendant's solicitors had disclosed the ground (prima facie defence) in subsequent correspondence, bringing both the court and the claimants on notice.","reasoning":"The Court gave \"essence\" its natural meaning: the intrinsic nature or basis of the claim, not merely the label. This interpretation serves the SAPT regime's purposes under O 3 r 1(2): it enables the court to assess necessity meaningfully, allows the opposing party to respond, and filters out frivolous applications without transforming the approval stage into a merits hearing (following *Hertel Singapore Pte Ltd v Cheng Swee Guan* [2025] 4 SLR 1571 at [18], [32]–[34]). A formalistic approach is to be avoided — O 9 r 9(9) permits the court to deal with requests summarily or at case conference, and deficiencies may be cured by supplemental information. The overriding concern is whether the grounds are adequately communicated to enable a proper assessment of necessity.","watch":"The Court observed *obiter* that, save for abuse of process or plainly hopeless applications, it will generally be difficult for a claimant to resist approval for a defendant to file a setting-aside application against a default judgment. This may signal a permissive approach to approval in the setting-aside context specifically."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's analysis turned principally on *Hertel Singapore Pte Ltd (now known as Altrad Services Singapore Pte Ltd) and another v Cheng Swee Guan and others* [2025] 4 SLR 1571, which it followed to establish that the burden lies on the requesting party to demonstrate that an intended application is necessary at the present stage of proceedings under O 9 r 9(7) of the ROC. The two other cited authorities — *Dorsey James Michael v World Sport Group Pte Ltd* [2013] 3 SLR 354 and *Constitutional Reference No 1 of 1995* [1995] 1 SLR(R) 803 — were invoked only for the familiar proposition that statutory provisions must be read harmoniously with their context and purpose, and do not represent substantive engagement with authority.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without extending or clarifying them. The reliance on *Hertel Singapore* for the governing test under O 9 r 9(7) reflects routine application of recent High Court authority to the facts at hand, with no analytical development of the legal framework or resolution of competing lines of authority.","cited_cases":[]},{"title":"Balbeer Singh Mangat & Anor  v TEMBUSU GROWTH FUND III LTD & 5 Ors","citation":"[2026] SGHC(A) 8","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHCA_8","matched_topics":["civil procedure"],"law_shifted":true,"summary":{"bottom_line":"An applicant seeking extension of time to appeal after egregious delay — here over 12 months — must furnish cogent reasons for that delay, not merely assert financial difficulties; vague or unsubstantiated explanations, coupled with repeated failure to meet court-ordered deadlines despite the applicant's own representations, will not suffice.","facts_posture":"The applicants (unrepresented bankrupts whose counterclaim had been dismissed) sought extension of time to file notice of appeal, originally due 13 December 2024. They filed three prior summonses before the General Division seeking time extensions, succeeding twice and failing once. The General Division judge had granted them successive indulgences conditioned on paying costs and furnishing security for appeal as required by the Official Assignee. The applicants repeatedly missed deadlines they themselves had proposed, including a personal undertaking to furnish security by 25 June 2025. They obtained the OA's sanction only in October 2025 and filed the present application in December 2025, over a year late.","decided":"The Appellate Division dismissed the application. Where delay exceeds 12 months (or even six months from the last extended deadline), the applicant must provide very good reasons to justify indulgence. Financial difficulties alone are insufficient justification, particularly where the applicant fails to substantiate fundraising efforts or explain why self-imposed deadlines were not met. The intended grounds of appeal must also be non-hopeless; here, the applicants' sole challenge to the finding of no loss (the FTMS share value ground) would be inconsequential because, even if successful, it could not establish causal nexus to the alleged conspiracy.","reasoning":"The Court applied the four-factor test from *Linda Lai* (length of delay, reasons for delay, prospects of success, prejudice), emphasising that the first two factors bear initial scrutiny and that Rules must be obeyed with reasonable diligence. The 12-month delay was \"on any objective measure\" substantial. The applicants' impecuniosity did not excuse delay where they provided no documentary evidence of fundraising attempts, failed to disclose quantum of security required, and exceeded their own proposed deadlines by three months without adequate explanation. On merits, the Court adopted the approach in *Ong Wui Jin* that broad-brush assertions cannot overcome findings of fact, and noted that even success on the sole loss-related ground would leave the conspiracy claim without causal link. The Court distinguished irremediable prejudice (such as irreversible change of position) from merely incurring further costs, though acknowledged respondents' concern about the applicants' ability to satisfy adverse costs orders was addressable through security for costs of the appeal itself.","watch":"The Court's treatment of vague assertions about merits — requiring applicants to explain \"in sufficient detail\" how factual findings could be overturned on appeal — may signal heightened scrutiny of unrepresented litigants' extension applications where delay is substantial and prior indulgences have been granted."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the well-established four-factor test from *Pearson Judith Rosemary v Chen Chien Wen Edwin* [1991] 2 SLR(R) 260 and *Lai Swee Lin Linda v Attorney-General* [2006] 2 SLR(R) 565 for determining whether to grant an extension of time to file an appeal. The most substantive engagement was with *Lee Hsien Loong v Singapore Democratic Party* [2008] 1 SLR(R) 757, which the Court applied for the principle that substantial delays require particularly compelling reasons to justify an extension, and that where delay is lengthy, the other factors must weigh heavily in the applicant's favour. *AD v AE* [2004] 2 SLR(R) 505 was applied to confirm that the threshold for demonstrating merits is low—the intended appeal need only be \"not hopeless\"—though this did not assist the applicant given the Court's assessment of the other factors.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without development or qualification. The Court undertook a conventional application of the four-factor test to the facts, with particular emphasis on the well-established proposition from *Lee Hsien Loong* that lengthy delays demand very good reasons and stronger showings on the remaining factors. No tension with prior authority arose, and the Court did not depart from, narrow, or extend any existing principle.","cited_cases":[]},{"title":"PUBLIC PROSECUTOR v Mookkapillai Pazhanivel","citation":"[2026] SGHC 60","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_60","matched_topics":["criminal law","evidence","criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"Trial judges may manage cross-examination by unrepresented accused persons in sexual offence cases by requiring questions to be posed through the court, after first canvassing the areas of questioning in the witness's absence — this does not violate the accused's right to a fair trial, provided protective measures are transparently explained.","facts_posture":"The accused, unrepresented, claimed trial to rape and sexual assault charges involving digital and penile penetration of a 12-year-old victim at a grass patch. He admitted meeting the victim and performing oral sex, but denied penetration, claiming a \"smell\" caused him to stop. The victim testified to both penetrative acts. The trial proceeded with the accused cross-examining witnesses through the court; a physical screen shielded the victim from eye contact.","decided":"The Court convicted on both charges. The victim's testimony was found \"unusually convincing\" — internally consistent, externally consistent with contemporaneous messages and her psychiatric account, and unshaken in cross-examination. The accused's evidence was rejected: his assertion about the smell and shortened encounter duration contradicted earlier statements; his claim that the victim sent a \"no sex\" message was a deliberate lie amounting to a *Lucas* lie corroborating guilt. The accused was sentenced to 15 years' imprisonment and 14 strokes of the cane (Rape Charge: 15 years and 10 strokes; SAP Charge: 10 years and 4 strokes, concurrent).","reasoning":"The Court adopted the framework in *GCK* and *Haliffie*: the \"unusually convincing\" standard requires assessment of internal and external consistency, not strict corroboration in the *Baskerville* sense. Minor omissions (e.g., not mentioning penetration to friends) were explicable given the victim's age, shame, and fear of judgment; delayed reporting is inconclusive (*Thangarajan*). The victim's past fabrications did not undermine her trial testimony, where she knew the importance of truthfulness. The accused's shifting position — duration of encounter halved at trial, smell allegation raised belatedly — undermined credibility. His lie about receiving a \"no sex\" message satisfied all four *Lucas* requirements: deliberate, material, motivated by guilt, and contradicted by objective evidence. The Court noted the \"unusually convincing\" label is merely a heuristic; the real inquiry is whether guilt is proven beyond reasonable doubt. On procedure, the Court clarified that in sexual offence cases involving self-represented accused, judges must scrutinise questions for relevance, permissibility, and repetitiveness (*Lucas Seah v PP*), with additional safeguards such as court-mediated questioning to protect complainants from inappropriate cross-examination (*Thangarajan*).","watch":"The Court observed (obiter) at [53] that the \"unusually convincing\" label may be unhelpful and should perhaps be discarded in favour of simply asking whether the Prosecution has proven its case beyond reasonable doubt — lower courts may resist this, but it signals potential appellate refinement."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *GCK v Public Prosecutor* [2020] 1 SLR 486 for the established test of assessing internal and external consistency when determining whether a victim's testimony is unusually convincing in sexual offence cases. It applied *Thangarajan Elanchezhian v Public Prosecutor* [2024] 6 SLR 507 and *Seah Yong Yi Lucas v Public Prosecutor* [2025] 4 SLR 838 to the management of inappropriate cross-examination by the self-represented accused, particularly regarding questions that ventured into irrelevant sexual history. The Court also applied the requirements from *Regina v Lucas* [1981] QB 720 to determine whether lies told by the accused could serve as corroborative evidence of guilt.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop new law but rather applies settled principles to its facts. The application of *Thangarajan* and *Lucas* together is noteworthy insofar as it demonstrates the Court's willingness to balance protective measures for complainants against the right of self-represented accused persons to test the prosecution's case, though the relevant principles themselves were not extended or qualified. The Court's reference to *Tang Kin Seng v Public Prosecutor* [1996] 3 SLR(R) 444 as the origin of the \"unusually convincing\" standard appears to be historical context only, with no suggestion that the test as refined in *GCK* required further development.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
