<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgment Digest — 8 April 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.case-card:hover { border-color: var(--faint); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.case-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(107,28,35,0.06); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}

.expand-btn {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);
  transition: all 0.15s;
  margin-top: 2px;
  cursor: pointer;
}
.expand-btn:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }
.case-card.expanded .expand-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.expand-btn span { display: inline-block; transition: transform 0.15s; }
.case-card.expanded .expand-btn span { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--rule);
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--accent-border);
}

.case-detail {
  border-top: 1px solid var(--rule);
  padding: 28px 24px 28px 70px;
  background: var(--surface-warm);
  display: none;
}
.case-card.expanded .case-detail { display: block; }

@media (max-width: 768px) {
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-detail { padding-left: 16px; }
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: inline-block;
}

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 0;
  margin-top: 10px;
}

.auth-entry { padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.auth-entry:last-child { border-bottom: none; }
.auth-entry:nth-child(even) { background: var(--surface); }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 10px; border-radius: 2px; white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }

mark.search-highlight { background: var(--accent-light); color: var(--accent); padding: 1px 2px; border-radius: 2px; border-bottom: 2px solid var(--accent-border); }
</style>
</head>
<body>
<div class="page-wrapper">
<header>
<div class="header-label">Judgment digest</div>
<div class="header-title" id="digest-title"></div>
<div class="header-meta" id="digest-meta"></div>
<div class="stats-row" id="stats-row"></div>
</header>
<input class="search-bar" type="text" placeholder="Search cases, topics, or cited authorities..." id="search-input" />
<div class="filters" id="filters"></div>
<div id="case-list"></div>
<footer>Generated based on your registered topic preferences.<br><em>This does not constitute legal advice.</em></footer>
</div>
<script>
const DIGEST_DATA = {"user_name":"Gina Tan","digest_date":"8 April 2026","cases":[{"title":"WQY v WQZ","citation":"[2026] SGHCF 9","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHCF_9","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"An appellate court will not disturb a District Judge's decision on care and control or division of matrimonial assets unless there is an error of law or principle, failure to appreciate material","facts_posture":"The parties married in 2013 and have two children aged eight and six. The wife commenced divorce proceedings in October 2023; interim judgment was granted in March 2024. The DJ awarded the wife sole care and control of the children, divided matrimonial assets 55.7:44.3 in the wife's favour, and made consequential orders. The husband appealed, contending the DJ failed to appreciate material evidence on his caregiving role, wrongly assessed his ownership of a company (XXX Treasure) as 100%, failed to draw adverse inferences against the wife, and misattributed both direct and indirect contributions.","decided":"Kwek Mean Luck J dismissed the appeal in its entirety. The DJ did not err in awarding sole care and control to the wife: the wife was the primary caregiver and had the stronger bond with the children. The DJ correctly rejected the husband's claim that he held only 60% of XXX Treasure, given the absence of corroborating evidence from alleged third-party investors. The DJ did not err in declining to draw adverse inferences against the wife or in applying a broad-brush approach to determine equal cash contributions from the parties' joint account to the mortgage. The DJ's assessment of indirect contributions at 70:30 in the wife's favour was within the permissible range.","reasoning":"The Court applied the standard from *UBQ v UBR* [2023] 1 SLR 1294 and *ANJ v ANK* [2015] 4 SLR 1043: appellate intervention requires an error of law or principle, failure to appreciate material facts, or that the decision was plainly wrong. On care and control, the DJ had weighed all relevant evidence, including the husband's involvement, and was entitled to prefer the wife's caregiving evidence and future plans. The DJ properly disregarded the helper's affidavit given the potential conflict of interest. On XXX Treasure, the husband bore the burden of proving third-party ownership; his late-produced screenshots and annotated bank statements were insufficient and contradictory, and no third parties came forward. The Court noted that even the husband's counsel conceded the figures did not add up. On dissipation, the Court applied *UZN v UZM* [2021] 1 SLR 426 but found no error: the DJ had offset the wife's withdrawal against maintenance arrears, and other alleged dissipations were not made when divorce was imminent. On direct contributions, the husband failed to provide clear evidence justifying a departure from the broad-brush approach; he ignored earlier years of equal contributions and failed to account for commingled investment proceeds. On indirect contributions, the Court reiterated *ANJ* at [47] and *TNL v TNK* [2017] 1 SLR 609: appellate courts will rarely interfere with a DJ's broad-brush assessment, which must be exercised as a matter of impression and judgment. The husband's proposed 65:35 ratio in his favour ignored that for most of the marriage, indirect financial contributions were equal, and the evidence supported the wife as primary caregiver.","watch":"The judgment is a conventional application of appellate review principles in ancillary matters. No new law was made, and no existing principles were departed from or clarified. Practitioners should note the Court's willingness to probe late-tendered documentary evidence closely, particularly where counsel candidly concedes evidential gaps — here, the Court commended counsel's frankness in accepting the figures \"do not add up.\""},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established trilogy of *UBQ v UBR* [2023] 1 SLR 1294, *ANJ v ANK* [2015] 4 SLR 1043, and *TSF v TSE* [2018] 2 SLR 833 for the threshold of appellate intervention in family matters, but the engagement was routine rather than analytical. More substantively, the Court relied on *UZN v UZM* [2021] 1 SLR 426 for principles governing dissipation of matrimonial assets, though the judgment does not indicate any refinement or qualification of those principles. The Court's consideration of the Family Court decision *TJP v TJQ* [2016] SGFC 4 on attributing contributions from joint accounts suggests this lower-court authority continues to provide practical guidance on a recurring evidentiary issue, though its precedential weight remains limited.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without developing the law. The appellate intervention threshold, the framework for assessing direct and indirect contributions from *ANJ v ANK*, and the approach to adverse inferences from *WRX v WRY* [2024] 1 SLR 851 were applied as established. The Court's citation of *TNL v TNK* [2017] 1 SLR 609 for the threshold of appellate intervention in division exercises confirms the stability of that standard. No conflicts were resolved, no principles extended to novel circumstances, and no qualifications imposed on existing doctrine.","cited_cases":[]},{"title":"GENA HULASH RAM v LIM JOO HUAT ENTERPRISE PTE. LTD","citation":"[2026] SGHC 73","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_73","matched_topics":["employment law"],"law_shifted":true,"summary":{"bottom_line":"Fixed monthly allowances declared in a work permit holder's In-Principle Approval Letter cannot include or offset overtime payments. Employers must pay the declared overtime rate for actual hours worked; any contrary arrangement — even if reflected in payslips or agreed for administrative convenience — violates the Employment of Foreign Manpower (Work Passes) Regulations 2012.","facts_posture":"The employee, an Indian national holding a work permit, was employed as a packer from December 2022 to August 2023. His IPA stated a basic salary of $1,000, fixed monthly allowances totalling $500 (including a $300 \"Others\" allowance), and an overtime rate of $7.87 per hour. The employer treated the $300 \"Others\" allowance as fixed compensation for overtime regardless of hours worked. The Employment Claims Tribunal awarded overtime pay but offset it against the $300 allowance, so the employee received only amounts exceeding $300 per month. The employee appealed.","decided":"The Court allowed the appeal in full. Overtime payments cannot be subsumed within or offset against fixed monthly allowances under the Regulations. Paragraph 6B of Part IV of the Fourth Schedule expressly excludes \"any form of overtime payment\" from the definition of \"fixed monthly allowances.\" By paying only the $300 allowance instead of calculating overtime at the declared rate, the employer effectively reduced the overtime rate below what was declared to the Controller, contrary to Paragraph 6A(1). The employee was entitled to overtime calculated at $7.87 per hour for all overtime worked, without any offset.","reasoning":"The Court applied the regulatory scheme governing work permit conditions. Drawing on *Liu Huaixi v Haniffa Pte Ltd* [2017] SGHC 270, Philip Jeyaretnam J emphasised that the IPA serves to inform foreign workers of their salary in clear, enforceable terms. The Regulations' definition of \"fixed monthly allowances\" expressly excludes overtime payments, mirroring the exclusion in the \"basic monthly salary\" definition. Allowing an offset would render the declared overtime rate meaningless and permit employers to circumvent section 38(4) of the Employment Act, which entitles workers to payment for actual overtime hours. The Magistrate's reliance on the payslip description and section 8 of the Employment Act (which voids only terms less favourable than statutory minimums) was insufficient to reconcile the arrangement with the Regulations' express prohibition.","watch":"The judgment confirms costs may be awarded where counsel act pro bono for impecunious clients, following *SATS Construction Pte Ltd v Islam Md Ohidul* [2016] 3 SLR 1164. Costs fixed at $9,000 all-in reflected substantial work done and posed no prejudice where the losing party would have paid costs regardless."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Liu Huaixi v Haniffa Pte Ltd* [2017] SGHC 270 for the proposition that the In-Principle Approval letter serves to inform foreign workers of their salary in clear terms, though the application appears routine rather than substantive. The more analytically significant citation is *SATS Construction Pte Ltd v Islam Md Ohidul* [2016] 3 SLR 1164, which the Court followed to confirm that a successful party remains entitled to costs even where counsel acts pro bono — a principle reinforced by reference to *Law Society of Singapore v Kurubalan s/o Manickam Rengaraju* [2013] 4 SLR 91 on the propriety of counsel acting for impecunious clients with payment contingent on costs awards.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without materially developing the law. The cited authorities are deployed for established propositions: the interpretation of IPA letters and the entitlement to costs where counsel acts pro bono. No extension, qualification, or departure from existing authority is evident.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
