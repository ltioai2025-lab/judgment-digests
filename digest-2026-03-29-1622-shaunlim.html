<script>
const DIGEST_DATA = {"user_name":"Shaun Lim","digest_date":"29 March 2026","cases":[{"title":"SANTOS-TUMALIP MARIA MONALYN BAGAPORO v PUBLIC PROSECUTOR","citation":"[2026] SGHC 64","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_64","matched_topics":["criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"An accused in remand who reaches out for Pro Bono SG assistance within a day of sentencing, completes CM papers within days of the legal clinic, but misses the 14-day appeal deadline because she mistakenly believed she needed confirmed representation in place before appealing, may obtain an extension of time where the effective delay is minimal and the appeal is not hopeless — provided the","facts_posture":"The applicant was sentenced to 21 months and 8 weeks' imprisonment on 13 November 2025 for property offences. Her counsel discharged herself after sentencing. The next day, the applicant's sister contacted Pro Bono SG on her behalf. The 14-day appeal deadline expired on 27 November 2025 without an appeal being filed. Pro Bono SG held a legal clinic with the applicant on 1 December 2025. She prepared her CM papers by 5 December but could not file until 12 December because SPS needed time to procure a Commissioner for Oaths. She applied for an extension of time to file her notice of appeal.","decided":"The Court granted the extension. Under s 380(1) CPC, the Court may permit a late appeal if it is in the interests of justice. Following *Lim Hong Kheng*, the Court applied the three-factor test: length of delay, explanation for delay, and prospects of appeal. The higher \"substantial injustice\" threshold from *Pang Chie Wei* (requiring new material undermining the conviction or sentence) did not apply because the facts did not demonstrate acceptance of the sentence. The effective six-working-day delay was not significant; the explanation — though weak in isolation — was accepted given the applicant's prompt attempts to secure representation; and the appeal prospects were not so poor as to warrant summary dismissal.","reasoning":"The Court endorsed *Adeeb Ahmed Khan*'s framework: the *Pang Chie Wei* threshold requiring \"new material\" only applies where delay stems from acceptance of the decision such that the appeal is an afterthought. Several factors negatived acceptance here: the sentence significantly exceeded defence submissions; the applicant contacted Pro Bono SG immediately; and the delay was minimal. On the *Lim Hong Kheng* factors, the Court calibrated scrutiny to the delay's brevity. The applicant's claim that she thought the deadline awaited confirmed representation was, standing alone, \"an all too convenient excuse\" that would fail in most cases. But her conduct — reaching out the day after sentencing and filing promptly after the clinic — was consistent with that misapprehension rather than dilatory behaviour. The Court emphasised that short delays do not warrant only perfunctory scrutiny, warning applicants not to treat deadlines casually. On prospects, the Court noted the sentencing judge's brief grounds constrained dismissing the appeal at this stage.","watch":"The Court's allowance was expressly tied to wanting fuller grounds from the sentencing judge, suggesting limited written reasons may influence extension applications where an appeal's prospects cannot be robustly assessed from existing materials."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the framework from *Adeeb Ahmed Khan s/o Iqbal Ahmed Khan v Public Prosecutor* [2022] 2 SLR 1197 and *Lim Hong Kheng v Public Prosecutor* [2006] 3 SLR(R) 358 as governing the analysis of whether to extend time to file an appeal. The critical engagement was with *Public Prosecutor v Pang Chie Wei* [2022] 1 SLR 452, which the Court distinguished on the basis that the applicant there had accepted the merits of the trial court's decision, thereby justifying a heightened \"substantial injustice\" threshold; the distinction matters because it clarifies that the *Pang Chie Wei* threshold applies only where the failure to appeal stemmed from acceptance of the decision's merits, not in other cases of delay.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies the scope of *Pang Chie Wei* rather than extending or unsettling existing principles. By distinguishing *Pang Chie Wei*, the Court confirms that the elevated \"substantial injustice\" standard is not universal but context-specific, applying only where delay results from the applicant's initial acceptance of the adverse decision. The application of the standard *Adeeb Ahmed Khan* and *Lim Hong Kheng* framework to the facts was orthodox, with no new ground broken in the general approach to extension-of-time applications.","cited_cases":[]},{"title":"Mustaqim Bin Abdul Kadir v PUBLIC PROSECUTOR","citation":"[2026] SGCA 15","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_15","matched_topics":["criminal law","criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"An application to adduce fresh evidence on appeal will be dismissed as an abuse of process where counsel had expressly considered calling psychiatric experts at trial to support a state-of-mind defence but deliberately chose not to do so, and now seeks to run that contradictory defence on appeal under the guise of fresh evidence.","facts_posture":"The appellant was convicted on a capital charge of trafficking not less than 56.8g of diamorphine. His trial defence was that 42.62g represented two bundles mistakenly delivered which he intended to return (\"Unwanted Drugs defence\"). He also challenged the admissibility of seven CNB statements on grounds of inducement. He appealed his conviction and sentence, and filed a criminal motion to adduce psychiatric evidence suggesting he was disoriented due to drug withdrawal when his statements were recorded, rendering them inadmissible (\"State of Mind Defence\").","decided":"The Court of Appeal dismissed both the criminal motion and the appeal. The fresh evidence failed the *Ladd v Marshall* test because: (i) it was available at trial — counsel had consulted a psychologist and psychiatrist about withdrawal symptoms but elected not to call them; (ii) the application constituted an abuse of process, being an attempt to secure a retrial on a contradictory defence; and (iii) the evidence was not material, as contemporaneous medical examinations s","reasoning":"The Court applied *Ladd v Marshall*'s three conditions (non-availability, materiality, reliability) as attenuated for criminal appeals per *Azuin bin Mohd Tap v PP* [2025] 1 SLR 259, but emphasised that even the relaxed test cannot permit tactical forum-shopping. Following *Masri Bin Hussain v PP* [2025] SGCA 9 and *Khetani v Kanbi* [2006] EWCA Civ 1621, the Court held it an abuse of process for a party to deliberately withhold evidence at trial, then seek to adduce it on appeal — particularly where doing so would require running an inconsistent defence. The record showed counsel had taken instructions on withdrawal symptoms but stopped when the Prosecution indicated it would not rely on the long statements in its case-in-chief, only to cross-examine with them later. Counsel never called the psychologist or psychiatrist. The Court found it contrived that the appellant claimed confusion prevented him mentioning the specific quantity (46.62g) that would take him below the capital threshold, when he had presence of mind to allegedly understand inducements and concoct detailed lies in response. On the substantive appeal, the Court applied *Jumadi bin Abdullah v PP* [2022] 1 SLR 814 to hold that the MDP Notice cannot objectively constitute an inducement by virtue of Explanation 2(aa) to s 258(3) CPC, regardless of how the accused subjectively understood it.","watch":"The Court's reasoning that inconsistent defences can render a fresh evidence application abusive may gain traction in appeals where accused persons attempt to run alternative cases sequentially rather than cumulatively at trial, particularly where counsel has expressly considered but forgone a line of defence."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the flexible approach to admitting fresh evidence in criminal appeals articulated in *Azuin bin Mohd Tap v Public Prosecutor* [2025] 1 SLR 259, which relaxes the strict *Ladd v Marshall* [1954] 1 WLR 1489 conditions in favour of a focus on relevance and reliability. More significantly, it extended the abuse of process principle from *Anan Group (Singapore) Pte Ltd v VTB Bank (Public Joint Stock Co)* [2019] 2 SLR 341—previously applied in civil contexts—to criminal appeals, holding that a deliberate tactical decision to proceed without evidence at trial cannot be reversed on appeal after an adverse outcome. This extension was reinforced by the recent decision in *Masri Bin Hussain v Public Prosecutor* [2025] SGCA 9, which the Court applied to hold that seeking to adduce fresh evidence to run a contradictory defence on appeal constitutes an abuse of process. The Court also followed *Public Prosecutor v Gunasilan Rajenthiran* [2022] 3 SLR 861 regarding the appropriate weight to be given to statements made to psychiatrists.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies that the abuse of process doctrine limiting fresh evidence applications—well-established in civil appeals—applies with equal force in criminal appeals where the accused deliberately withholds evidence at trial for tactical reasons. While the Court acknowledges that criminal appeals receive more latitude under *Azuin*, it confirms that this flexibility does not permit strategic gamesmanship. The reliance on the very recent *Masri* decision suggests the Court of Appeal is actively consolidating this principle across criminal fresh evidence applications.","cited_cases":[]},{"title":"Argoglobal Underwriting Asia Pacific Pte. Ltd. & 4 Ors  v Overseas-Chinese Banking Corporation Limited","citation":"[2026] SGCA 14","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_14","matched_topics":["evidence"],"law_shifted":true,"summary":{"bottom_line":"An insured shipowner cannot prove loss by \"perils of the sea\" unless it either propounds a fortuitous cause for the seawater ingress or proves the vessel was lost in wholly unexplained circumstances. The presumption of loss by perils of the sea only applies where the vessel sank without trace or investigation is impossible — not where it capsized, remained afloat for weeks, and the owner elected not to investigate. A constructive total loss claim requires proof of actual repair/recovery costs exceeding insured value; the insured cannot rely on hearsay quotations adduced only in closing submissions without calling the makers to testify.","facts_posture":"OCBC, as mortgagee and co-assured under a marine hull and machinery policy, claimed the jackup rig *Teras Lyza* was a constructive total loss after it capsized during a wet tow from Vietnam to Taiwan. The vessel did not sink — it remained afloat, inverted, for 76 days before being scuttled. OCBC claimed the capsize was caused by seawater ingress (a peril of the seas) and that repair/recovery costs exceeded the US$56m insured value. The High Court found for OCBC on both issues. The insurers appealed.","decided":"The Court of Appeal allowed the appeal, reversing on two independent grounds. First, OCBC failed to prove the loss was caused by a peril of the seas. OCBC's expert could not identify any cause of the seawater ingress, and the presumption of loss by perils of the sea did not apply because the vessel was not lost in \"wholly unexplained circumstances\" — it capsized and remained accessible for inspection, yet no investigation into the cause was undertaken. Second, OCBC failed to prove constructive total loss. The documents OCBC relied upon (cost estimates, dive reports, correspondence) were inadmissible hearsay or irrelevant; even if admitted, they did not establish that actual repair/recovery costs exceeded insured value.","reasoning":"The Court clarified the framework for proving loss by perils of the sea. An insured must either directly prove a fortuitous cause of seawater ingress on the balance of probabilities, or invoke the presumption by proving the vessel was seaworthy and lost in wholly unexplained circumstances. The presumption is not an evidential tool of convenience; it applies only where the vessel is lost without trace or investigation is genuinely impossible. Following *The Popi M* [1985] 1 WLR 948 and *The Marel* [1994] 1 Lloyd's Rep 624, the Court held that where sufficient direct evidence exists, the insured must propound a cause — it cannot simply claim the cause is \"unknown.\" Here, the crew survived, the vessel remained afloat for over two months, and dive inspections were conducted. The loss was capable of being explained; OCBC elected not to investigate. The Court rejected the reasoning in *Skandia Insurance v Skoljarev* (1979) 26 ALR 1 to the extent it suggested otherwise, noting the UK Supreme Court's caution in *Global Process Systems* [2012] 1 All ER (Comm) 111. On constructive total loss, the Court held OCBC bore the burden of proving actual costs exceeded insured value. The cost estimates and brokers' replies relied upon by OCBC were not \"business records\" under s 32(1)(b)(iv) of the Evidence Act — they were obtained for litigation purposes, not made in the ordinary course of business. The High Court erred in curing OCBC's failure to file a hearsay notice under s 32(4)(b); real prejudice was caused because the insurers could not cross-examine or rebut documents introduced only in closing submissions. Even if admitted, the documents did not establish actual costs. The Court noted obiter that SCOPIC salvage costs (whose purpose is to protect against pollution liability) may not fall within \"cost of recovery/repair\" under cl 19 of the Institute Time Clauses following *Connect Shipping v The Swedish Club* [2019] 4 All ER 885.","watch":"The Court left open whether SCOPIC costs form part of \"cost of recovery/repair\" for constructive total loss purposes, signalling potential argument on this point in future claims. The Court also distinguished but did not overrule *Skandia*, leaving some residual uncertainty as to when inferential reasoning by elimination may suffice absent a propounded cause, particularly where foreign courts apply *Skandia*."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's analysis turned primarily on *Canada Rice Mills, Ltd v Union Marine and General Insurance Company, Ltd* [1941] AC 55, which it applied to establish that an accidental incursion of seawater into a vessel at a part where seawater is not expected to enter creates a prima facie case of loss by perils of the sea. The Court also relied on *Venetico Marine SA v International General Insurance Co Ltd* [2013] EWHC 3644 (Comm) for the proposition that an insured need not prove precisely how, when and where an alleged grounding occurred to discharge the burden of proof, a point that appears to have been material to rejecting the insurers' evidential objections. *Rhesa Shipping Co SA v Herbert David Edmunds* [1985] 1 WLR 948 was applied for its reasoning on burden of proof where competing explanations must be eliminated, though this appears to have been a routine application of the principle to the facts rather than any novel extension.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles of marine insurance law concerning perils of the sea to the particular facts without materially developing or clarifying the law. The treatment of both *Canada Rice Mills* and *Venetico Marine* reflects orthodox application of established tests for prima facie proof and the appropriate standard of proof in unexplained marine losses.","cited_cases":[]},{"title":"Soh Chee Wen v PUBLIC PROSECUTOR","citation":"[2026] SGCA 13","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_13","matched_topics":["criminal procedure and sentencing"],"law_shifted":false,"summary":{"bottom_line":"Courts sentencing for large-scale market manipulation under the SFA must apply heightened sentences that reflect the scale of offending, the harm to Singapore's reputation as a financial hub, and the sophistication of the scheme. Aggravating factors may legitimately be applied across multiple distinct offences without breaching the rule against double counting, provided they speak to the specific mischief targeted by each category of charge. An aggregate sentence of 36 years' imprisonment for orchestrating a $7.8 billion market manipulation scheme is proportionate and does not breach the totality principle.","facts_posture":"Between August 2012 and October 2013, the appellants masterminded a scheme to artificially inflate the markets and prices of three SGX-listed counters (Blumont, Asiasons, LionGold) using 189 trading accounts held across 20 financial institutions. The scheme involved over seven billion trades and caused market capitalisation losses of approximately $7.8 billion and $273 million in financial institution losses. The first appellant also tampered with witnesses and managed companies whilst bankrupt. Following trial, the General Division convicted both appellants on 169 conspiracy charges under the SFA and Penal Code; the first appellant received an additional 11 charges for company management whilst bankrupt and witness tampering. The first appellant was sentenced to 36 years' imprisonment and the second appellant to 20 years. Both appealed against sentence after their conviction appeals were dismissed.","decided":"The Court of Appeal dismissed both appeals against sentence in their entirety. It held that the sentences imposed were proportionate to the appellants' overall criminality and not excessive when measured against the unprecedented scale, sophistication, and harm of the scheme. The Court confirmed that aggravating factors such as scale, sophistication, transnational elements, and harm to Singapore's reputation may properly be considered across multiple categories of charges without double counting, provided they aggravate each offence in a manner specific to its particular mischief. The one-transaction rule did not apply because the offences, though part of an overarching scheme, protected different legal interests and involved separate criminal acts over varying periods. The totality principle was not breached: while 36 years substantially exceeded the normal range for any single offence, it was not crushing given the totality of the criminal behaviour.","reasoning":"The Court endorsed and applied the offence-specific factors for market manipulation under s 197 SFA set out in *Lau Wan Heng v PP* [2022] 3 SLR 1067, including scale (measured by number of accounts, trades, brokerages, and period), sophistication (steps taken to conceal offending), harm (reputational damage and financial loss), and personal benefit. It also articulated, for the first time, a non-exhaustive list of aggravating factors for cheating offences involving market manipulation, including value of property, extent of unrecovered loss, difficulty of detection, efforts to prevent victim recovery, duration of offending, and harm to Singapore's reputation as a financial hub. The Court distinguished pre-SFA cases such as *Tan Koon Swan v PP* [1985-1986] SLR(R) 976 as having no precedential value, given the subsequent tightening of the statutory regime and Parliament's express intention to enhance penalties following the Pan-El crisis. On double counting, the Court clarified that where multiple distinct offences are committed, offence-specific aggravating factors may be applied to each offence provided they operate differently in relation to the particular mischief targeted by each offence, citing *ADF v PP* [2010] 1 SLR 874 and *PP v Raveen Balakrishnan* [2018] 5 SLR 799. The Court also imposed a personal costs order of $10,000 against counsel for the second appellant for advancing baseless allegations of judicial bias without instructions, though it declined to enhance the second appellant's sentence on that basis.","watch":"The Court's guidance on aggravating factors for cheating offences in the context of market manipulation (at [45]) is expressly stated to be non-exhaustive. Lower courts may develop this further in future cases involving financial instruments or complex commercial fraud. The Court also left undisturbed the Judge's decision not to place weight on market participants' specific losses for want of fairness, but signalled (at [20(c)]) that had this been properly canvassed at trial, it could have been a legitimate additional indicator of harm distinct from scale. Counsel advancing allegations of judicial bias without proper foundation now face concrete risk of personal costs orders, even where the client is not prejudiced."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the sentencing frameworks established in *Lau Wan Heng v Public Prosecutor* [2022] 3 SLR 1067 for false trading and market rigging offences under s 197 SFA, and *Public Prosecutor v Ng Sae Kiat* [2015] 5 SLR 167 for manipulative and deceptive device offences under s 201(b) SFA, treating these as the governing frameworks for offence-specific sentencing in securities market misconduct cases. The Court relied on *ADF v Public Prosecutor* [2010] 1 SLR 874 to distinguish between offence-specific aggravating factors (relevant to individual sentence calibration) and cumulative aggravating features (relevant when determining consecutive sentences for multiple offences). In addressing the aggregation of sentences for multiple related offences, the Court applied the one-transaction rule from *Mohamed Shouffee bin Adam v Public Prosecutor* [2014] 2 SLR 998 and the totality principle from *Public Prosecutor v Raveen Balakrishnan* [2018] 5 SLR 799, utilising these to avoid double-counting whilst ensuring the aggregate sentence reflected overall criminality.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment represents a straightforward application of established sentencing principles to securities market manipulation offences without material development of the law. The frameworks from *Lau Wan Heng* and *Ng Sae Kiat* continue to govern the sentencing approach for the respective offence types, with no refinement or qualification to their operation.","cited_cases":[]},{"title":"PUBLIC PROSECUTOR v JOHNSON TAN WEE KIAT (JOHNSON CHEN WEIJI)","citation":"[2026] SGHC 59","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_59","matched_topics":["criminal law","criminal procedure and sentencing"],"law_shifted":false,"summary":{"bottom_line":"Prolonged inattention when beating a red light justifies a heavier sentence within Band 1 of *Chen Song*, even if not sufficient to elevate the case to Band 2. The Court made clear that a driver who fails to notice a red light that has been showing for several seconds is more culpable than one who runs a light only just turned red, and that this difference must register in the indicative starting sentence. The Prosecution's appeal succeeded in part: imprisonment enhanced from one week to three weeks.","facts_posture":"The respondent turned right against a red light at a junction, colliding with a motorcyclist travelling straight with right of way. The victim suffered a mildly displaced rib fracture, treated conservatively with 21 days' outpatient medical leave. The respondent pleaded guilty to careless driving causing grievous hurt under s 65(1)(b) read with s 65(3)(a) and (6)(d) RTA. The District Judge imposed one week's imprisonment and five years' disqualification. The Prosecution appealed the imprisonment term as manifestly inadequate.","decided":"The appeal succeeded. The imprisonment term was increased to three weeks; the five-year disqualification stood. The Court held that the case fell within Band 1 of the *Chen Song* framework (lesser harm, lower culpability), but that the indicative starting sentence of approximately 10 days adopted below failed to reflect the prolonged period of inattention — the traffic light had already been red for five seconds before the respondent entered the junction.","reasoning":"The Court applied *Chen Song v PP* [2025] 3 SLR 509 strictly. It agreed with the District Judge that there was only one primary harm factor (vulnerable rib fracture) and one culpability factor (failing to conform to traffic signal), thus placing the case in Band 1. However, the Court identified the five-second delay as raising a second potential culpability factor: high degree of carelessness in the form of prolonged inattention. Had this been treated mechanistically, the case would shift to Band 2 (floor of six months' imprisonment). Following the admonition in *Chen Song* at [123] against mechanistic application, the Court exercised discretion to keep the case in Band 1, reasoning that beating a red light and doing so after prolonged delay are closely intertwined. Nevertheless, the Court emphasised that the duration of inattention must translate into an uplift within the band — a driver who fails to notice a red light showing for several seconds is plainly more culpable than one who runs a light just turned. The indicative starting sentence was set at one month (reduced to three weeks after the 30% guilty plea discount), compared with the District Judge's implicit starting point of 10 days.","watch":"The Court left untouched the question of whether potential harm to the victim himself (as distinct from other road users) can constitute a secondary harm factor under *Chen Song*. The Prosecution argued that vehicles behind the victim might have run him over; the Court declined to engage definitively, noting only that *Chen Song* at [129] referred to \"other road users,\" and that the facts here did not support meaningful potential harm in any event."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the sentencing framework established in *Chen Song v Public Prosecutor* [2025] 3 SLR 509 for careless driving offences under the Road Traffic Act, treating it as the governing authority across multiple paragraphs. The Court distinguished two recent District Court decisions—*Public Prosecutor v Lau Shiao-Li Alexis (Liu Xiaoli)* [2025] SGDC 25 and *Public Prosecutor v Yeo Seong Bee Eric* [2025] SGDC 201—both of which involved careless driving causing grievous hurt, though the grounds of distinction are not specified in the citation data. In assessing the weight to be given to the accused's antecedents, the Court applied *Chan Chow Chuen v Public Prosecutor* [2024] SGHC 294 on the treatment of prior compounded offences in sentencing.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled law to new facts without materially developing existing principles. The *Chen Song* framework for careless driving sentencing continues to govern, and the Court's willingness to distinguish the two District Court decisions suggests routine application of established sentencing principles to differing factual matrices rather than any refinement of the legal test itself.","cited_cases":[]},{"title":"PUBLIC PROSECUTOR v Mookkapillai Pazhanivel","citation":"[2026] SGHC 60","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_60","matched_topics":["criminal law","evidence","criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"Trial judges may manage cross-examination by unrepresented accused persons in sexual offence cases by requiring questions to be posed through the court, after first canvassing the areas of questioning in the witness's absence — this does not violate the accused's right to a fair trial, provided protective measures are transparently explained.","facts_posture":"The accused, unrepresented, claimed trial to rape and sexual assault charges involving digital and penile penetration of a 12-year-old victim at a grass patch. He admitted meeting the victim and performing oral sex, but denied penetration, claiming a \"smell\" caused him to stop. The victim testified to both penetrative acts. The trial proceeded with the accused cross-examining witnesses through the court; a physical screen shielded the victim from eye contact.","decided":"The Court convicted on both charges. The victim's testimony was found \"unusually convincing\" — internally consistent, externally consistent with contemporaneous messages and her psychiatric account, and unshaken in cross-examination. The accused's evidence was rejected: his assertion about the smell and shortened encounter duration contradicted earlier statements; his claim that the victim sent a \"no sex\" message was a deliberate lie amounting to a *Lucas* lie corroborating guilt. The accused was sentenced to 15 years' imprisonment and 14 strokes of the cane (Rape Charge: 15 years and 10 strokes; SAP Charge: 10 years and 4 strokes, concurrent).","reasoning":"The Court adopted the framework in *GCK* and *Haliffie*: the \"unusually convincing\" standard requires assessment of internal and external consistency, not strict corroboration in the *Baskerville* sense. Minor omissions (e.g., not mentioning penetration to friends) were explicable given the victim's age, shame, and fear of judgment; delayed reporting is inconclusive (*Thangarajan*). The victim's past fabrications did not undermine her trial testimony, where she knew the importance of truthfulness. The accused's shifting position — duration of encounter halved at trial, smell allegation raised belatedly — undermined credibility. His lie about receiving a \"no sex\" message satisfied all four *Lucas* requirements: deliberate, material, motivated by guilt, and contradicted by objective evidence. The Court noted the \"unusually convincing\" label is merely a heuristic; the real inquiry is whether guilt is proven beyond reasonable doubt. On procedure, the Court clarified that in sexual offence cases involving self-represented accused, judges must scrutinise questions for relevance, permissibility, and repetitiveness (*Lucas Seah v PP*), with additional safeguards such as court-mediated questioning to protect complainants from inappropriate cross-examination (*Thangarajan*).","watch":"The Court observed (obiter) at [53] that the \"unusually convincing\" label may be unhelpful and should perhaps be discarded in favour of simply asking whether the Prosecution has proven its case beyond reasonable doubt — lower courts may resist this, but it signals potential appellate refinement."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *GCK v Public Prosecutor* [2020] 1 SLR 486 for the established test of assessing internal and external consistency when determining whether a victim's testimony is unusually convincing in sexual offence cases. It applied *Thangarajan Elanchezhian v Public Prosecutor* [2024] 6 SLR 507 and *Seah Yong Yi Lucas v Public Prosecutor* [2025] 4 SLR 838 to the management of inappropriate cross-examination by the self-represented accused, particularly regarding questions that ventured into irrelevant sexual history. The Court also applied the requirements from *Regina v Lucas* [1981] QB 720 to determine whether lies told by the accused could serve as corroborative evidence of guilt.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop new law but rather applies settled principles to its facts. The application of *Thangarajan* and *Lucas* together is noteworthy insofar as it demonstrates the Court's willingness to balance protective measures for complainants against the right of self-represented accused persons to test the prosecution's case, though the relevant principles themselves were not extended or qualified. The Court's reference to *Tang Kin Seng v Public Prosecutor* [1996] 3 SLR(R) 444 as the origin of the \"unusually convincing\" standard appears to be historical context only, with no suggestion that the test as refined in *GCK* required further development.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
