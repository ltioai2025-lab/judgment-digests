<script>
const DIGEST_DATA = {"user_name":"Gina Tan","digest_date":"29 March 2026","cases":[{"title":"SANTOS-TUMALIP MARIA MONALYN BAGAPORO v PUBLIC PROSECUTOR","citation":"[2026] SGHC 64","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_64","matched_topics":["criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"An accused in remand who reaches out for Pro Bono SG assistance within a day of sentencing, completes CM papers within days of the legal clinic, but misses the 14-day appeal deadline because she mistakenly believed she needed confirmed representation in place before appealing, may obtain an extension of time where the effective delay is minimal and the appeal is not hopeless — provided the","facts_posture":"The applicant was sentenced to 21 months and 8 weeks' imprisonment on 13 November 2025 for property offences. Her counsel discharged herself after sentencing. The next day, the applicant's sister contacted Pro Bono SG on her behalf. The 14-day appeal deadline expired on 27 November 2025 without an appeal being filed. Pro Bono SG held a legal clinic with the applicant on 1 December 2025. She prepared her CM papers by 5 December but could not file until 12 December because SPS needed time to procure a Commissioner for Oaths. She applied for an extension of time to file her notice of appeal.","decided":"The Court granted the extension. Under s 380(1) CPC, the Court may permit a late appeal if it is in the interests of justice. Following *Lim Hong Kheng*, the Court applied the three-factor test: length of delay, explanation for delay, and prospects of appeal. The higher \"substantial injustice\" threshold from *Pang Chie Wei* (requiring new material undermining the conviction or sentence) did not apply because the facts did not demonstrate acceptance of the sentence. The effective six-working-day delay was not significant; the explanation — though weak in isolation — was accepted given the applicant's prompt attempts to secure representation; and the appeal prospects were not so poor as to warrant summary dismissal.","reasoning":"The Court endorsed *Adeeb Ahmed Khan*'s framework: the *Pang Chie Wei* threshold requiring \"new material\" only applies where delay stems from acceptance of the decision such that the appeal is an afterthought. Several factors negatived acceptance here: the sentence significantly exceeded defence submissions; the applicant contacted Pro Bono SG immediately; and the delay was minimal. On the *Lim Hong Kheng* factors, the Court calibrated scrutiny to the delay's brevity. The applicant's claim that she thought the deadline awaited confirmed representation was, standing alone, \"an all too convenient excuse\" that would fail in most cases. But her conduct — reaching out the day after sentencing and filing promptly after the clinic — was consistent with that misapprehension rather than dilatory behaviour. The Court emphasised that short delays do not warrant only perfunctory scrutiny, warning applicants not to treat deadlines casually. On prospects, the Court noted the sentencing judge's brief grounds constrained dismissing the appeal at this stage.","watch":"The Court's allowance was expressly tied to wanting fuller grounds from the sentencing judge, suggesting limited written reasons may influence extension applications where an appeal's prospects cannot be robustly assessed from existing materials."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the framework from *Adeeb Ahmed Khan s/o Iqbal Ahmed Khan v Public Prosecutor* [2022] 2 SLR 1197 and *Lim Hong Kheng v Public Prosecutor* [2006] 3 SLR(R) 358 as governing the analysis of whether to extend time to file an appeal. The critical engagement was with *Public Prosecutor v Pang Chie Wei* [2022] 1 SLR 452, which the Court distinguished on the basis that the applicant there had accepted the merits of the trial court's decision, thereby justifying a heightened \"substantial injustice\" threshold; the distinction matters because it clarifies that the *Pang Chie Wei* threshold applies only where the failure to appeal stemmed from acceptance of the decision's merits, not in other cases of delay.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies the scope of *Pang Chie Wei* rather than extending or unsettling existing principles. By distinguishing *Pang Chie Wei*, the Court confirms that the elevated \"substantial injustice\" standard is not universal but context-specific, applying only where delay results from the applicant's initial acceptance of the adverse decision. The application of the standard *Adeeb Ahmed Khan* and *Lim Hong Kheng* framework to the facts was orthodox, with no new ground broken in the general approach to extension-of-time applications.","cited_cases":[]},{"title":"Vanbo Investments Pte Ltd v ph. AG & Anor","citation":"[2026] SGHC 65","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_65","matched_topics":["conflict of laws"],"law_shifted":true,"summary":{"bottom_line":"A worldwide Mareva injunction will be set aside where the claimant fails to establish either a real risk of dissipation or a good arguable case, even if only one limb fails. Where multiple competing jurisdiction clauses exist across related agreements, courts determine which clause governs by identifying the agreement with the closest connection to the \"pith and substance\" of the dispute. Material non-disclosure at an ex parte hearing — including misrepresenting the claimant's prior knowledge of","facts_posture":"Vanbo Investments Pte Ltd, a Singapore holding company, invested CHF1.5m in ph AG, a Swiss company, for shares and exclusive Asia-Pacific licensing rights for a beverage product. Disputes arose over alleged share dilution, misrepresentations about shareholding maintenance, and mandatory use of specific product components. Vanbo commenced proceedings in Singapore and obtained a worldwide Mareva injunction ex parte. The defendants applied to set aside the injunction and stay the proceedings on grounds of forum non conveniens and the existence of an arbitration clause. Multiple agreements governed different aspects of the relationship: an Investment Agreement (Singapore law, non-exclusive Singapore jurisdiction), a Shareholders' Agreement (Swiss law, exclusive Swiss jurisdiction), a License Agreement (ICC arbitration in Switzerland), and others.","decided":"The Court set aside the worldwide Mareva injunction and stayed the proceedings. Vanbo failed to establish a real risk of dissipation: the defendants' assets were not primarily liquid funds, no credible evidence s","reasoning":"The Court applied *Bouvier* and *JTrust Asia*: a claimant seeking worldwide Mareva relief must prove both a good arguable case and a real risk of dissipation through \"solid evidence,\" with more exacting scrutiny for worldwide relief. On dissipation risk, the Court followed *Continental Shipping Line*, holding that asset liquidity alone cannot establish risk, and that dealings in the ordinary course of business do not demonstrate unjustified asset disposal. Where a claimant possesses full knowledge of a defendant's financial position and voluntarily accepts associated risks, such circumstances cannot subsequently establish dissipation risk (*Continental Shipping* applied). On competing jurisdiction clauses, the Court adopted the \"pith and substance\" test from *Bunge SA* and *Oei Hong Leong*, examining which agreement bears the closest connection to the dispute's commercial centre. The Shareholders' Agreement's supremacy clause, its comprehensive treatment of shareholder rights, and Vanbo's own pleadings all pointed to Swiss jurisdiction for investment disputes. Applying *Vinmar Overseas*, the Court held that where an exclusive jurisdiction clause governs, the \"strong cause\" test under *The Eleftheria* replaces *Spiliada* forum non conveniens analysis. The Court distinguished *Donohue v Armco* (which prioritised avoiding fragmentation) and followed *Asiana Airlines* (which held that contractual forum selection cannot be overridden merely to avoid fragmentation when parties deliberately chose different dispute resolution mechanisms for different claims).","watch":"The judgment contains significant obiter on forum fragmentation: the Court endorsed the *Asiana Airlines* approach that parties receive the benefit of their contractual bargain even where this fragments proceedings, rejecting *Donohue*'s prioritisation of consolidation. Lower courts may rely on this in anti-suit injunction applications. The Court's analysis of competing jurisdiction clauses — particularly its willingness to give effect to different clauses governing different aspects of a commercial relationship — may influence how courts approach suite-of-agreements cases."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework in *Bouvier, Yves Charles Edgar v Accent Delight International Ltd* [2015] 5 SLR 558 and *JTrust Asia Pte Ltd v Group Lease Holdings Pte Ltd* [2018] 2 SLR 159 for Mareva injunctions without elaboration, treating the real risk of dissipation test as settled. More substantively, the Court engaged with *Bunge SA v Shrikant Bhasi* [2020] 2 SLR 1223 and *Oei Hong Leong v Goldman Sachs International* [2014] 3 SLR 1217 to determine which of several competing dispute resolution clauses governed the claims, applying the objective intention test to identify the applicable clause by reference to the nature and subject matter of each claim. The Court also applied *Vinmar Overseas (Singapore) Pte Ltd v PTT International Trading Pte Ltd* [2018] 2 SLR 1271 for the \"strong cause\" test governing stays in favour of exclusive jurisdiction clauses, and *Asiana Airlines, Inc v Gate Gourmet Korea Co, Ltd* [2024] 2 SLR 279 for the approach to forum fragmentation concerns in the arbitration context, clarifying how those concerns apply when different claims are properly subject to different dispute resolution mechanisms.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to a complex multi-party, multi-contract dispute without developing new law. The Court's application of the objective intention test from *Bunge* and *Oei Hong Leong* to parse competing jurisdiction and arbitration clauses across multiple related agreements illustrates the mechanics of that test but does not extend or qualify it. The Court's treatment of forum fragmentation concerns under *Asiana Airlines* confirms that such concerns do not override parties' contractual allocation of disputes to different fora where the relevant clauses are clear and govern distinct subject matter.","cited_cases":[]},{"title":"Mustaqim Bin Abdul Kadir v PUBLIC PROSECUTOR","citation":"[2026] SGCA 15","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_15","matched_topics":["criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"An application to adduce fresh evidence on appeal will be dismissed as an abuse of process where counsel had expressly considered calling psychiatric experts at trial to support a state-of-mind defence but deliberately chose not to do so, and now seeks to run that contradictory defence on appeal under the guise of fresh evidence.","facts_posture":"The appellant was convicted on a capital charge of trafficking not less than 56.8g of diamorphine. His trial defence was that 42.62g represented two bundles mistakenly delivered which he intended to return (\"Unwanted Drugs defence\"). He also challenged the admissibility of seven CNB statements on grounds of inducement. He appealed his conviction and sentence, and filed a criminal motion to adduce psychiatric evidence suggesting he was disoriented due to drug withdrawal when his statements were recorded, rendering them inadmissible (\"State of Mind Defence\").","decided":"The Court of Appeal dismissed both the criminal motion and the appeal. The fresh evidence failed the *Ladd v Marshall* test because: (i) it was available at trial — counsel had consulted a psychologist and psychiatrist about withdrawal symptoms but elected not to call them; (ii) the application constituted an abuse of process, being an attempt to secure a retrial on a contradictory defence; and (iii) the evidence was not material, as contemporaneous medical examinations s","reasoning":"The Court applied *Ladd v Marshall*'s three conditions (non-availability, materiality, reliability) as attenuated for criminal appeals per *Azuin bin Mohd Tap v PP* [2025] 1 SLR 259, but emphasised that even the relaxed test cannot permit tactical forum-shopping. Following *Masri Bin Hussain v PP* [2025] SGCA 9 and *Khetani v Kanbi* [2006] EWCA Civ 1621, the Court held it an abuse of process for a party to deliberately withhold evidence at trial, then seek to adduce it on appeal — particularly where doing so would require running an inconsistent defence. The record showed counsel had taken instructions on withdrawal symptoms but stopped when the Prosecution indicated it would not rely on the long statements in its case-in-chief, only to cross-examine with them later. Counsel never called the psychologist or psychiatrist. The Court found it contrived that the appellant claimed confusion prevented him mentioning the specific quantity (46.62g) that would take him below the capital threshold, when he had presence of mind to allegedly understand inducements and concoct detailed lies in response. On the substantive appeal, the Court applied *Jumadi bin Abdullah v PP* [2022] 1 SLR 814 to hold that the MDP Notice cannot objectively constitute an inducement by virtue of Explanation 2(aa) to s 258(3) CPC, regardless of how the accused subjectively understood it.","watch":"The Court's reasoning that inconsistent defences can render a fresh evidence application abusive may gain traction in appeals where accused persons attempt to run alternative cases sequentially rather than cumulatively at trial, particularly where counsel has expressly considered but forgone a line of defence."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the flexible approach to admitting fresh evidence in criminal appeals articulated in *Azuin bin Mohd Tap v Public Prosecutor* [2025] 1 SLR 259, which relaxes the strict *Ladd v Marshall* [1954] 1 WLR 1489 conditions in favour of a focus on relevance and reliability. More significantly, it extended the abuse of process principle from *Anan Group (Singapore) Pte Ltd v VTB Bank (Public Joint Stock Co)* [2019] 2 SLR 341—previously applied in civil contexts—to criminal appeals, holding that a deliberate tactical decision to proceed without evidence at trial cannot be reversed on appeal after an adverse outcome. This extension was reinforced by the recent decision in *Masri Bin Hussain v Public Prosecutor* [2025] SGCA 9, which the Court applied to hold that seeking to adduce fresh evidence to run a contradictory defence on appeal constitutes an abuse of process. The Court also followed *Public Prosecutor v Gunasilan Rajenthiran* [2022] 3 SLR 861 regarding the appropriate weight to be given to statements made to psychiatrists.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies that the abuse of process doctrine limiting fresh evidence applications—well-established in civil appeals—applies with equal force in criminal appeals where the accused deliberately withholds evidence at trial for tactical reasons. While the Court acknowledges that criminal appeals receive more latitude under *Azuin*, it confirms that this flexibility does not permit strategic gamesmanship. The reliance on the very recent *Masri* decision suggests the Court of Appeal is actively consolidating this principle across criminal fresh evidence applications.","cited_cases":[]},{"title":"YAO v YAP","citation":"[2026] SGFC 40","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGFC_40","matched_topics":["family law"],"law_shifted":false,"summary":{"bottom_line":"Interim care and control orders under the Guardianship of Infants Act should be made notwithstanding parties' intention to divorce in the future, where clarity and stability are needed — particularly when a child is about to start primary school. The court will not treat access time as a commodity to be mechanistically apportioned by the hour.","facts_posture":"The parties married in December 2023 after their daughter L was born in 2020. The marriage broke down in mid-2024. Because the marriage had subsisted for less than three years, divorce proceedings could not yet be filed. The father filed OAG 161/2025 to formalise access and sought to defer contentious issues (including care and control) to future divorce proceedings. The mother filed OAG 181/2025 seeking interim care and access orders. The parties agreed on joint custody and certain access arrangements but contested interim care and control, overnight midweek access post-primary school, overseas travel duration, and school holiday apportionment.","decided":"The Court granted the mother sole interim care and control pending future divorce proceedings, declined to order shared care and control, and allowed the father's midweek overnight access to continue after L starts primary school in 2027. The father was permitted 7 days' overseas travel with L in 2026, increasing to 14 days annually from 2027. The Court ordered each parent to have half the June and December school holidays on an alternating basis without a gradual phase-in for 2027, and limited public holiday access to daytime hours (except Fridays).","reasoning":"The Court applied the welfare principle in section 3 of the Guardianship of Infants Act, emphasising the need for certainty and stability as L transitions to primary school. Interim orders were necessary despite the prospect of future divorce because co-parenting was already challenging and the timing of divorce proceedings uncertain. The Court rejected shared care and control because the existing arrangement (two days weekly with the father) was \"quintessentially sole care,\" following *VJM v VJL* [2021] 5 SLR 1233 that shared care is not a mere label but requires roughly equal time with both parents. The father's own proposed access contradicted his shared care request. The Court distinguished *VXM v VXN* [2021] SGHCF 42, where weekday overnight access was found disruptive: that father had limited availability, whereas here the father's work flexibility permitted him to ferry L to school. The Court rejected a \"mechanistic approach\" to access hours, citing its own earlier decision in *XLH v XLI* [2025] SGFC 43, and warned against commoditising parenting time. The mother's concerns about disruption from overseas travel and weekday access were found speculative; no incremental approach was warranted given the father's existing overnight access experience.","watch":"These interim orders may be revisited once divorce proceedings commence or after primary school starts if actual disruption materialises. The Court's rejection of hours-based calculus and emphasis on avoiding commodification of access may influence how future access disputes are framed at first instance."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's treatment of *WEM v WEN* [2024] SLR(FC) 247 is analytically significant: it distinguished that case's approval of a \"step-up\" shared care arrangement on the basis that the children there were younger and had not yet commenced primary school, whereas the present child's school routine required greater stability. *VJM v VJL* [2021] 5 SLR 1233 was followed for the principle that shared care orders require roughly equal time with both parents and cannot be granted as a mere label, reinforcing that the Court will not make such orders unless genuinely justified by the time allocation. The Court also distinguished *VXM v VXN* [2021] SGHCF 42, which had expressed concern about weekday overnight access disrupting primary school routines, finding that principle inapplicable where the mother's home was closer to the child's school than the father's. *XLH v XLI* [2025] SGFC 43 was followed for the proposition that a mechanistic focus on hours of access should give way to qualitative considerations.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without materially developing them. The Court's willingness to distinguish *WEM v WEN* and *VXM v VXN* on factual grounds—particularly the child's age and proximity to school—confirms that incremental shared care arrangements and weekday overnight access turn heavily on case-specific circumstances rather than categorical rules. The reliance on *XLH v XLI*'s rejection of mechanistic timekeeping reinforces the courts' qualitative approach to access arrangements, though this represents continuity rather than innovation.","cited_cases":[]},{"title":"YAQ v YAR","citation":"[2026] SGFC 41","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGFC_41","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"A relocation of less than three months with the consent of both parents can establish a new habitual residence for a young child in Singapore, even where one parent later claims his consent was conditional or vitiated. Consent to removal or retention under Article 13(a) of the Hague Convention can only be impugned where there is proof on the balance of probabilities of deceit, fraud or non-disclosure going to the root of the consent — marital discord arising after relocation does not suffice.","facts_posture":"The parents, a U.S. citizen father and Indian citizen mother, relocated as a family from New York City to Singapore in August 2025 after the mother's promotion. The child, a four-year-old U.S. citizen, had lived his entire life in New York until the move. After the family arrived, the parents' relationship deteriorated; the mother remained at the leased family property while the father refused to move in. The father applied under section 8 of the International Child Abduction Act 2010 for the child's return to the U.S., alleging wrongful removal or retention in breach of his custody rights. The mother had earlier filed for custody orders in Singapore.","decided":"The District Court dismissed the application. The child's habitual residence changed from the U.S. to Singapore by 27 October 2025 — approximately three months after arrival — such that his retention in Singapore did not breach the father's custody rights under Article 3 of the Hague Convention. The father failed to prove on the balance of probabilities that his consent to the child's removal or retention was vitiated by the mother's deceit, misrepresentation or non-disclosure.","reasoning":"The Court applied the principles from *TUC v TUD* [2017] SGHCF 12: for young children in cases of relatively short residence, the joint or shared intentions of the parents are a significant factor in determining habitual residence. The Court found on the evidence — including an email from the father contemplating a three-to-five-year stay and a two-year lease with option to renew — that the parties' shared intention was to relocate for at least three to five years, a substantial period relative to the child's age. This, together with the parties shipping all belongings, enrolling the child in an international school with a Pre-K to Grade 12 programme, and arriving on one-way tickets, established integration sufficient to shift habitual residence despite the short duration. On consent, the Court followed *TUC v TUD* in holding that where there is ostensible consent (here, the father travelled together with the family), the burden lies on the party alleging vitiation to prove deceit or dishonesty going to the root of that consent. The father's reliance on post-arrival marital conflict and the mother's parents obtaining long-term visit passes failed that threshold; the evidence showed the mother had no pre-departure intention to separate and was still seeking reconciliation as late as 27 October 2025.","watch":"The Court observed that reconciliation may still be in the child's best interests and encouraged the parties to consider marital counselling or mediation before the outstanding custody application is determined. Though obiter, this signals a willingness to pause adversarial proceedings where prospects of reconciliation exist."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *TUC v TUD* [2017] SGHCF 12 as the governing authority on habitual residence under the Hague Convention on Child Abduction, relying on it at multiple junctures to frame the analytical approach. The Court distinguished two foreign authorities — *In re R* and *Halaf v Halaf* — both of which had found that habitual residence could change within three to four months where parents jointly intended to relocate permanently or for at least a year; the distinction is significant because it clarifies that absent shared parental intention to settle, a short period in a new jurisdiction will not suffice to establish habitual residence. *TDX v TDY* [2015] 4 SLR 982 was cited for the factors governing a child's integration into a social and family environment, though this appears to have been a routine application of established principles rather than any development of the test.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without developing them. The treatment of *In re R* and *Halaf v Halaf* does not break new ground; it simply confirms that those authorities turn on the presence of joint parental intention to relocate, which was absent on the facts here. The reliance on *TUC v TUD* as the framework for habitual residence analysis reflects continuity with recent High Court Family Division practice.","cited_cases":[]},{"title":"XMU v XMV","citation":"[2026] SGHCF 8","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHCF_8","matched_topics":["family law"],"law_shifted":false,"summary":{"bottom_line":"Pre-nuptial agreements executed close to the wedding date will be given weight but not conclusive effect where there are concerns about pressure and limited time for reflection. The court will adjust their application to achieve a just division, particularly by treating income earned during the marriage and deposited into ringfenced accounts as matrimonial assets.","facts_posture":"The parties married in February 2018 after executing a pre-nuptial agreement two days before the wedding. The agreement ringfenced the wife's pre-marital assets, including her company, bank accounts, and properties. The marriage lasted five years with no children. Interim judgment was granted in May 2023. The District Judge gave the agreement full effect, excluding ringfenced assets from the matrimonial pool, and divided the remaining assets 55:45 in the husband's favour. The husband appealed against virtually all aspects of the decision.","decided":"The Court allowed the appeal in part, varying the division ratio to 50.5:49.5 in the husband's favour. The agreement was valid under its governing law (Chinese law) but warranted limited weight rather than conclusive effect given the compressed timeframe for execution. The Court included 5% of balances in the wife's ringfenced bank accounts (approximately $99,600) as matrimonial assets, representing marital income deposited there. The wife's luxury goods ($216,500), the husband's ice cream business ($60,000), paintings ($5,000), and both parties' CPF moneys were included in the pool despite evidential difficulties. The wife's contribution to her car's COE renewal post-IJ was excluded to avoid double-counting.","reasoning":"The Court applied the framework from *TQ v TR* [2009] 2 SLR(R) 961 and *Surindar Singh s/o Jaswant Singh v Sita Jaswant Kaur* [2014] 3 SLR 1284, considering factors including time pressure, opportunity for independent advice, and the parties' relative positions. Whilst the agreement aligned with the parties' pre-marital arrangements regarding the company (the husband having executed a declaration of trust acknowledging the wife's beneficial ownership before marriage), the Court held that mechanical application would unfairly exclude marital income merely because it was deposited into specified accounts. The agreement's purpose was to ringfence pre-marital assets, not fruits of the marriage. \n\nOn asset exclusion, the Court followed *WQP v WQQ* [2024] 2 SLR 557, emphasising that discretionary exclusion is exercised \"very sparingly\" and only in \"special circumstances\" akin to *Ong Boon Huat Samuel v Chan Mei Lan Kristene* [2007] 2 SLR(R) 729 (express renunciation). Evidential difficulty alone does not suffice. The Court adopted broad-brush valuations where evidence was lacking, discounting the husband's valuations of the wife's luxury goods by two-thirds to account for replicas, pre-marital items, and condition.\n\nThe Court distinguished the company from a matrimonial asset, applying *USB v USA* [2020] 2 SLR 588: the husband's work on commission did not constitute \"substantial improvement\" in the economic sense required to transform the wife's pre-marital shares, particularly given the wife's continued strategic control and the husband's subsequent competitive misconduct.","watch":"The reasoning on marital income deposited into ringfenced accounts effectively limits the scope of exclusionary clauses in pre-nuptial agreements where funds commingle. Lower courts may apply similar adjustments where agreements lack granular provisions distinguishing pre-marital wealth from marital earnings, though the 5% apportionment here was fact-specific and heavily dependent on evidence of income flows."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established *ANJ v ANK* framework for division of matrimonial assets without modification. More substantively, it engaged with the line of authority on nuptial agreements, following *TQ v TR* on governing law and *Surindar Singh s/o Jaswant Singh v Sita Jaswant Kaur* on the factors relevant to assessing weight, while drawing on the Australian decision *Thorne v Kennedy* for additional considerations where one party may have been in a position of emotional or other vulnerability. The Court distinguished *Ong Boon Huat Samuel v Chan Mei Lan Kristene* on the basis that the wife in that case had expressly renounced her claim to the excluded asset, whereas no such express renunciation existed here. The routine citations on operative dates for asset identification and valuation (*ARY v ARX*, *BPC v BPB*, *CVC v CVB*) and on the sparing use of exclusionary powers (*WQP v WQQ*) received standard application without elaboration.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to its facts without developing new law. The Court's treatment of the nuptial agreement issue follows the established *Surindar Singh* framework, with reference to foreign authority (*Thorne v Kennedy*) that has already been considered in Singapore cases such as *UKA v UKB*. The distinction of *Ong Boon Huat Samuel* turns on its particular facts rather than any refinement of principle.","cited_cases":[]},{"title":"YAI v YAJ","citation":"[2026] SGFC 38","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGFC_38","matched_topics":["family law"],"law_shifted":false,"summary":{"bottom_line":"A maintenance order specifying payment to the care parent cannot be unilaterally rewritten by the paying parent through direct payments to the child. While the Court may pragmatically credit such payments when assessing arrears, this does not endorse non-compliance with the prescribed payment mode, and the paying parent remains liable for any shortfall.","facts_posture":"The father defaulted on monthly maintenance payments of $400 for his daughter and $300 for his older son (both payable to the mother as care parent) from October 2023 to March 2026. He claimed he was excused because: (a) the daughter had turned 21 and was earning income during work attachment in her diploma course; and (b) he had been paying the son's expenses directly by giving him an ATM card. The mother applied to enforce the arrears.","decided":"The father remained liable for the daughter's maintenance throughout: before she turned 21, during her diploma studies after turning 21 (even for the three months she received approximately $600 monthly during work attachment), and was ordered to pay arrears of $9,980 after offsetting certain direct payments. For the older son, the Court found both parents had contributed to maintenance but ordered the father to pay 50% of the arrears ($4,500), finding he had failed to prove his direct payments fully discharged his obligation. The Court reinforced that maintenance orders cannot be varied unilaterally and awarded costs of $3,000 against the father.","reasoning":"The Court applied s 69(5)(c) of the Women's Charter, which permits maintenance orders for adult children undergoing education \"whether or not while in gainful employment,\" finding this reflects Parliament's intention that such maintenance remains reasonable where the child cannot fully support herself. The phrase does not automatically require maintenance regardless of income, but where the adult child's earnings are modest and likely offset by additional expenses (work attire, meals), maintenance remains \"necessary.\" For work attachment specifically, the Court held that payments received during an attachment forming part of coursework do not constitute \"gainful employment\" and should not be viewed in isolation from associated costs. The father bore the burden under ss 103–104 of the Evidence Act to prove the daughter's income obviated maintenance and that his direct ATM card payments to the son fully discharged his obligation; he failed on both, producing only hearsay and unsupported claims of excessive spending ($4,230 monthly). The Court adopted a broad-brush approach where precise accounting proved impossible, but emphasised this was pragmatic recognition of actual payments, not endorsement of the father's unilateral departure from the order's terms.","watch":"The Court's willingness to credit direct payments toward arrears—while simultaneously condemning the practice and awarding costs—creates potential tension in future enforcement proceedings. Defaulting parents may seize on the 50% discount afforded here, though the Court frames this as fact-specific pragmatism rather than principle. The reasoning on work attachment payments may require reconsideration if structured internship schemes with substantive employment terms become more common."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *XTG v XTH* [2025] SGFC 112 for the governing framework in maintenance enforcement proceedings, focusing on whether the defaulting parent has provided good reasons for non-payment and whether they should be excused from arrears. This represents a straightforward application of established principles without modification.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop the law. It applies the existing two-stage framework from *XTG v XTH* to the facts before it without qualification or extension.","cited_cases":[]},{"title":"Soh Chee Wen v PUBLIC PROSECUTOR","citation":"[2026] SGCA 13","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_13","matched_topics":["criminal procedure and sentencing"],"law_shifted":false,"summary":{"bottom_line":"Courts sentencing for large-scale market manipulation under the SFA must apply heightened sentences that reflect the scale of offending, the harm to Singapore's reputation as a financial hub, and the sophistication of the scheme. Aggravating factors may legitimately be applied across multiple distinct offences without breaching the rule against double counting, provided they speak to the specific mischief targeted by each category of charge. An aggregate sentence of 36 years' imprisonment for orchestrating a $7.8 billion market manipulation scheme is proportionate and does not breach the totality principle.","facts_posture":"Between August 2012 and October 2013, the appellants masterminded a scheme to artificially inflate the markets and prices of three SGX-listed counters (Blumont, Asiasons, LionGold) using 189 trading accounts held across 20 financial institutions. The scheme involved over seven billion trades and caused market capitalisation losses of approximately $7.8 billion and $273 million in financial institution losses. The first appellant also tampered with witnesses and managed companies whilst bankrupt. Following trial, the General Division convicted both appellants on 169 conspiracy charges under the SFA and Penal Code; the first appellant received an additional 11 charges for company management whilst bankrupt and witness tampering. The first appellant was sentenced to 36 years' imprisonment and the second appellant to 20 years. Both appealed against sentence after their conviction appeals were dismissed.","decided":"The Court of Appeal dismissed both appeals against sentence in their entirety. It held that the sentences imposed were proportionate to the appellants' overall criminality and not excessive when measured against the unprecedented scale, sophistication, and harm of the scheme. The Court confirmed that aggravating factors such as scale, sophistication, transnational elements, and harm to Singapore's reputation may properly be considered across multiple categories of charges without double counting, provided they aggravate each offence in a manner specific to its particular mischief. The one-transaction rule did not apply because the offences, though part of an overarching scheme, protected different legal interests and involved separate criminal acts over varying periods. The totality principle was not breached: while 36 years substantially exceeded the normal range for any single offence, it was not crushing given the totality of the criminal behaviour.","reasoning":"The Court endorsed and applied the offence-specific factors for market manipulation under s 197 SFA set out in *Lau Wan Heng v PP* [2022] 3 SLR 1067, including scale (measured by number of accounts, trades, brokerages, and period), sophistication (steps taken to conceal offending), harm (reputational damage and financial loss), and personal benefit. It also articulated, for the first time, a non-exhaustive list of aggravating factors for cheating offences involving market manipulation, including value of property, extent of unrecovered loss, difficulty of detection, efforts to prevent victim recovery, duration of offending, and harm to Singapore's reputation as a financial hub. The Court distinguished pre-SFA cases such as *Tan Koon Swan v PP* [1985-1986] SLR(R) 976 as having no precedential value, given the subsequent tightening of the statutory regime and Parliament's express intention to enhance penalties following the Pan-El crisis. On double counting, the Court clarified that where multiple distinct offences are committed, offence-specific aggravating factors may be applied to each offence provided they operate differently in relation to the particular mischief targeted by each offence, citing *ADF v PP* [2010] 1 SLR 874 and *PP v Raveen Balakrishnan* [2018] 5 SLR 799. The Court also imposed a personal costs order of $10,000 against counsel for the second appellant for advancing baseless allegations of judicial bias without instructions, though it declined to enhance the second appellant's sentence on that basis.","watch":"The Court's guidance on aggravating factors for cheating offences in the context of market manipulation (at [45]) is expressly stated to be non-exhaustive. Lower courts may develop this further in future cases involving financial instruments or complex commercial fraud. The Court also left undisturbed the Judge's decision not to place weight on market participants' specific losses for want of fairness, but signalled (at [20(c)]) that had this been properly canvassed at trial, it could have been a legitimate additional indicator of harm distinct from scale. Counsel advancing allegations of judicial bias without proper foundation now face concrete risk of personal costs orders, even where the client is not prejudiced."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the sentencing frameworks established in *Lau Wan Heng v Public Prosecutor* [2022] 3 SLR 1067 for false trading and market rigging offences under s 197 SFA, and *Public Prosecutor v Ng Sae Kiat* [2015] 5 SLR 167 for manipulative and deceptive device offences under s 201(b) SFA, treating these as the governing frameworks for offence-specific sentencing in securities market misconduct cases. The Court relied on *ADF v Public Prosecutor* [2010] 1 SLR 874 to distinguish between offence-specific aggravating factors (relevant to individual sentence calibration) and cumulative aggravating features (relevant when determining consecutive sentences for multiple offences). In addressing the aggregation of sentences for multiple related offences, the Court applied the one-transaction rule from *Mohamed Shouffee bin Adam v Public Prosecutor* [2014] 2 SLR 998 and the totality principle from *Public Prosecutor v Raveen Balakrishnan* [2018] 5 SLR 799, utilising these to avoid double-counting whilst ensuring the aggregate sentence reflected overall criminality.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment represents a straightforward application of established sentencing principles to securities market manipulation offences without material development of the law. The frameworks from *Lau Wan Heng* and *Ng Sae Kiat* continue to govern the sentencing approach for the respective offence types, with no refinement or qualification to their operation.","cited_cases":[]},{"title":"PUBLIC PROSECUTOR v JOHNSON TAN WEE KIAT (JOHNSON CHEN WEIJI)","citation":"[2026] SGHC 59","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_59","matched_topics":["criminal procedure and sentencing"],"law_shifted":false,"summary":{"bottom_line":"Prolonged inattention when beating a red light justifies a heavier sentence within Band 1 of *Chen Song*, even if not sufficient to elevate the case to Band 2. The Court made clear that a driver who fails to notice a red light that has been showing for several seconds is more culpable than one who runs a light only just turned red, and that this difference must register in the indicative starting sentence. The Prosecution's appeal succeeded in part: imprisonment enhanced from one week to three weeks.","facts_posture":"The respondent turned right against a red light at a junction, colliding with a motorcyclist travelling straight with right of way. The victim suffered a mildly displaced rib fracture, treated conservatively with 21 days' outpatient medical leave. The respondent pleaded guilty to careless driving causing grievous hurt under s 65(1)(b) read with s 65(3)(a) and (6)(d) RTA. The District Judge imposed one week's imprisonment and five years' disqualification. The Prosecution appealed the imprisonment term as manifestly inadequate.","decided":"The appeal succeeded. The imprisonment term was increased to three weeks; the five-year disqualification stood. The Court held that the case fell within Band 1 of the *Chen Song* framework (lesser harm, lower culpability), but that the indicative starting sentence of approximately 10 days adopted below failed to reflect the prolonged period of inattention — the traffic light had already been red for five seconds before the respondent entered the junction.","reasoning":"The Court applied *Chen Song v PP* [2025] 3 SLR 509 strictly. It agreed with the District Judge that there was only one primary harm factor (vulnerable rib fracture) and one culpability factor (failing to conform to traffic signal), thus placing the case in Band 1. However, the Court identified the five-second delay as raising a second potential culpability factor: high degree of carelessness in the form of prolonged inattention. Had this been treated mechanistically, the case would shift to Band 2 (floor of six months' imprisonment). Following the admonition in *Chen Song* at [123] against mechanistic application, the Court exercised discretion to keep the case in Band 1, reasoning that beating a red light and doing so after prolonged delay are closely intertwined. Nevertheless, the Court emphasised that the duration of inattention must translate into an uplift within the band — a driver who fails to notice a red light showing for several seconds is plainly more culpable than one who runs a light just turned. The indicative starting sentence was set at one month (reduced to three weeks after the 30% guilty plea discount), compared with the District Judge's implicit starting point of 10 days.","watch":"The Court left untouched the question of whether potential harm to the victim himself (as distinct from other road users) can constitute a secondary harm factor under *Chen Song*. The Prosecution argued that vehicles behind the victim might have run him over; the Court declined to engage definitively, noting only that *Chen Song* at [129] referred to \"other road users,\" and that the facts here did not support meaningful potential harm in any event."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the sentencing framework established in *Chen Song v Public Prosecutor* [2025] 3 SLR 509 for careless driving offences under the Road Traffic Act, treating it as the governing authority across multiple paragraphs. The Court distinguished two recent District Court decisions—*Public Prosecutor v Lau Shiao-Li Alexis (Liu Xiaoli)* [2025] SGDC 25 and *Public Prosecutor v Yeo Seong Bee Eric* [2025] SGDC 201—both of which involved careless driving causing grievous hurt, though the grounds of distinction are not specified in the citation data. In assessing the weight to be given to the accused's antecedents, the Court applied *Chan Chow Chuen v Public Prosecutor* [2024] SGHC 294 on the treatment of prior compounded offences in sentencing.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled law to new facts without materially developing existing principles. The *Chen Song* framework for careless driving sentencing continues to govern, and the Court's willingness to distinguish the two District Court decisions suggests routine application of established sentencing principles to differing factual matrices rather than any refinement of the legal test itself.","cited_cases":[]},{"title":"PUBLIC PROSECUTOR v Mookkapillai Pazhanivel","citation":"[2026] SGHC 60","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_60","matched_topics":["criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"Trial judges may manage cross-examination by unrepresented accused persons in sexual offence cases by requiring questions to be posed through the court, after first canvassing the areas of questioning in the witness's absence — this does not violate the accused's right to a fair trial, provided protective measures are transparently explained.","facts_posture":"The accused, unrepresented, claimed trial to rape and sexual assault charges involving digital and penile penetration of a 12-year-old victim at a grass patch. He admitted meeting the victim and performing oral sex, but denied penetration, claiming a \"smell\" caused him to stop. The victim testified to both penetrative acts. The trial proceeded with the accused cross-examining witnesses through the court; a physical screen shielded the victim from eye contact.","decided":"The Court convicted on both charges. The victim's testimony was found \"unusually convincing\" — internally consistent, externally consistent with contemporaneous messages and her psychiatric account, and unshaken in cross-examination. The accused's evidence was rejected: his assertion about the smell and shortened encounter duration contradicted earlier statements; his claim that the victim sent a \"no sex\" message was a deliberate lie amounting to a *Lucas* lie corroborating guilt. The accused was sentenced to 15 years' imprisonment and 14 strokes of the cane (Rape Charge: 15 years and 10 strokes; SAP Charge: 10 years and 4 strokes, concurrent).","reasoning":"The Court adopted the framework in *GCK* and *Haliffie*: the \"unusually convincing\" standard requires assessment of internal and external consistency, not strict corroboration in the *Baskerville* sense. Minor omissions (e.g., not mentioning penetration to friends) were explicable given the victim's age, shame, and fear of judgment; delayed reporting is inconclusive (*Thangarajan*). The victim's past fabrications did not undermine her trial testimony, where she knew the importance of truthfulness. The accused's shifting position — duration of encounter halved at trial, smell allegation raised belatedly — undermined credibility. His lie about receiving a \"no sex\" message satisfied all four *Lucas* requirements: deliberate, material, motivated by guilt, and contradicted by objective evidence. The Court noted the \"unusually convincing\" label is merely a heuristic; the real inquiry is whether guilt is proven beyond reasonable doubt. On procedure, the Court clarified that in sexual offence cases involving self-represented accused, judges must scrutinise questions for relevance, permissibility, and repetitiveness (*Lucas Seah v PP*), with additional safeguards such as court-mediated questioning to protect complainants from inappropriate cross-examination (*Thangarajan*).","watch":"The Court observed (obiter) at [53] that the \"unusually convincing\" label may be unhelpful and should perhaps be discarded in favour of simply asking whether the Prosecution has proven its case beyond reasonable doubt — lower courts may resist this, but it signals potential appellate refinement."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *GCK v Public Prosecutor* [2020] 1 SLR 486 for the established test of assessing internal and external consistency when determining whether a victim's testimony is unusually convincing in sexual offence cases. It applied *Thangarajan Elanchezhian v Public Prosecutor* [2024] 6 SLR 507 and *Seah Yong Yi Lucas v Public Prosecutor* [2025] 4 SLR 838 to the management of inappropriate cross-examination by the self-represented accused, particularly regarding questions that ventured into irrelevant sexual history. The Court also applied the requirements from *Regina v Lucas* [1981] QB 720 to determine whether lies told by the accused could serve as corroborative evidence of guilt.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop new law but rather applies settled principles to its facts. The application of *Thangarajan* and *Lucas* together is noteworthy insofar as it demonstrates the Court's willingness to balance protective measures for complainants against the right of self-represented accused persons to test the prosecution's case, though the relevant principles themselves were not extended or qualified. The Court's reference to *Tang Kin Seng v Public Prosecutor* [1996] 3 SLR(R) 444 as the origin of the \"unusually convincing\" standard appears to be historical context only, with no suggestion that the test as refined in *GCK* required further development.","cited_cases":[]},{"title":"LEONG YIM LING v MOEY PARK MOON","citation":"[2026] SGHC 57","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_57","matched_topics":["family law"],"law_shifted":false,"summary":{"bottom_line":"Retirement and loss of employment income do not, without more, constitute material change in circumstances justifying rescission of spousal maintenance obligations. The court will assess whether the former husband's overall financial position — assets, savings, investment income — remains sufficient to discharge existing obligations. Where it does, periodic maintenance may be converted to lump sum maintenance to achieve a clean break, especially where there is a history of enforcement defaults and protracted litigation.","facts_posture":"The defendant husband sought rescission of his spousal maintenance obligations, imposed by consent order in 2013, on the ground that he had retired at 67 and could no longer work. This was his third variation application; two prior attempts (in 2015 and 2018) had been dismissed by Woo Bih Li J. The parties' marriage ended in 2013 after 29 years. The plaintiff wife, now 65, had been a homemaker caring for the parties' son, who has Asperger's Syndrome. The husband earned approximately $246,000 per annum in the four years before retirement and had been ordered to pay $5,150 per month in total maintenance (base sum, travel, and medical/dental/optical expenses).","decided":"Pang Khang Chau J dismissed the rescission application, finding no material change in circumstances. The husband's obligation to maintain his former wife prima facie continues beyond retirement and up to her remarriage or death of either party. Retirement is foreseeable at the time maintenance orders are made and does not, standing alone, justify rescission. The inquiry is whether the husband's retirement, considered together with his overall financial circumstances, renders him incapable of fulfilling his obligations. Here, the husband owned five properties in Malaysia, had insurance policies worth $121,491, investment accounts totalling at least $92,310, CPF withdrawals of $327,381, and bank savings of at least $378,749. The Court converted periodic maintenance to lump sum maintenance of $364,800 (eight-year multiplier, $3,800 monthly multiplicand), in part because the husband had repeatedly defaulted on maintenance payments.","reasoning":"The Court applied the three-stage test from *ATS v ATT* [2016] SGHC 196 and *BZD v BZE* [2020] SGCA 1: the alleged change must have arisen after the ancillary matters hearing, and must be sufficiently material that it is no longer fair to expect the status quo to remain. Pang J emphasised the principle from *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 that a husband paying periodic maintenance cannot expect to be relieved entirely by reason of retirement. He distinguished cases like *VOX v VOY* [2021] SGFC 11 and *VJD v VJE* [2020] SGFC 88, where rescission was granted, on the basis that those husbands had shown they lacked continuing income streams, assets, or ability to pay; here, the husband's retirement savings and assets were substantial. The Court rejected the husband's argument that maintenance should not create lifetime dependency, holding that such an argument should have been made at the ancillary matters stage; variation applications presume the original order was appropriate. An adverse inference was drawn against the wife for failing to comply with three disclosure orders, reducing the multiplicand from $4,500 to $3,800 and rescinding the hospital/surgical bills obligation. The Court considered a clean break appropriate given the parties' acrimony and the husband's enforcement defaults.","watch":"The judgment leaves open whether the outcome would differ if the husband could show his assets were insufficient to sustain even reduced maintenance beyond a defined period, as occurred in *VOX*. Practitioners should note the Court's willingness to draw robust adverse inferences from non-compliance with disclosure orders — here reducing the lump sum quantum by approximately 15% — and to use lump sum orders strategically to curtail enforcement applications where parties litigate repeatedly."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *BZD v BZE* [2020] SGCA 1 for the governing test in variation applications: whether the change is sufficiently material such that it is no longer fair to expect the status quo to remain, rather than a de novo inquiry. The Court relied on *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506 and *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 for the proposition that a husband remains prima facie obliged to maintain his former wife beyond retirement, and that retirement does not entitle him to be relieved entirely from maintenance obligations. For the lump sum calculation methodology, the Court applied *Wan Lai Cheng v Quek Seow Kee* [2012] 4 SLR 405, which provides that the appropriate multiplier is typically the average of female life expectancy and male retirement age, less the wife's present age.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles without developing them. The Court's treatment of the retirement issue is orthodox, confirming that retirement constitutes a material change warranting reconsideration but does not automatically terminate maintenance obligations—an application of existing authority to familiar facts. The methodology for calculating lump sum maintenance awards likewise follows the established framework without refinement.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
