<script>
const DIGEST_DATA = {"user_name":"Ruth","digest_date":"3 April 2026","cases":[{"title":"YAP SIU CHENG V YAP SUI CHENG WENDY & ANOR","citation":"[2026] SGHC 71","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_71","matched_topics":["trusts"],"law_shifted":true,"summary":{"bottom_line":"An executor's duty to account extends only to assets actually received as part of the deceased's estate and how they have been dealt with. It does not entitle a beneficiary to interrogate the executor about items the beneficiary suspects might have existed or ought to have been found. The duty to account is distinct from (and does not encompass) the executor's duty to make sufficient inquiry when calling in estate assets.","facts_posture":"The claimant beneficiary sued her two sisters, who were executors of their late mother's will, seeking to compel them to answer detailed questions about items she believed should have been included in the Schedule of Assets filed in the probate proceedings. She also claimed that a Honda Stream registered in the second defendant's name was held on trust for their parents. The executors had already filed the Schedule of Assets, distributed some items, and provided bank statements and a professional valuation report for the household contents.","decided":"The Court dismissed both claims. The executors were not required to answer questions that did not concern estate assets actually received by them, including questions about items allegedly missing from a safe deposit box, the contents of their late father's briefcase three years before the mother's death, jewellery items not found after extensive searches, and a Panamanian entity with no proof of parental ownership. The Honda Stream was not held on trust; the claimant failed to prove the parents paid for it or that any trust (express, common intention constructive, or resulting) existed. The Court also declined to order a full account of the estate administration, finding the executors had already rendered sufficient account during the proceedings.","reasoning":"The Court applied established principles from *Lakshmi Prataprai Bhojwani v Moti Harkishindas Bhojwani* and *Foo Jee Boo v Foo Jhee Tuang* to distinguish an executor's duty to account from the duty to make sufficient inquiry when calling in assets (the latter deriving from *Chye Seng Kait v Chye Seng Fong*). The duty to account concerns assets actually received and the executor's dealings with them; it does not require answering speculative questions about what might have been part of the estate. The Court rejected the claimant's attempt to advance an unpleaded case based on alleged failure to make sufficient inquiry, applying the general rule in *V Nithia v Buthmanaban* and *How Weng Fan v Sengkang Town Council* that parties are bound by their pleadings. Even if considered, the unpleaded case failed: the Court found no evidential basis to conclude that purported missing items (jewellery not seen for years, bank accounts last evidenced over a decade before death) remained part of the estate. The Court also applied *Chng Weng Wah v Goh Bak Heng* to find that an actual account had been rendered during proceedings, making any further order oppressive.","watch":"The judgment does not address what constitutes \"sufficient inquiry\" when executors face ambiguous evidence about potential assets, though it emphasises reasonableness depends on the circumstances. Practitioners should note the Court's treatment of professional valuation reports (here, accepted as sufficient particularisation despite grouped items like \"assorted glasswares\") and its willingness to find an account rendered through correspondence and affidavit evidence during litigation."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied a trio of High Court authorities to establish and apply the well-settled principles governing an executor's duty to account. *Foo Jee Boo v Foo Jhee Tuang* [2016] SGHC 260 and *Foo Jee Seng v Foo Jhee Tuang* [2012] 4 SLR 339 were applied for the uncontroversial proposition that beneficiaries need not allege breach to demand accounts—the duty arising from the fiduciary relationship itself. More substantively, *Lakshmi Prataprai Bhojwani v Moti Harkishindas Bhojwani* [2019] 3 SLR 356 was applied as the governing authority on the scope of the duty to account, with the Court drawing on *Lalwani Shalini Gobind v Lalwani Ashok Bherumal* [2017] SGHC 90 to clarify that the duty pertains only to estate assets actually received by the executor. *Ng Chee Tian v Ng Chee Pong* [2025] SGHC 246, a very recent decision, was applied for the orthodox formulation of what a proper executor's account should contain.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment is a routine application of settled principles to the facts. The law concerning an executor's duty to account has been stable since at least 2012, and the Court did nothing to extend, narrow, or otherwise modify the established framework. The treatment of *Lalwani* clarifies—without breaking new ground—that the duty to account is confined to assets actually within the executor's control, but this is confirmation rather than innovation.","cited_cases":[{"case_name":"PT Sandipala Arthaputra v STMicroelectronics Asia Pacific Pte Ltd and others","citation":"[2018] 4 SLR 828","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"Two-step approach to determine whether contempt has been committed"},{"case_name":"Mok Kah Hong v Zheng Zhuan Yao","citation":"[2016] 3 SLR 1","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"The requisite mens rea for contempt of court"},{"case_name":"Tay Kar Oon v Tahir","citation":"[2017] 2 SLR 342","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"considered","proposition":"Factors to consider in sentencing for civil contempt"}]},{"title":"Lim Siew Hwa v Loh Kim Hon","citation":"[2026] SGDC 117","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_117","matched_topics":["landlord and tenant"],"law_shifted":true,"summary":{"bottom_line":"A landlord cannot terminate a residential tenancy for breach of a repair or inspection clause unless that clause is expressly or implicitly a 'condition' in the *RDC Concrete* sense — and repair, alteration, and inspection clauses are almost never conditions absent clear language or prior precedent. Persistent inspections and correspondence alleging unfounded repudiatory breach can themselves breach the tenant's covenant for quiet enjoyment and sound in damages.","facts_posture":"The landlord leased a semi-detached house to the tenant for four years at $4,000 per month. During the tenancy, disputes arose over furniture moved to the backyard, removed grilles, and access for inspections. The landlord purported to terminate the tenancy for repudiatory breach; the tenant refused to vacate. The landlord sued for possession and damages. The tenant counterclaimed for breach of the quiet enjoyment covenant and breach of a dispute resolution clause requiring pre-litigation mediation or arbitration.","decided":"None of the landlord's claims gave rise to a right to terminate the tenancy. Clauses requiring the tenant to keep furniture in repair (cl 4.3), permit inspections (cl 4.7(a)), refrain from removing items (cl 5.1(a)), or refrain from alterations (cl 5.1(b)) were not 'conditions' within situation 3(a) of the *RDC Concrete* framework. Minor breaches (moving a table, removing grilles without consent) attracted only nominal damages ($60 total). The landlord breached the quiet enjoyment covenant by conducting six inspections in under a year and sending 24+ letters alleging termination. The tenant recovered $14,343 in solicitors' costs incurred responding to those allegations, plus $100 for breach of the mediation clause.","reasoning":"The Court applied *RDC Concrete*: a term is a 'condition' only if the parties intended that *any* breach, however minor, would entitle termination. Guided by *Man Financial*, the Court looked for statutory classification, express language, or precedent — none existed. Each clause either provided its own limited remedy (reinstatement, damages, cost recovery) or covered such a wide range of conduct that the parties could not have intended every breach to justify termination. The sentimental value of the premises was overstated: the landlord had previously let to multiple tenants. On quiet enjoyment, the Court adopted *Lim Kau Tee*: substantial interference with lawful enjoyment suffices, need not be physical, and may be temporary. Six inspections in under a year, coupled with repeated assertions that the tenant had no right to remain, crossed that threshold. The inspection right in cl 4.7(a) must be read alongside the quiet enjoyment covenant (cl 6.1(b)) per *Earl of Plymouth*, not in isolation.","watch":"The reasoning on 'conditions' is orthodox application of *RDC Concrete*, but repair and alteration clauses in standard-form residential leases will rarely meet the threshold after this decision. The Court's readiness to award solicitors' costs as damages for breach of quiet enjoyment may embolden tenants facing aggressive landlord conduct."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established *RDC Concrete* framework for determining whether a contractual term is a condition, focusing specifically on situation 3(a) where parties expressly designate a term as such. Within that framework, it applied *Man Financial* to identify relevant factors for assessing whether an express designation should be given effect — particularly the language used, the practical consequences of breach, and the commercial purpose of the provision. The Court's engagement with *Earl of Plymouth*, an English Court of Appeal decision on reconciling inspection and quiet enjoyment rights in tenancy agreements, is noteworthy: the Court adopted its approach of construing the rights as complementary rather than conflicting, treating this as persuasive authority for how to interpret potentially competing contractual obligations in the landlord-tenant context. On the covenant for quiet enjoyment, *Lim Kau Tee* was applied for the core principle that actionable interference must be substantial, though the application here appears routine.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled Singapore law on contractual conditions without materially extending or qualifying it. The adoption of *Earl of Plymouth*'s approach to reconciling inspection and quiet enjoyment rights represents a measured embrace of recent English authority in an area where Singapore case law is relatively sparse, but this is incremental development rather than a departure. The Court's treatment of the repair covenant principles from *Proudfoot v Hart* similarly involves standard application of established common law principles to the facts at hand.","cited_cases":[]},{"title":"STEVEN KURNIAWAN PRAYITNO v OH CHIN ANN & 2 Ors","citation":"[2026] SGHC 70","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_70","matched_topics":["contract"],"law_shifted":false,"summary":{"bottom_line":"A bailee who sells the bailor's goods to recover unpaid storage fees commits both a breach of bailment and conversion unless the parties' agreement, unequivocally evidenced, conferred such a right. Silence or acquiescence in the face of threats to sell does not constitute contractual variation; commercial parties cannot retrospectively claim authority to dispose of bailed goods based on the bailor's failure to object during ongoing dealings.","facts_posture":"The plaintiff, an Indonesian businessman, engaged the first and second defendants (director and company respectively) to import 14 antique cars from the UK via Singapore for onward export to Indonesia. Under an oral agreement formed in 2016, the defendants arranged shipping, storage and export documentation. When Indonesian import permits were delayed, storage fees accumulated. The defendants paid these fees initially but later sold all 14 cars without the plaintiff's consent to recoup outstanding charges. The plaintiff sued all three defendants (the third having been mistakenly named as consignee for two cars) for breach of bailment duties and contract. The trial was bifurcated; this judgment concerns liability only.","decided":"The Court held the first and second defendants jointly and severally liable in bailment and the second defendant liable in contract for 13 of the 14 cars. The parties' 2016 oral agreement required the plaintiff to reimburse storage fees only after the cars reached Indonesia, not during the storage period in Singapore. Even if regular reimbursement had been required, no contractual variation arose permitting sale of the cars; the plaintiff's silence when threatened with sale did not satisfy the legal requirements for variation. The parties later concluded a July 2019 agreement for the defendants to transfer the remaining cars to the plaintiff's company in exchange for S$125,805.96, with concurrent obligations. The defendants repudiated this agreement by selling the cars instead. The third defendant was not liable, having never voluntarily assumed possession of the two cars for which he was mistakenly named consignee.","reasoning":"The Court applied settled principles that a bailee's common law duties to take care of goods and not convert them can only be excluded by express stipulation clearly accepted by the bailor (*Harling v Eddy* (1951), adopted in *Alan Chua* (1993)). The first defendant's subjective belief he could sell the cars, absent the plaintiff's agreement, fell far short of this standard. The Court scrutinised the parties' WhatsApp and email exchanges closely, finding them more consistent with ad hoc goodwill prepayments than a binding obligation to reimburse fees during storage. The first defendant's pattern of chasing payment only when himself pressed by storage companies, coupled with vague references to \"regular and timely\" reimbursement without specified deadlines, negated any implied term permitting sale.\n\nOn contractual variation, the Court emphasised that unilateral variation is impermissible and mere acquiescence insufficient (*Fairview Developments* (2014), citing Wilken & Ghaly). Fresh consideration is required unless dispensed with at contract formation. The plaintiff's non-objection to threats of auction, read in context, showed concern about delay rather than acceptance of the defendants' asserted right. The Court found the first defendant evasive and dishonest, particularly his denial at trial of a 17 July 2019 meeting he himself had pleaded and deposed to. Contemporaneous WhatsApp messages and a statement of account signed the next day conclusively proved the meeting occurred, fatally undermining his credibility.\n\nThe July 2019 agreement was reconstructed from the statement of account and subsequent conduct. The plaintiff's shocked reaction on 18 July 2019 upon learning (incorrectly) that three Porsche cars had been sold corroborated his evidence that he believed all cars would be returned. The Court held the settlement sum of S$125,805.96 made sense only if the defendants were to return those cars; otherwise the supposed sale proceeds of S$200,000 would have extinguished the debt. The obligations were concurrent, not sequential, meaning neither party could complain of non-performance while failing to tender their own. The defendants' refusal to engage and subsequent sale of all remaining cars constituted repudiatory breach.\n\nThe Court distinguished the third defendant's position entirely. Being named as consignee on a sea waybill does not automatically create bailment absent voluntary assumption of possession. The first defendant fabricated authorisation documents using the third defendant's business stamp without permission to collect the two Porsche cars, a finding the first defendant ultimately admitted. The touchstone of bailment is knowing and willing possession (*Alwie Handoyo* (2013)); the third defendant had none.","watch":"The Court's strong obiter remarks that the first defendant likely treated the second defendant as his \"personal piggy bank\" and siphoned sale proceeds (routing S$208,000 to a third party on purported loans never repaid) suggest the corporate veil might also have been pierced had it been necessary to the result. Practitioners should note the Court's willingness to account for sale proceeds as an alternative to damages in bailment, with election required before inquiry."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied established authority without controversy. *Felthouse v Bindley* (1862) 11 CB (NS) 869 and *Ma Hongjin v SCP Holdings Pte Ltd* [2021] 1 SLR 304 were invoked for the uncontroversial propositions that contractual variations require acceptance (not mere acquiescence) and fresh consideration. *RDC Concrete Pte Ltd v Sato Kogyo (S) Pte Ltd* [2007] 4 SLR(R) 413 provided the standard test for repudiatory breach. On bailment, the Court applied *Alwie Handoyo v Tjong Very Sumito* [2013] 4 SLR 308 and the recent *Jeil Crystal* [2024] 4 SLR 1691 for the proposition that bailment requires voluntary assumption of possession of another's goods—both cases cited for their articulation of the same settled principle.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies existing doctrine to its facts without developing the law. The principles governing contractual variation, repudiatory breach, and bailment are well-settled, and the Court's deployment of them was orthodox. The citation of *Jeil Crystal*, a 2024 Court of Appeal decision, confirms continuity in the bailment test rather than any evolution.","cited_cases":[]},{"title":"Shanmugam Kasiviswanathan v Xu Yuanchen","citation":"[2026] SGHC 69","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_69","matched_topics":["damages"],"law_shifted":true,"summary":{"bottom_line":"The Court assessed damages at $210,000 for each of two Cabinet Ministers defamed by The Online Citizen, comprising $160,000 general damages and $50,000 aggravated damages — placing this at the upper end of the range established in *Lee Hsien Loong v Xu Yuan Chen* [2022] 3 SLR 924 and *Shanmugam Kasiviswanathan v Lee Hsien Yang* [2024] 5 SLR 194, and confirming that defendants who breach injunctions, act maliciously, and persist in publication throughout proceedings face substantial awards.","facts_posture":"The claimants, both Cabinet Ministers, sued the defendant, chief editor of The Online Citizen (\"TOC\"), for defamation arising from an article published on 12 December 2024 alleging they had exploited legal mechanisms for privacy in property transactions to avoid scrutiny and thereby acted improperly. The defendant did not file a notice of intention to contest. The claimants obtained default judgment on 26 August 2025, including an injunction. This is the assessment of damages hearing, conducted jointly for both proceedings.","decided":"The Court awarded each claimant $210,000: $160,000 general damages and $50,000 aggravated damages. The defamatory meaning — that the Ministers had acted improperly by exploiting opacity in the system — was taken as admitted by virtue of the default judgment. The Court found the defamation very grave, directly impugning the claimants' personal integrity and professional reputation as Cabinet Ministers. Publication was substantial, with the article garnering over 44,000 views across multiple platforms, amplified by the defendant's four follow-up articles driving additional traffic. Malice was established through reckless disregard for truth despite notice of falsehoods.","reasoning":"The Court applied the established factors from *Freddie Koh* and *Peter Lim*, emphasising that defamatory statements touching Ministers' public service damage both personal reputation and Singapore's standing. Higher damages flow from the claimants' standing as public leaders. The defendant's conduct was particularly egregious: he refused to apologise when given the opportunity, continued drawing attention to the article after proceedings commenced, and breached the injunction by refusing to remove the article. Malice was found under *GCT v Jeyaretnam Joshua Benjamin* [1998] 2 SLR(R) 971: the defendant published recklessly, without caring whether the content was true, and persisted despite being notified of falsehoods. The Court situated the award between *LHL v XYC* ($210,000) and *KS v LHY* ($200,000), finding the present case graver than the former because allegations concerned improper conduct as public officers, not family matters, and publication was comparable in scale.","watch":"The Court did not address whether the \"percolation phenomenon\" recognised in *LHL v XYC* justifies inferring wider publication from modern social media dynamics without direct evidence of third-party republication. Future defendants may test whether evidence of cross-platform amplification alone suffices to establish substantial publication."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework in *Lim Eng Hock Peter v Lin Jian Wei* [2010] 4 SLR 357 and *Koh Sin Chong Freddie v Chan Cheng Wah Bernard* [2013] 4 SLR 629 for assessing quantum of general damages in defamation, considering factors including the nature and gravity of the defamatory statement, the mode and extent of publication, and the claimant's standing. *Arul Chandran v Chew Chin Aik Victor* [2001] 1 SLR(R) 86 was cited for the uncontroversial proposition that general damages serve to console, repair, and vindicate the claimant's reputation. The Court also applied *Goh Chok Tong v Jeyaretnam Joshua Benjamin* [2998] 2 SLR(R) 971 on aggravated damages as compensatory awards triggered by the defendant's conduct aggravating the injury to feelings, noting that the defendant's failure to apologise or retract was relevant to this assessment.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment represents a straightforward application of settled defamation damages principles to the facts of a default judgment assessment. The Court did not modify or extend any existing legal tests, nor did it resolve any doctrinal uncertainty—it simply worked through the familiar multi-factorial analysis established by the leading authorities to arrive at an appropriate quantum on the particular facts before it.","cited_cases":[]},{"title":"TAN AI NGOH v SHAIK FARID BIN OLI ABDUL LATIFF","citation":"[2026] SGDC 106","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_106","matched_topics":["damages"],"law_shifted":true,"summary":{"bottom_line":"Where residual pain from orthopaedic trauma is attributed to surgical hardware rather than permanent articular damage, the court will not treat the disability as permanent if removal of the implant is expected to resolve symptoms—even where another expert opines otherwise based on pre-operative imaging.","facts_posture":"A 66-year-old pedestrian sustained a left tibial plateau fracture, bilateral foot fractures, and soft tissue injuries in an August 2018 collision. After surgical fixation and rehabilitation, she returned to part-time work but claimed ongoing knee pain, headaches, and post-traumatic stress disorder. Following an 80% liability consent judgment, the matter proceeded to assessment of damages before the Deputy Registrar over multiple hearings in 2025.","decided":"The Court awarded $56,350 (100% basis). For the left knee fracture, the Court awarded $11,500, rejecting permanence of residual pain. It found the pain attributable to hardware irritation rather than articular cartilage damage, and anticipated resolution post-implant removal with rehabilitation. The Court accepted that mild post-concussion syndrome and PTSD occurred but had resolved by early 2020, awarding $3,000 for each head. Pre-trial loss of earnings ($14,021.51) was awarded on a reconstructed income basis despite absence of a signed employment contract, given the plaintiff's consistent employment history in ad hoc work. Loss of earning capacity ($5,000) was modest given the plaintiff's age (past statutory retirement) and physically demanding vocation.","reasoning":"The Court preferred Dr Lim's evidence over Dr Chang's, crediting objective post-operative radiological findings (preserved joint space, no joint line tenderness) over generic projections from pre-surgery CT scans. The absence of joint line tenderness on examination by both Dr Lim and TTSH doctors displaced the articular damage theory. On head injury, the Court accepted delayed symptom onset months after discharge—consistent with expert evidence—but found no permanence where the neurologist gave an open discharge after initial review and symptoms had resolved per the plaintiff's original AEIC. The Court declined to rely on the neurologist's permanence finding, which was substantially based on the plaintiff's subjective account of two-year unemployability not corroborated by objective evidence. For loss of earning capacity in plaintiffs past retirement age engaged in physical labour, awards remain modest absent clear evidence of extended working life. On special damages, the Court adopted the flexible approach in *Yap Boon Fong Yvonne v Wong Kok Mun Alvin* [2019] 1 SLR 230, reconstructing pre-accident income from CPF records and employment patterns where formal contracts were absent.","watch":"The decision illustrates willingness to reconstruct income on the balance of probabilities from informal work history, but practitioners should note the modest loss of earning capacity awards for elderly plaintiffs in manual trades—even where ongoing employability is demonstrated—particularly where disabilities are expected to improve post-treatment."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe judgment applies established Court of Appeal authority without meaningful development. *Lua Bee Kiang v Yeo Chee Siong* [2018] SGCA 74 is applied for the uncontroversial proposition that overlapping injuries should not result in double recovery, a routine citation in personal injury appeals. The same case (reported at [2019] 1 SLR 145) is invoked for the standard test on loss of earning capacity claims for unemployed plaintiffs—whether the plaintiff has been disabled from competing in the market for their pre-accident employment—again, a straightforward application. *Yap Boon Fong Yvonne v Wong Kok Mun Alvin* [2019] 1 SLR 230 is cited for the equally orthodox principle that loss of earnings must be proved on a balance of probabilities having regard to all the circumstances, without any novel gloss.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment does not develop the law. It applies well-settled principles governing damages assessment in personal injury cases—avoiding double recovery for overlapping injuries, the approach to loss of earning capacity for the unemployed, proof of loss of earnings, and estimation of expenses where receipts are unavailable—to the facts before the court. No prior authority is distinguished, qualified, or extended.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
