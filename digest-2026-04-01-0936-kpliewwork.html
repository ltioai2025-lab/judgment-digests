<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgment Digest — 1 April 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.case-card:hover { border-color: var(--faint); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.case-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(107,28,35,0.06); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}

.expand-btn {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);
  transition: all 0.15s;
  margin-top: 2px;
  cursor: pointer;
}
.expand-btn:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }
.case-card.expanded .expand-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.expand-btn span { display: inline-block; transition: transform 0.15s; }
.case-card.expanded .expand-btn span { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--rule);
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--accent-border);
}

.case-detail {
  border-top: 1px solid var(--rule);
  padding: 28px 24px 28px 70px;
  background: var(--surface-warm);
  display: none;
}
.case-card.expanded .case-detail { display: block; }

@media (max-width: 768px) {
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-detail { padding-left: 16px; }
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: inline-block;
}

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 0;
  margin-top: 10px;
}

.auth-entry { padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.auth-entry:last-child { border-bottom: none; }
.auth-entry:nth-child(even) { background: var(--surface); }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 10px; border-radius: 2px; white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }

mark.search-highlight { background: var(--accent-light); color: var(--accent); padding: 1px 2px; border-radius: 2px; border-bottom: 2px solid var(--accent-border); }
</style>
</head>
<body>
<div class="page-wrapper">
<header>
<div class="header-label">Judgment digest</div>
<div class="header-title" id="digest-title"></div>
<div class="header-meta" id="digest-meta"></div>
<div class="stats-row" id="stats-row"></div>
</header>
<input class="search-bar" type="text" placeholder="Search cases, topics, or cited authorities..." id="search-input" />
<div class="filters" id="filters"></div>
<div id="case-list"></div>
<footer>Generated based on your registered topic preferences.<br><em>This does not constitute legal advice.</em></footer>
</div>
<script>
const DIGEST_DATA = {"user_name":"Tester 1","digest_date":"1 April 2026","cases":[{"title":"STEVEN KURNIAWAN PRAYITNO v OH CHIN ANN & 2 Ors","citation":"[2026] SGHC 70","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_70","matched_topics":["contract"],"law_shifted":true,"summary":{"bottom_line":"A bailee who sells the bailor's goods without permission commits a breach of bailment even where the bailor has failed to reimburse storage costs, unless there is a clear contractual right to sell. Silence or acquiescence in the face of threats to auction goods is insufficient to vary the bailment terms to permit sale. Being named as consignee on a bill of lading does not, without more, create a bailee relationship if the named party never voluntarily assumed possession.","facts_posture":"The plaintiff, an Indonesian businessman, engaged the first and second defendants to import 14 antique cars from the UK via Singapore for onward export to Indonesia. Delays in obtaining Indonesian permits led to mounting storage costs in Singapore. The defendants sold all 14 cars between August 2018 and November 2019, claiming a right to do so for non-payment of storage fees. The plaintiff sued all three defendants (the third having been mistakenly named consignee for two cars) for breach of bailment duties and contract. The trial was bifurcated; this judgment addresses liability only.","decided":"The first and second defendants breached their duties as bailees and the second defendant breached contract by selling 13 of the plaintiff's cars (excluding one Mercedes which the plaintiff had waived his claim over by accepting a prior settlement that accounted for its sale). The parties' oral agreement in 2016 did not give the defendants the right to sell the cars to recover storage fees, nor was such a right subsequently agreed by conduct or variation. A later oral agreement in July 2019 for the return of the remaining cars in exchange for payment of outstanding fees created concurrent obligations; the defendants' refusal to perform entitled the plaintiff to suspend payment. The third defendant was not liable as he never voluntarily assumed possession of the goods despite being named consignee.","reasoning":"The Court held that a bailee's common law duties can only be excluded by express stipulation clearly brought home to and accepted by the bailor. The defendants' reliance on the plaintiff's silence in response to threats of auction fell far short of this standard. The 2016 oral agreement, construed against prior dealings, required the plaintiff to reimburse storage costs only after the cars reached Indonesia; any goodwill payments made earlier did not convert this into an obligation to pay regularly during storage. The Court found the first defendant's evidence on a purported right to sell inherently incredible, particularly his denial (contradicted by contemporaneous WhatsApp messages and his own pleadings) of a July 2019 meeting at which a settlement was discussed. On the evidence, that July 2019 agreement created concurrent obligations: the defendants were to transfer the cars in exchange for payment of the settlement sum. The defendants' subsequent sale of the remaining cars was a repudiatory breach. As to the third defendant, bailment requires voluntary assumption of possession. Being mistakenly named as consignee, without knowledge or participation, was insufficient. The first defendant's fabrication of an authorisation letter using the third defendant's stamp to collect the cars confirmed the third defendant never came into possession.","watch":"The Court's extended obiter remarks on the first defendant treating the second defendant as his \"personal piggy bank\" and siphoning sale proceeds suggest the corporate veil might well have been pierced had the plaintiff needed to rely on that argument. The Court did not need to reach it given the first defendant's admission of joint bailee status, but the observations may embolden future applications where a controlling mind diverts company assets."},"judicial_treatment":"## JUDICIAL TREATMENT\n\n### AUTHORITIES THAT MATTER\n\nThe Court applied the Court of Appeal's decision in *Ma Hongjin v SCP Holdings Pte Ltd* [2021] 1 SLR 304 as the governing framework for contractual variation, affirming that fresh consideration is required unless the parties had agreed to dispense with that requirement at contract formation. *RDC Concrete Pte Ltd v Sato Kogyo (S) Pte Ltd* [2007] 4 SLR(R) 413 was applied for the established test of repudiatory breach—conduct that deprives the other party of substantially the whole benefit of the contract. On bailment, the Court relied on *Alwie Handoyo v Tjong Very Sumito* [2013] 4 SLR 308 and the recent *The \"Jeil Crystal\"* [2024] 4 SLR 1691, applying the principle that bailment requires a voluntary assumption of possession of another's goods, with the Court emphasising that knowing and willing possession is essential. The citation of *Felthouse v Bindley* (1862) 11 CB (NS) 869 for the uncontroversial proposition that unilateral variation is ineffective without acceptance is routine and unexceptional.\n\n### DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to the facts without developing the law in any meaningful respect. The treatment of *Ma Hongjin* on variation, *RDC Concrete* on repudiation, and *Alwie Handoyo* alongside *The \"Jeil Crystal\"* on bailment represents straightforward application of established doctrine rather than any extension, qualification, or departure from existing authority.","cited_cases":[]},{"title":"PUA WEN JIN (PAN WENJIN) v LAM KING KEOW","citation":"[2026] SGDC 105","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_105","matched_topics":["tort"],"law_shifted":false,"summary":{"bottom_line":"A claimant alleging an inter vivos gift of chattels bears the burden of proving donative intent on the balance of probabilities. Casual familial references to property as \"yours\" in WhatsApp messages, without more, will not suffice where the donor's wider practice suggests a different arrangement — here, a bailment at will within a family watch collection.","facts_posture":"The claimant was formerly married to the defendant's daughter. During the marriage (2013–2022), the defendant, an avid watch collector with approximately 200 pieces, passed four luxury watches to the claimant via his daughter. After the marriage broke down, the defendant's daughter returned the watches to the defendant. The claimant sued in detinue, seeking delivery up or damages. He claimed the watches were gifts; the defendant maintained he had merely lent them for wearing, consistent with his practice of rotating watches among family members without transferring ownership.","decided":"Claim dismissed. The Court held the claimant failed to prove the defendant intended to relinquish ownership of the watches at the time of transfer. While delivery and certainty of subject matter were undisputed, donative intent was not established. The claimant therefore had no right to immediate possession — a prerequisite to detinue. On the evidence, the arrangement was a bailment at will, terminable by the defendant at any time, with legal title remaining in him throughout.","reasoning":"The Court applied the three-part test for inter vivos gifts from *Teo Song Kheng v Teo Poh Hoon* [2020] SGHC 47: donative intent, certainty of subject matter, and delivery. Intent, being subjective, must be inferred from objective circumstances unless admitted. The claimant's evidence was equivocal: WhatsApp messages referring to the","watch":"collection.\n\n## FACTS & POSTURE\n\nThe claimant was formerly married to the defendant's daughter. During the marriage (2013–2022), the defendant, an avid watch collector with approximately 200 pieces, passed four luxury watches to the claimant via his daughter. After the marriage broke down, the defendant's daughter returned the watches to the defendant. The claimant sued in detinue, seeking delivery up or damages. He claimed the watches were gifts; the defendant maintained he had merely lent them for wearing, consistent with his practice of rotating watches among family members without transferring ownership.\n\n## WHAT THE COURT DECIDED\n\nClaim dismissed. The Court held the claimant failed to prove the defendant intended to relinquish ownership of the watches at the time of transfer. While delivery and certainty of subject matter were undisputed, donative intent was not established. The claimant therefore had no right to immediate possession — a prerequisite to detinue. On the evidence, the arrangement was a bailment at will, terminable by the defendant at any time, with legal title remaining in him throughout.\n\n## HOW IT REASONED\n\nThe Court applied the three-part test for inter vivos gifts from *Teo Song Kheng v Teo Poh Hoon* [2020] SGHC 47: donative intent, certainty of subject matter, and delivery. Intent, being subjective, must be inferred from objective circumstances unless admitted. The claimant's evidence was equivocal: WhatsApp messages referring to the watches as \"yours\" were quotidian exchanges between spouses, equally consistent with possession for use rather than ownership. The defendant's use of \"safekeeping\" when the watches were returned spoke only to his state of mind in 2022, not at the time of transfer. Conversely, two aspects of the defendant's evidence carried weight. First, the defendant and his daughter gave consistent evidence that watches were routinely rotated within the family for wearing, but never gifted — the daughter herself had returned a Rolex Submariner \"Coke\" to her father after the separation, describing a \"family culture\" that \"nobody owns the watches.\" Second, the defendant had acknowledged gifting a Panerai as a wedding gift; if intent were to deny the claimant property, he could have claimed all five watches, yet he did not. This selective admission evidenced a genuine distinction in the defendant's mind between gifts and loans. The Court rejected the defendant's pleaded portrayal of the claimant as opportunistic (the evidence showed the claimant was indifferent to luxury watches), but the burden remained on the claimant throughout.\n\n## WATCH\n\nThe judgment does not disturb any prior authority but underscores the forensic difficulty of proving donative intent within family arrangements absent clear contemporaneous documentation. Practitioners should note the Court's willingness to draw adverse inferences from a party's failure to treat similar items consistently (here, the Panerai concession)."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Teo Song Kheng v Teo Poh Hoon* [2020] SGHC 47 for the established three-part test governing inter vivos gifts of chattels: intention to relinquish ownership, certainty of subject matter, and delivery. *Tan Yok Koon v Tan Choo Suan* [2017] 1 SLR 654 was applied for the uncontroversial proposition that subjective intention may be inferred from objective surrounding circumstances. Both citations are routine applications of settled principles to the facts.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop the law. It applies well-established principles governing inter vivos gifts to the factual matrix before the Court without elaboration or qualification.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
