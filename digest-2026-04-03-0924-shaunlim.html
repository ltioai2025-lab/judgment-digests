<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgment Digest — 3 April 2026</title>
<style>
:root {
  --accent: #6b1c23;
  --accent-hover: #8a2630;
  --accent-light: #f9f0f1;
  --accent-border: #e8c8cb;
  --black: #111111;
  --dark: #2a2a2a;
  --mid: #555555;
  --light: #888888;
  --muted: #aaaaaa;
  --faint: #cccccc;
  --rule: #e2e2e2;
  --surface: #f7f7f7;
  --surface-warm: #fafafa;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--surface);
  color: var(--black);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page-wrapper {
  width: 100%;
  padding: 32px 48px 80px;
}

@media (max-width: 1024px) {
  .page-wrapper { padding: 28px 32px 60px; }
}

@media (max-width: 768px) {
  .page-wrapper { padding: 20px 16px 48px; }
  .header-title { font-size: 22px; }
  .stats-row { gap: 16px; }
  .case-name { font-size: 16px; }
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-header { padding: 14px 16px; }
  .case-detail { padding: 18px 16px; }
  header { padding: 20px 18px; }
  .expand-btn { width: 28px; height: 28px; font-size: 11px; }
}

@media (max-width: 480px) {
  .page-wrapper { padding: 12px 10px 40px; }
  .header-title { font-size: 19px; }
  .stats-row { flex-wrap: wrap; gap: 12px; }
  .stat { min-width: 70px; }
  .filters { gap: 4px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
}

header {
  background: var(--white);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--accent);
  border-radius: 6px;
  padding: 28px 36px;
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--black);
  line-height: 1.25;
}

.header-meta {
  font-size: 13px;
  color: var(--light);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 32px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}

.stat-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--black);
  display: block;
  line-height: 1;
  margin-bottom: 3px;
}

.stat-label {
  font-size: 10px;
  color: var(--light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.search-bar {
  width: 100%;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--white);
  margin-bottom: 14px;
  outline: none;
  color: var(--black);
  transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--faint); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.filter-btn {
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent-border); background: var(--accent-light); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
.filter-count { font-size: 10px; opacity: 0.5; margin-left: 3px; }

.case-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.case-card:hover { border-color: var(--faint); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.case-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(107,28,35,0.06); }

.case-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}

.expand-btn {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--mid);
  transition: all 0.15s;
  margin-top: 2px;
  cursor: pointer;
}
.expand-btn:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }
.case-card.expanded .expand-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.expand-btn span { display: inline-block; transition: transform 0.15s; }
.case-card.expanded .expand-btn span { transform: rotate(90deg); }

.case-info { flex: 1; min-width: 0; }

.case-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}

.case-cite-line { font-size: 12px; color: var(--light); }

.case-bottom-line {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  padding: 0 24px 14px 70px;
}

.case-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 24px 18px 70px;
}

.tag-topic {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--surface);
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--rule);
}

.tag-shift {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--accent-border);
}

.case-detail {
  border-top: 1px solid var(--rule);
  padding: 28px 24px 28px 70px;
  background: var(--surface-warm);
  display: none;
}
.case-card.expanded .case-detail { display: block; }

@media (max-width: 768px) {
  .case-bottom-line, .case-tags { padding-left: 16px; }
  .case-detail { padding-left: 16px; }
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
  display: inline-block;
}

.section-text { font-size: 14px; color: var(--dark); line-height: 1.8; }

.auth-box {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 0;
  margin-top: 10px;
}

.auth-entry { padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.auth-entry:last-child { border-bottom: none; }
.auth-entry:nth-child(even) { background: var(--surface); }

.auth-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

.auth-name { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--dark); }

.auth-treatment {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 10px; border-radius: 2px; white-space: nowrap;
}

.treat-applied { color: #1a5276; background: #eaf2f8; border: 1px solid #c5dbe8; }
.treat-followed { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }
.treat-distinguished { color: #7d5a2f; background: #fdf6ed; border: 1px solid #e8d8bf; }
.treat-overruled, .treat-not-followed { color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); }
.treat-considered { color: var(--mid); background: var(--surface); border: 1px solid var(--rule); }
.treat-cited { color: var(--light); background: var(--surface); border: 1px solid var(--rule); }
.treat-approved { color: #1a5c38; background: #eaf5ed; border: 1px solid #bce0c7; }

.auth-prop { font-size: 12px; color: var(--light); line-height: 1.55; margin-top: 4px; }

.case-link {
  display: block; padding: 14px 24px; font-size: 12px; font-weight: 600;
  color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  border-top: 1px solid var(--rule); background: var(--white); transition: background 0.1s;
}
.case-link:hover { background: var(--accent-light); }

footer { text-align: center; padding: 28px 0; font-size: 12px; color: var(--light); margin-top: 28px; line-height: 1.7; }

.hidden { display: none !important; }

mark.search-highlight { background: var(--accent-light); color: var(--accent); padding: 1px 2px; border-radius: 2px; border-bottom: 2px solid var(--accent-border); }
</style>
</head>
<body>
<div class="page-wrapper">
<header>
<div class="header-label">Judgment digest</div>
<div class="header-title" id="digest-title"></div>
<div class="header-meta" id="digest-meta"></div>
<div class="stats-row" id="stats-row"></div>
</header>
<input class="search-bar" type="text" placeholder="Search cases, topics, or cited authorities..." id="search-input" />
<div class="filters" id="filters"></div>
<div id="case-list"></div>
<footer>Generated based on your registered topic preferences.<br><em>This does not constitute legal advice.</em></footer>
</div>
<script>
const DIGEST_DATA = {"user_name":"Shaun Lim","digest_date":"3 April 2026","cases":[{"title":"VICTOR FOO SEANG KWANG v PUBLIC PROSECUTOR","citation":"[2026] SGHC 72","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_72","matched_topics":["criminal procedure and sentencing"],"law_shifted":true,"summary":{"bottom_line":"The General Division will not exercise revisionary jurisdiction to overturn a District Court's refusal to allow an accused on bail to leave Singapore unless there is an error that occasions serious injustice. An accused's track record of returning while on bail and continuing business ties reduce flight risk, but the court will not revisit that assessment on revision when the reasons for travel are weak. Fresh","facts_posture":"The applicant, a director of a company charged under the Payment Services Act 2019, was on court bail with his passport impounded. His wife and children had moved to Malaysia, he had sold his Singapore property, and his sons renounced their PR status. After being allowed multiple overseas trips earlier, police stopped granting permission. The District Court refused his application to travel to Malaysia to visit family and assist Malaysian authorities with investigations. He sought revision in the General Division.","decided":"The Court dismissed the criminal motion. The District Judge's refusal to grant leave to travel was not an error warranting revisionary intervention. While the DJ may have overstated flight risk by not weighing the applicant's consistent returns to Singapore and his company's local operations, the applicant's reasons for travel (family visits, Chinese New Year, assisting Malaysian authorities) were insufficiently compelling to tip the balance in his favour. Fresh facts not before the DJ — including need to care for his mother and new correspondence from Malaysian authorities — could not ground a revision application but must be raised in a fresh variation application to the District Court.","reasoning":"The Court confirmed that revisionary powers under *Xu Yuanchen v Public Prosecutor* [2021] 4 SLR 719 require both error and serious injustice. When deciding whether to vary bail conditions to permit overseas travel, the balancing exercise differs from the initial bail grant: the prejudice to the accused (curtailed freedom of movement, not deprivation of liberty) carries less weight, while flight risk is heightened once the accused is beyond Singapore's shores. Accordingly, more compelling reasons are needed to justify travel when other indicators suggest weakened ties to Singapore. \n\nThough the DJ failed to credit the applicant's consistent return history and continuing business operations in assessing flight risk, this did not render the decision erroneous given the applicant's weak travel justifications. The family had jointly decided to relocate knowing investigations were ongoing, and his wife and children could visit Singapore. Following *Sollihin bin Anhar* [2015] 3 SLR 447, new facts arising post-decision do not show the original decision was wrong; they must be raised under s 102(1) CPC before the court that granted bail."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework from *Xu Yuanchen v Public Prosecutor* [2021] 4 SLR 719 governing the exercise of revisionary powers, treating it as the controlling authority without modification or qualification. *Public Prosecutor v Sollihin bin Anhar* [2015] 3 SLR 447 was applied to structure the balancing exercise between the community's interest in upholding criminal justice efficacy and the accused's liberty interest when not yet convicted. The remaining citations—*Public Prosecutor v Yang Yin* and *Knight Glenn Jeyasingam v Public Prosecutor*—reiterate the uncontroversial proposition that revisionary jurisdiction should be exercised sparingly and do not reflect any substantive engagement with those authorities.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies settled principles to the facts without developing the law. The Court treated *Xu Yuanchen* as providing the complete legal framework for revisionary jurisdiction and *Sollihin bin Anhar* as the governing approach to balancing competing interests, neither narrowing nor extending those authorities. The analysis remains firmly within orthodox boundaries established by recent appellate authority.","cited_cases":[]},{"title":"CAIRNHILL LAW LLC v ROYAL'S ENGINEERING & TRADING (S) PTE. LTD.","citation":"[2026] SGDC 113","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_113","matched_topics":["contempt of court"],"law_shifted":true,"summary":{"bottom_line":"Committal for non-attendance at an examination of enforcement respondent (EER) hearing will not succeed where the respondent attended the first hearing, instructed solicitors to attend the adjourned hearing, had a medical appointment coinciding with that hearing, and filed applications to stay and set aside the underlying judgment. The mens rea for contempt under s 4(1) of the Administration of Justice (Protection) Act 2016 was not made out on these","facts_posture":"The claimant law firm obtained default judgment against the defendant company for unpaid fees and extracted an EER order against the company's director, Naga. Naga attended the first EER hearing on 10 October 2025 but did not attend the adjourned hearing on 29 October 2025, nor did he furnish the completed EER questionnaire. The claimant applied for committal on the basis of this non-attendance.\n\n---","decided":"The Court dismissed the committal application. It held that contempt under s 4(1) AJPA requires proof beyond reasonable doubt that the breach was intentional — the requisite mens rea was not established. The director's conduct did not meet the threshold: he had attended the first EER, instructed solicitors to attend the adjourned hearing, had a medical appointment at the material time, and had filed applications to stay execution and set aside the default judgment. His belief that the EER would be adjourned pending those applications was honest and reasonable under s 21 AJPA.\n\n---","reasoning":"The Court applied *Mok Kah Hong v Zheng Zhuan Yao* [2016] 3 SLR 1 and *PT Sandipala Arthaputra v STMicroelectronics Asia Pacific Pte Ltd* [2018] 4 SLR 828, emphasising that contempt requires intentional disobedience — the contemnor must know the facts making his conduct a breach, even if he need not appreciate it constitutes contempt. The Court found Naga had taken reasonable steps: attending the first hearing, engaging solicitors, filing interlocutory applications. His absence was not deliberate non-compliance but arose from a medical appointment and a reasonable belief the hearing would be adjourned. Section 21 AJPA excused his failure because it was substantially attributable to an honest misunderstanding of his obligations. The Court noted the claimant could have sought a short adjournment for the questionnaire but instead suspended the EER to pursue committal — a move inconsistent with the remedial purpose of EER, which is to ascertain assets, not coerce payment. Relying on *Tay Kar Oon v Tahir* [2017] 2 SLR 342, the Court observed that even if contempt were made out, Naga had substantially purged it by the defendant's subsequent full payment of the judgment.\n\n---","watch":"The Court's strong obiter remarks about committal as a \"last resort\" signal growing judicial concern over the proliferation of committal applications in the State Courts. It stated explicitly that committal should not be pursued at the first instance of enforcement and warned against using contempt proceedings to exert pressure on judgment debtors where procedural remedies (particularly in money judgments) remain available. Expect closer scrutiny of whether applicants have genuinely exhausted less draconian enforcement mechanisms before resorting to committal."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the two-step approach from *PT Sandipala Arthaputra v STMicroelectronics Asia Pacific Pte Ltd* [2018] 4 SLR 828 for determining whether contempt has been committed, treating it as the governing analytical framework. The Court of Appeal's decision in *Mok Kah Hong v Zheng Zhuan Yao* [2016] 3 SLR 1 was applied for the requisite mens rea, confirming that intentional breach suffices even absent specific intent to disobey the court. On sentencing, *Tay Kar Oon v Tahir* [2017] 2 SLR 342 provided the relevant factors, though the judgment does not appear to have engaged with those factors in any novel way.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment applies settled principles without material development. The analytical framework for contempt proceedings and the mens rea requirement are well-established, and the Court's application follows orthodox lines from binding Court of Appeal authority in *Mok Kah Hong*. The treatment of sentencing factors from *Tay Kar Oon* is similarly straightforward, involving no apparent clarification or extension of the existing approach.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');

  // Clear previous highlights
  document.querySelectorAll('mark.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });

  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      return;
    }
    const matches = card.dataset.searchable.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches && q.length >= 2) {
      // Highlight matching text in visible fields
      const targets = card.querySelectorAll('.case-name, .case-cite-line, .case-bottom-line, .tag-topic, .tag-shift, .auth-name');
      targets.forEach(el => {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
          const idx = node.textContent.toLowerCase().indexOf(q);
          if (idx === -1) return;
          const before = node.textContent.substring(0, idx);
          const match = node.textContent.substring(idx, idx + q.length);
          const after = node.textContent.substring(idx + q.length);
          const frag = document.createDocumentFragment();
          if (before) frag.appendChild(document.createTextNode(before));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          frag.appendChild(mark);
          if (after) frag.appendChild(document.createTextNode(after));
          node.parentNode.replaceChild(frag, node);
        });
      });
    }
  });
});
</script>
</body>
</html>
