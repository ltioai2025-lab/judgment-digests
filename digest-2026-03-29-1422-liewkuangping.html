<script>
const DIGEST_DATA = {"user_name":"Tester 3","digest_date":"29 March 2026","cases":[{"title":"CHUA JUN YANG v KANG MAY TENG, MARIA OLIVIA","citation":"[2026] SGHC 63","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_63","matched_topics":["tort"],"law_shifted":false,"summary":{"bottom_line":"Uncorroborated testimony of sexual assault in civil proceedings is insufficient where the complainant's contemporaneous conduct and communications are fundamentally inconsistent with the allegation and remain unexplained despite the court accepting that there is no typical victim response.","facts_posture":"The respondent claimed the appellant sexually assaulted her (digital penetration) at her apartment in July 2016 after a night out. They had previously been in a casual sexual relationship. She made a police report in March 2021; the police took no action. She then sued in tort. The District Judge found for the respondent and awarded $25,000 general damages, $20,000 punitive damages, and special damages. The appellant appealed.","decided":"The High Court allowed the appeal and dismissed the claim. The respondent failed to prove the sexual assault on a balance of probabilities. The Court held that the respondent's allegation was not corroborated by the appellant's text messages sent hours after the alleged assault. Further, the respondent's own WhatsApp messages on the day of the alleged assault and her subsequent conduct toward the appellant over six months — including seeking his company, attempting to restart their relationship, and expressing fear of meaning nothing to him — were unexplained and fundamentally inconsistent with the alleged assault.","reasoning":"The Court first clarified that the \"unusually convincing\" standard from criminal sexual assault cases (*AOF v Public Prosecutor*, *GCK*) applies in civil cases as a heuristic tool requiring rigorous assessment of uncorroborated evidence, though the civil standard of proof remains balance of probabilities. The District Judge had found corroboration in the appellant's message \"I apologize that I got out of control AGAIN,\" interpreting this as reference to the assault itself. The High Court rejected this, holding the message referred unambiguously to loss of emotional control during an argument, not physical control, as evidenced by an earlier incident on 1 July 2016 where the appellant similarly \"lashed out\" verbally. The respondent's own message hours later — \"we could have enjoyed each other last night and had fun and I wanted to\" — was irreconcilable with the alleged assault. Her explanation that she was de-escalating tension was rejected as inconsistent with the apologetic tone already evident in the exchange. The Court emphasised that while there is no typical victim response, the respondent's active conduct over months — frequent contact, romantic overtures, sadness at his distance, attempt to restart the relationship after learning he was dating someone else — went far beyond passivity or delayed reporting and required cogent explanation. Her claim of not understanding the gravity, self-blame, and workplace proximity was rejected as hollow given the frequency, tone, and content of her messages and her admitted \"sporadic romantic advances.\" The Court distinguished between passive delay (which may not undermine credibility) and active conduct inconsistent with the allegation (which does unless explained). The respondent's evidence contained a material internal inconsistency: her affidavit stated the appellant removed his clothes and climbed into bed \"in a matter of seconds\" before she could react, whereas her contemporaneous letters stated she warned him not to let dirty clothes touch the bed as he approached, suggesting she anticipated or saw him getting onto the bed.","watch":"The reasoning on when active post-incident conduct by a complainant undermines credibility, notwithstanding absence of a typical victim response, will likely be tested in future sexual assault claims. The Court's application of the \"unusually convincing\" standard to civil cases may require further clarification by the Court of Appeal."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court's treatment of authority centres on the proper application of the \"unusually convincing\" standard for uncorroborated evidence. *Public Prosecutor v GCK* [2020] 1 SLR 486 was applied as the governing authority, the Court emphasising that the standard is a heuristic tool for rigorous assessment rather than a distinct burden of proof—a characterisation it reinforced by citing the recent High Court decision in *GII v Public Prosecutor* [2025] SGHC 38, which describes the standard as a qualitative description of testimony calibre. The Court engaged substantively with *AOF v Public Prosecutor* [2012] 3 SLR 34 to confirm that the \"unusually convincing\" standard applies to all offences where uncorroborated evidence forms the sole basis for conviction, not merely sexual offences. *Alwie Handoyo v Tjong Very Sumito* [2013] 4 SLR 308 was applied to reject any suggestion that the \"unusually convincing\" formulation creates a third burden of proof between the civil and criminal standards.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment applies settled principles without developing the law. The Court's reliance on *GCK* and *GII* confirms the now-established understanding that \"unusually convincing\" is a descriptive quality of evidence rather than a heightened standard of proof, and its citation of *AOF* reflects the uncontroversial extension of that standard beyond sexual offences to all cases resting on uncorroborated sole testimony. The analysis is orthodox and introduces no new qualifications or extensions.","cited_cases":[{"case_name":"ATS v ATT","citation":"[2016] SGHC 196","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"The approach to be taken in variation applications under s 72 and/or s 118 of the Women's Charter"},{"case_name":"BZD v BZE","citation":"[2020] SGCA 1","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"The inquiry in variation applications is whether the change is sufficiently material such that it is no longer fair to expect the status quo to remain"},{"case_name":"Tan Sue-Ann Melissa v Lim Siang Bok Dennis","citation":"[2004] 3 SLR(R) 376","court":"High Court","jurisdiction":"Singapore","treatment":"cited","proposition":"Factors to be considered in determining if a change in circumstances warrants variation of maintenance order"},{"case_name":"Foo Ah Yan v Chiam Heng Chow","citation":"[2012] 2 SLR 506","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"A husband is prima facie obliged to maintain his former wife beyond his retirement and up to the former wife's remarriage or the death of either party"},{"case_name":"Yow Mee Lan v Chen Kai Buan","citation":"[2000] 2 SLR(R) 659","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"A husband's obligation to maintain the wife would prima facie continue beyond his retirement and up to her remarriage or the death of either party"},{"case_name":"VOX v VOY","citation":"[2021] SGFC 11","court":"Family Court","jurisdiction":"Singapore","treatment":"distinguished","proposition":"Ex-husband's retirement and consequential loss in income and income earning capacity amounted to a material change in circumstances justifying variation of maintenance order"},{"case_name":"VJD v VJE","citation":"[2020] SGFC 88","court":"Family Court","jurisdiction":"Singapore","treatment":"distinguished","proposition":"Rescission of husband's spousal maintenance obligations based on depleting financial assets, lack of income, advanced years and ill-health precluding employment"},{"case_name":"Wong Lai Kum v Lim Khee Tee","citation":"[2012] SGHC 151","court":"High Court","jurisdiction":"Singapore","treatment":"considered","proposition":"Material adverse change in husband's financial circumstances due to loss of employment may justify variation of maintenance obligations"},{"case_name":"DIL v DIM","citation":"[2024] SGHC 139","court":"High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"Detailed analysis of husband's ability to pay maintenance having regard to his assets and obligations to his new family is required when considering variation due to retirement"},{"case_name":"Wan Lai Cheng v Quek Seow Kee and another appeal and another matter","citation":"[2012] 4 SLR 405","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"applied","proposition":"Formula for calculating appropriate multiplier for lump sum maintenance award"},{"case_name":"Ong Chen Leng v Tan Sau Poo","citation":"[1993] 2 SLR(R) 545","court":"High Court","jurisdiction":"Singapore","treatment":"cited","proposition":"Formula for calculating appropriate multiplier for lump sum maintenance award"},{"case_name":"WZF v WZG","citation":"[2025] SGHCF 1","court":"Family Division of the High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"When an adverse inference may be drawn against a person for concealment of evidence"},{"case_name":"BPC v BPB and another appeal","citation":"[2019] 1 SLR 608","court":"Court of Appeal","jurisdiction":"Singapore","treatment":"cited","proposition":"When an adverse inference may be drawn against a person for concealment of evidence"},{"case_name":"Tan Teck Koon v Tong Guat Hwa","citation":"[2016] SGHCF 2","court":"Family Division of the High Court","jurisdiction":"Singapore","treatment":"applied","proposition":"Person must have withheld production of evidence without good reasons for an adverse inference to be drawn"},{"case_name":"Leong Yim Ling v Moey Park Moon","citation":"[2019] SGHC 26","court":"High Court","jurisdiction":"Singapore","treatment":"considered","proposition":"Previous decision dismissing husband's applications to vary maintenance obligations"}]},{"title":"Argoglobal Underwriting Asia Pacific Pte. Ltd. & 4 Ors  v Overseas-Chinese Banking Corporation Limited","citation":"[2026] SGCA 14","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGCA_14","matched_topics":["evidence","insurance"],"law_shifted":true,"summary":{"bottom_line":"Insureds claiming under marine insurance policies on the basis that a vessel was lost by \"perils of the seas\" must prove fortuity either by propounding a cause for seawater ingress, or by satisfying the twin conditions for invoking the rebuttable presumption: seaworthiness and loss in wholly unexplained circumstances. The presumption does not apply where the casualty can be investigated but the shipowner elects not to do so, even if no positive cause is ultimately advanced.","facts_posture":"A jackup rig capsized during its maiden voyage under tow from Vietnam to Taiwan. The vessel, insured under a marine insurance policy incorporating ITC terms, remained afloat in capsized state for 76 days before being scuttled. The mortgagee, OCBC, claimed the vessel was a constructive total loss caused by perils of the seas. The insurers denied liability, alleging unseaworthiness and lack of proof of constructive total loss. The High Court found for OCBC. The insurers appealed.","decided":"The Court of Appeal allowed the appeal. OCBC failed to prove that the capsize was caused by perils of the seas. Although the vessel was seaworthy at departure, the loss did not occur in wholly unexplained circumstances—the vessel capsized but remained accessible for inspection for weeks, yet no investigation into the cause of seawater ingress was undertaken. OCBC's expert could not identify the cause of ingress. Without propounding a cause, OCBC could neither prove fortuity directly nor invoke the presumption. Separately, OCBC failed to prove constructive total loss. Documents relied upon to prove repair costs exceeding insured value were inadmissible hearsay (not business records made in the ordinary course) and, in any event, did not establish the cost threshold.","reasoning":"The Court clarified the framework for proving loss by perils of the seas. Direct proof requires propounding a cause for seawater ingress proven on the balance of probabilities; the presumption applies only where the vessel is seaworthy and lost in wholly unexplained circumstances, meaning the insured cannot investigate or determine the cause due to a deficit of direct evidence. The Court rejected OCBC's formulation that any seawater ingress into a seaworthy vessel raises a presumption. Following *The Popi M* and *The Marel*, the Court held that where direct evidence is available or the vessel remains accessible for investigation, the presumption cannot be invoked. Elimination of improbable causes does not suffice if the propounded cause is itself improbable or absent. Here, the vessel's accessibility, crew survival, and available survey evidence meant the loss was not wholly unexplained. On constructive total loss, the Court held that cost estimates and correspondence obtained to support the claim were not business records under s 32(1)(b)(iv) EA—they were prepared for litigation, not in the ordinary course of trade. The judge erred in admitting them and in curing OCBC's failure to give notice under s 32(4)(b) EA, which caused real prejudice.","watch":"The Court expressly doubted whether SCOPIC salvage costs should count towards \"cost of recovery and/or repair\" for constructive total loss purposes, citing *Connect Shipping* but not finally deciding the point. The judgment also clarifies that hearsay documents adduced only at closing submissions, without witness evidence, will rarely be admitted—a stricter approach than some prior practice may have permitted."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court engaged most substantively with the line of English authorities concerning proof of loss by perils of the seas where the precise cause remains unexplained. It applied *Glowrange Ltd v CGU Insurance plc* [2001] All ER (D) 339 (Jun) as the governing framework, accepting that inferential reasoning remains available even when the loss is not wholly unexplained, provided the insured proves seaworthiness and eliminates non-fortuitous causes on the balance of probabilities. The Court distinguished *Brownsville Holdings Ltd v Adamjee Insurance Co Ltd* [2000] 2 All ER (Comm) 803, which had suggested the traditional presumption operates only when loss is wholly unexplained, concluding that *Glowrange* correctly represents the law and that the presumption remains a subset of the broader inferential approach. It carefully analysed *Skandia Insurance Co Ltd v Skoljarev* (1979) 26 ALR 1, noting the High Court of Australia's willingness to infer an unidentified fortuitous event caused seawater ingress where seaworthiness was established, but acknowledged the doubts cast on this approach by the UK Supreme Court in *Global Process Systems Inc v Syarikat Takaful Malaysia Bhd* [2012] 1 All ER (Comm) 111. The Court applied the Singapore Court of Appeal's interpretation in *Chubb Insurance Singapore Ltd v Sizer Metals Pte Ltd* [2023] 1 SLR 1553 of the *Rhesa* principle, emphasising that courts must not accept improbable possibilities merely because they are less improbable than alternatives.\n\n## DEVELOPMENT OF THE LAW\n\nThe judgment clarifies Singapore's adoption of the *Glowrange* framework for proving marine losses and confirms that the older \"presumption\" of loss by perils of the seas where a vessel disappears without trace is simply a particular application of inferential reasoning rather than a distinct legal rule. This represents a refinement rather than a departure: the Court has expressly aligned Singapore law with modern English authority while acknowledging unresolved tensions in Commonwealth jurisprudence about how far inferential reasoning may extend when no specific fortuitous event can be identified.","cited_cases":[]},{"title":"YAI v YAJ","citation":"[2026] SGFC 38","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGFC_38","matched_topics":["family law"],"law_shifted":false,"summary":{"bottom_line":"A parent cannot unilaterally bypass a maintenance order's payment terms by making direct payments to the child instead of the care parent. Section 69(5)(c) of the Women's Charter permits maintenance for adult children in education even where they earn income during compulsory work attachments, provided maintenance remains \"necessary\" — a fact-sensitive inquiry that accounts for both the income received and attachment-related expenses incurred.","facts_posture":"The Father defaulted on maintenance payments totalling $700 monthly ($400 for the daughter, $300 for the older son) from October 2023 to March 2026 under a consent order requiring payment to the Mother as care parent. The daughter turned 21 in January 2024 while still pursuing her diploma, which included a three-month work attachment paying approximately $600 monthly. The Father claimed he was excused from paying because the daughter earned income and because he paid the son's expenses directly using an ATM card the sons could access. The Mother applied to enforce the arrears.","decided":"The Court ordered the Father to pay $14,480 in arrears: $9,980 for the daughter (after crediting $320 in verified payments) and $4,500 for the son (50% of the ordered amount). Maintenance remained payable for the daughter throughout her studies despite work attachment income, as the Father failed to prove the $600 monthly payment exceeded both her attachment-related expenses and maintenance needs. The Father could not satisfy his maintenance obligation by making direct payments to the older son using an ATM card when the order required payment to the Mother.","reasoning":"Section 69(5)(c) permits courts to order maintenance for adult children \"receiving instruction at an educational establishment... whether or not while in gainful employment.\" The Court held this phrase does not eliminate the central statutory requirement that maintenance be \"necessary\" — it merely prevents automatic disqualification where a student works part-time. Where an adult child earns income, necessity remains a factual question. Here, the Father bore the burden under ss 103–104 of the Evidence Act to prove the daughter's work attachment income rendered maintenance unnecessary. He failed: his claim of $2,200 monthly earnings rested on inadmissible hearsay, and he adduced no evidence that $600 monthly covered both her attachment expenses (meals, transport, work attire) and living costs. On mode of payment, the Court emphasised that maintenance orders prescribe how payment must be made, not merely that some support be provided. Allowing unilateral substitution creates the very uncertainty the order was designed to prevent. The Court credited some direct payments pragmatically but refused to endorse the approach or treat it as varying the order.","watch":"The Court explicitly stated that crediting the Father's direct payments was \"pragmatic recognition\" of what occurred, \"not an endorsement\" — signalling this will not be treated as precedent for departing from ordered payment modes. The costs award ($3,000) was framed as reinforcing compliance principles rather than punishment."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *XTG v XTH* [2025] SGFC 112 as the governing framework for maintenance enforcement proceedings, adopting its two-stage inquiry: whether the defaulting parent has provided good reasons for default and whether they should be excused from paying arrears. This represents a straightforward application of recent Family Court authority to materially identical facts.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not develop the law. It applies established principles from *XTG v XTH* to a maintenance enforcement dispute without qualification or extension.","cited_cases":[]},{"title":"HO REI, JETHRO & Anor  v CHU JIAT BOON TIMOTHY","citation":"[2026] SGDC 100","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGDC_100","matched_topics":["civil procedure"],"law_shifted":false,"summary":{"bottom_line":"When seeking approval under O 9 r 9(7) ROC to file an interlocutory application outside the single application pending trial (SAPT) regime, a party must identify the grounds upon which the intended application will be based — not merely the type of application. The requirement to state \"the essence of the intended application\" in O 9 r 9(8) means the substantive basis for the relief sought, though without detailed argument on merits.","facts_posture":"The claimants obtained default judgment after the defendant failed to enter an appearance. The defendant then sought approval under O 9 r 9(7) ROC to file an application to set aside the default judgment. The initial permission request identified the nature of the application (\"setting aside judgment\") and stated it was necessary \"to enable the Defendant to contest the action and allow the matter to be adjudged on the merits,\" but did not state whether the challenge was for irregularity or on the basis of a prima facie defence. The claimants objected that the request failed to satisfy the \"essence\" requirement in O 9 r 9(8).","decided":"The Court held that O 9 r 9(8) requires a requesting party to identify the grounds for the intended application, not just the application type. \"Essence\" means the intrinsic basis upon which relief is claimed. Merely identifying that one intends to file, say, a setting-aside application is insufficient.","reasoning":"The Court applied purposive interpretation under O 3 r 1(2) ROC. The word \"essence\" in O 9 r 9(8) means more than application type; its ordinary meaning requires identifying the intrinsic basis for relief. Without knowing the grounds, the court cannot assess necessity, the opposing party cannot respond meaningfully, and potentially frivolous applications cannot be filtered out. Setting out grounds is distinct from arguing merits — the former is required at approval stage, the latter is not (following *Hertel Singapore Pte Ltd v Cheng Swee Guan* [2025] 4 SLR 1571 at [18], [32]). Requiring grounds does not amount to pre-litigation; it simply ensures both court and opponent understand the case to be met. The SAPT regime's purpose — streamlining pre-trial process and preventing piecemeal litigation — supports this interpretation. Adopting a \"two-track\" approach (grounds required for some applications but not others) would be unattractive and inconsistent with the Rules.","watch":"The Court observed, in obiter, that save in cases of abuse or where an application is plainly hopeless, \"it is generally a formidable task for a claimant to resist the grant of approval to a defendant to file an application to set aside a default judgment.\" Lower courts may apply this observation generously when defendants seek to set aside defaults, regardless of the strength of the prima facie defence disclosed at approval stage."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied *Hertel Singapore Pte Ltd (now known as Altrad Services Singapore Pte Ltd) and another v Cheng Swee Guan and others* [2025] 4 SLR 1571 as the governing authority for the burden of proof under O 9 r 9(7) of the Rules of Court 2021, confirming that the requesting party must demonstrate that an intended application is necessary at the present stage of proceedings. The two other cited authorities — *Dorsey James Michael v World Sport Group Pte Ltd* and *Constitutional Reference No 1 of 1995* — were invoked only for the uncontroversial proposition that statutory provisions must be read harmoniously with their context and legislative purpose.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment applies existing principles without development. The Court straightforwardly followed *Hertel Singapore* on the necessity requirement under O 9 r 9(7), and the statutory interpretation authorities were cited for routine propositions only.","cited_cases":[]},{"title":"LEONG YIM LING v MOEY PARK MOON","citation":"[2026] SGHC 57","court":"","url":"https://www.elitigation.sg/gd/s/2026_SGHC_57","matched_topics":["family law"],"law_shifted":true,"summary":{"bottom_line":"Retirement and cessation of employment income, standing alone, do not constitute a material change in circumstances justifying rescission of spousal maintenance obligations where the former husband retains sufficient assets and alternative financial resources to continue meeting those obligations from retirement savings.","facts_posture":"The parties divorced in 2013. An ancillary matters order imposed maintenance obligations on the husband totalling $5,150 per month (comprising periodic maintenance, medical/dental/optical expenses, and travel). The husband, now 67 and retired since August 2024, applied to rescind all maintenance obligations on grounds of retirement and advanced age. This was his third variation attempt; two prior applications (in 2015 and 2018) were dismissed by Woo Bih Li J, the latter on the basis that the husband could not relitigate whether his earlier job change justified reduced maintenance.","decided":"The Court dismissed the rescission application but converted the periodic maintenance obligations to a lump sum of $364,800. The husband's retirement did not constitute a material change in circumstances warranting rescission. The Court found the husband possessed five Malaysian properties, insurance policies worth $121,491, investment accounts totalling at least $92,310, CPF withdrawals of $327,381, and bank savings of at least $378,749.","reasoning":"Applying *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 and *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506, the Court confirmed that a husband is prima facie obliged to maintain his former wife beyond retirement. Retirement is foreseeable at the time a maintenance order is made and therefore does not, without more, constitute a material change arising after the ancillary matters hearing. Following *VOX v VOY* [2021] SGFC 11, *VJD v VJE* [2020] SGFC 88, and *DIL v DIM* [2024] SGHC 139, the inquiry focuses on whether retirement, considered with the husband's overall financial circumstances, renders him incapable of fulfilling maintenance obligations. The husband's substantial assets demonstrated continued ability to pay from retirement savings. The Court drew an adverse inference against the wife for failing to comply with three disclosure orders concerning undisclosed bank accounts and credit cards, reducing the multiplicand from $4,500 to $3,800 monthly and rescinding hospital/surgical bill obligations. The Court applied the *Wan Lai Cheng* multiplier/multiplicand approach, adopting an eight-year multiplier (discounted from the formulaic ten years given the wife's age of 65).","watch":"The Court left open what multiplier discount from the *Wan Lai Cheng* formula is appropriate where adverse inferences are drawn against the maintenance recipient's disclosed needs. The reasoning on adverse inferences affecting both multiplicand and specific maintenance heads may inform future disclosure disputes in variation applications."},"judicial_treatment":"# Judicial Treatment\n\n## AUTHORITIES THAT MATTER\n\nThe Court applied the established framework from *BZD v BZE* [2020] SGCA 1 and *ATS v ATT* [2016] SGHC 196 for the threshold question in variation applications: whether the change is sufficiently material that it is no longer fair to expect the status quo to remain. More significantly, the Court distinguished two recent Family Court decisions — *VOX v VOY* [2021] SGFC 11 and *VJD v VJE* [2020] SGFC 88 — both of which had granted variation or rescission upon retirement, emphasising that those cases involved husbands who had fully retired with depleting assets and no alternative income sources, whereas the present husband remained in employment. The Court applied *Foo Ah Yan v Chiam Heng Chow* [2012] 2 SLR 506 and the Court of Appeal's holding in *Yow Mee Lan v Chen Kai Buan* [2000] 2 SLR(R) 659 for the principle that a husband's maintenance obligation prima facie continues beyond retirement, reinforcing that retirement alone does not automatically warrant variation. The Court also drew on *DIL v DIM* [2024] SGHC 139 for the proposition that a detailed analysis of the husband's assets and obligations is required when assessing ability to pay post-retirement.\n\n## DEVELOPMENT OF THE LAW\n\nThis judgment does not break new ground but provides useful clarification on how courts should approach retirement-related variation applications. It confirms that the cases permitting variation on retirement grounds turn heavily on their particular facts — specifically, whether the husband has genuinely ceased all income-earning activity and faces asset depletion — and should not be read as establishing a general rule that reaching retirement age or reducing work hours suffices as a material change. The Court reinforced that the continuing obligation principle in *Yow Mee Lan* remains robust absent clear evidence of inability to pay.","cited_cases":[]}]};
const data = DIGEST_DATA;
document.getElementById('digest-title').textContent = data.digest_date;
document.getElementById('digest-meta').textContent = data.cases.length + ' judgment' + (data.cases.length !== 1 ? 's' : '') + ' \u00B7 Prepared for ' + data.user_name;
const allTopics = [];
data.cases.forEach(c => c.matched_topics.forEach(t => { if (!allTopics.includes(t)) allTopics.push(t); }));
const shiftCount = data.cases.filter(c => c.law_shifted).length;
document.getElementById('stats-row').innerHTML = '<div class="stat"><span class="stat-num">' + data.cases.length + '</span><span class="stat-label">Judgments</span></div><div class="stat"><span class="stat-num">' + allTopics.length + '</span><span class="stat-label">Your topics</span></div>' + (shiftCount > 0 ? '<div class="stat"><span class="stat-num">' + shiftCount + '</span><span class="stat-label">Notable shifts</span></div>' : '');
const topicCounts = {};
data.cases.forEach(c => c.matched_topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
let filtersHTML = '<button class="filter-btn active" data-topic="all">All<span class="filter-count">' + data.cases.length + '</span></button>';
Object.keys(topicCounts).sort().forEach(t => { filtersHTML += '<button class="filter-btn" data-topic="' + t + '">' + t + '<span class="filter-count">' + topicCounts[t] + '</span></button>'; });
document.getElementById('filters').innerHTML = filtersHTML;
function getTreatClass(t) { return 'treat-' + (t || 'cited').toLowerCase().replace(/\s+/g, '-'); }
function formatJT(jt) { if (!jt) return ''; return jt.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/##?\s*([^\n]+)/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
function renderCases(cases) {
  let html = '';
  cases.forEach((c, i) => {
    const topicTags = c.matched_topics.map(t => '<span class="tag-topic">' + t + '</span>').join('');
    const shiftTag = c.law_shifted ? '<span class="tag-shift">Notable development</span>' : '';
    const sp = c.summary || {};
    let sections = '';
    if (sp.bottom_line) sections += '<div class="section"><div class="section-heading">Bottom line</div><div class="section-text">' + sp.bottom_line + '</div></div>';
    if (sp.facts_posture) sections += '<div class="section"><div class="section-heading">Facts &amp; posture</div><div class="section-text">' + sp.facts_posture + '</div></div>';
    if (sp.decided) sections += '<div class="section"><div class="section-heading">What the court decided</div><div class="section-text">' + sp.decided + '</div></div>';
    if (sp.reasoning) sections += '<div class="section"><div class="section-heading">How it reasoned</div><div class="section-text">' + sp.reasoning + '</div></div>';
    if (c.judicial_treatment) sections += '<div class="section"><div class="section-heading">Judicial treatment</div><div class="section-text">' + formatJT(c.judicial_treatment) + '</div></div>';
    if (c.cited_cases && c.cited_cases.length > 0) {
      const sig = c.cited_cases.filter(cc => ['applied','followed','distinguished','overruled','not followed','approved','considered'].includes((cc.treatment||'').toLowerCase())).slice(0, 8);
      if (sig.length > 0) {
        let authHTML = '';
        sig.forEach(cc => { authHTML += '<div class="auth-entry"><div class="auth-top"><span class="auth-name">' + cc.case_name + '</span><span class="auth-treatment ' + getTreatClass(cc.treatment) + '">' + cc.treatment + '</span></div>' + (cc.proposition ? '<div class="auth-prop">' + cc.proposition + '</div>' : '') + '</div>'; });
        sections += '<div class="section"><div class="section-heading">Key authorities (' + c.cited_cases.length + ' total)</div><div class="auth-box">' + authHTML + '</div></div>';
      }
    }
    if (sp.watch) sections += '<div class="section"><div class="section-heading">Watch</div><div class="section-text">' + sp.watch + '</div></div>';
    const searchable = (c.title + ' ' + (c.citation||'') + ' ' + c.matched_topics.join(' ') + ' ' + (c.cited_cases||[]).map(cc => cc.case_name).join(' ')).toLowerCase().replace(/"/g, '');
    html += '<div class="case-card" data-topics=\'' + JSON.stringify(c.matched_topics) + '\' data-searchable="' + searchable + '">' +
      '<div class="case-header" onclick="toggleCard(this)">' +
      '<div class="expand-btn"><span>&#9654;</span></div>' +
      '<div class="case-info"><div class="case-name">' + c.title + '</div><div class="case-cite-line">' + (c.citation||'') + '</div></div>' +
      '</div>' +
      '<div class="case-bottom-line">' + (sp.bottom_line || '') + '</div>' +
      '<div class="case-tags">' + topicTags + shiftTag + '</div>' +
      '<div class="case-detail">' + sections + (c.url ? '<a class="case-link" href="' + c.url + '" target="_blank">View full judgment &#8594;</a>' : '') + '</div></div>';
  });
  document.getElementById('case-list').innerHTML = html;
}
renderCases(data.cases);
function toggleCard(el) { el.closest('.case-card').classList.toggle('expanded'); }
document.getElementById('filters').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  document.querySelectorAll('.case-card').forEach(card => {
    if (topic === 'all') { card.classList.remove('hidden'); }
    else { const topics = JSON.parse(card.dataset.topics); card.classList.toggle('hidden', !topics.includes(topic)); }
  });
});
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-topic="all"]').classList.add('active');
  document.querySelectorAll('.case-card').forEach(card => {
    if (!q) { card.classList.remove('hidden'); } else { card.classList.toggle('hidden', !card.dataset.searchable.includes(q)); }
  });
});
</script>
